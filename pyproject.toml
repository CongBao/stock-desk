[project]
name = "stock-desk"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
dependencies = [
    "alembic>=1.16,<2",
    "fastapi>=0.116,<1",
    "pydantic-settings>=2.10,<3",
    "sqlalchemy>=2.0,<3",
    "uvicorn[standard]>=0.35,<1",
]

[build-system]
requires = ["hatchling>=1.27,<2"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/stock_desk"]

[tool.hatch.build.targets.wheel.force-include]
"alembic.ini" = "stock_desk/alembic.ini"
"migrations" = "stock_desk/migrations"

[dependency-groups]
dev = [
    "hatchling>=1.27,<2",
    "httpx2>=2,<3",
    "mypy>=1.17,<2",
    "pytest>=8.4,<9",
    "ruff>=0.12,<1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
filterwarnings = ["error"]

[tool.ruff]
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true
