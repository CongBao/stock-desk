    evidence:
      - {state: existing, runner: pytest, kind: integration, path: tests/unit/backtest/test_execution_timing.py, selector: "tests/unit/backtest/test_execution_timing.py::test_daily_signal_executes_at_next_trade_day_open", assertion: "Execution timing proves a close-confirmed daily signal cannot fill before the following open."}
      - {state: existing, runner: pytest, kind: integration, path: tests/unit/backtest/test_execution_timing.py, selector: "tests/unit/backtest/test_execution_timing.py::test_weekly_signal_uses_first_executable_daily_open", assertion: "A weekly close-confirmed signal first attempts execution at the following week's executable open."}
