    kind: architecture
    behavior_key: a_share_execution_constraints
    acceptance: Historical execution applies T+1, suspensions, and then-applicable price-limit status, retaining a typed reason whenever an order cannot trade and never inventing a fill.
    source_refs: [{capability: backtesting-reporting, requirement: a-share-execution-constraints, scenario: t-plus-one-blocks-sale}, {capability: backtesting-reporting, requirement: a-share-execution-constraints, scenario: suspension-blocks-fill}, {capability: backtesting-reporting, requirement: a-share-execution-constraints, scenario: price-limit-blocks-fill}]
