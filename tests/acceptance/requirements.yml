  - id: R-017
    category: backtest
    kind: architecture
    behavior_key: signals_execute_next_open
    acceptance: A signal is confirmed only after its current period closes, and the resulting order first attempts execution at the next corresponding period's first tradable open.
    source_refs: [{capability: backtesting-reporting, requirement: signal-confirmation-and-execution-time, scenario: daily-buy-signal}, {capability: backtesting-reporting, requirement: signal-confirmation-and-execution-time, scenario: weekly-sell-signal}]
