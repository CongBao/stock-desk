      - {state: existing, runner: pytest, kind: integration, path: tests/unit/backtest/test_metrics.py, selector: "tests/unit/backtest/test_metrics.py::test_summary_discloses_returns_pnl_payoff_extremes_and_holding", assertion: "The summary discloses returns, profit and loss, payoff, extrema, and holding-period statistics."}
      - {state: existing, runner: pytest, kind: integration, path: tests/unit/backtest/test_metrics.py, selector: "tests/unit/backtest/test_metrics.py::test_histogram_uses_fixed_deterministic_bins_and_reconciles", assertion: "The return distribution uses fixed deterministic bins that reconcile to realized samples."}
      - {state: existing, runner: pytest, kind: integration, path: tests/unit/backtest/test_grouping.py, selector: "tests/unit/backtest/test_grouping.py::test_symbol_groups_reconcile_to_global_realized_denominator", assertion: "Per-symbol grouped results reconcile to the global realized-trade denominator."}
      - {state: planned, runner: pytest, kind: acceptance, path: tests/acceptance/test_backtest_statistics_contract.py, selector: "tests/acceptance/test_backtest_statistics_contract.py::test_win_rate_summary_distributions_and_symbol_time_groups_are_complete", assertion: "The planned report contract will prove every named summary statistic, distribution, and symbol/time grouping is present and reconciled."}
  - id: R-016
    category: backtest
    kind: architecture
    behavior_key: backtest_snapshot_is_reproducible
    acceptance: Every run freezes data version and source, adjustment, formula version, stock scope, dates, period, costs, slippage, and rule versions so identical inputs reproduce identical trades and statistics.
    source_refs: [{capability: backtesting-reporting, requirement: reproducible-backtest-snapshot, scenario: rerun-same-snapshot}]
    owning_stage: 3
