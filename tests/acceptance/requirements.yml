schema_version: 1
requirements:
  - id: R-001
    category: market
    kind: user_visible
    behavior_key: market_data_scope_is_complete
    acceptance: The unified data layer supplies adjusted bars, instruments, calendars, trading status, fundamentals, announcements, news, index membership, and industry classification, and reports an explicit missing category instead of substituting unlike data.
    source_refs: [{capability: market-data-charting, requirement: base-a-share-data-scope, scenario: load-stock-analysis-data}, {capability: market-data-charting, requirement: base-a-share-data-scope, scenario: report-missing-category}]
    owning_stage: 1
    status: mapped
    evidence:
      - {state: existing, runner: pytest, kind: acceptance, path: tests/acceptance/test_market_flow.py, selector: "tests/acceptance/test_market_flow.py::test_settings_route_worker_cache_api_and_schedule_flow_without_network", assertion: "The accepted market flow exercises the unified cached data categories and explicit source diagnostics."}
      - {state: planned, runner: pytest, kind: acceptance, path: tests/acceptance/test_full_user_journey.py, selector: "tests/acceptance/test_full_user_journey.py::test_demo_data_categories_and_missing_category_are_visible", assertion: "The integrated journey will prove every declared analysis category and the visible missing-data state."}
  - id: R-002
    category: market
    kind: user_visible
    behavior_key: stock_search_and_chart_interactions
    acceptance: Searching by A-share code or name selects the instrument and refreshes candlestick, volume, indicator, and context data; crosshair, zoom, drag, and formula markers remain aligned to the selected period.
    source_refs: [{capability: market-data-charting, requirement: stock-search-and-chart-interaction, scenario: search-and-switch-stock}, {capability: market-data-charting, requirement: stock-search-and-chart-interaction, scenario: inspect-history}]
    owning_stage: 1
    status: mapped
    evidence:
      - {state: existing, runner: playwright, kind: acceptance, path: web/e2e/market.spec.ts, selector: "real local market workflow stays cached, traceable, and interactive", assertion: "The browser flow searches, selects, and interacts with locally cached market charts."}
  - id: R-003
    category: formula
    kind: user_visible
    behavior_key: builtin_and_custom_formulas
    acceptance: Users can start with common built-in indicators, including a MACD crossover trading strategy, or create a custom formula that can be validated, previewed, saved, and used for backtesting.
    source_refs: [{capability: formula-system, requirement: builtin-and-custom-formulas, scenario: use-builtin-macd}, {capability: formula-system, requirement: builtin-and-custom-formulas, scenario: create-custom-formula}]
    owning_stage: 2
    status: mapped
    evidence:
      - {state: existing, runner: pytest, kind: acceptance, path: tests/acceptance/test_macd_formula_flow.py, selector: "tests/acceptance/test_macd_formula_flow.py::test_macd_template_preview_versioning_and_safety_are_one_flow", assertion: "The public MACD template and a safe versioned preview are exercised as one accepted formula flow."}
      - {state: planned, runner: pytest, kind: acceptance, path: tests/acceptance/test_formula_to_backtest_journey.py, selector: "tests/acceptance/test_formula_to_backtest_journey.py::test_builtin_and_custom_formulas_validate_preview_save_and_run_backtest", assertion: "The planned journey will prove both built-in and custom formulas complete validation, preview, immutable save, and historical backtest use."}
  - id: R-004
    category: formula
    kind: architecture
    behavior_key: formula_versions_are_traceable
    acceptance: Each valid save creates an identifiable immutable formula version, copying creates an independent formula history, and historical runs remain pinned to the exact version they originally referenced.
    source_refs: [{capability: formula-system, requirement: traceable-formula-versions, scenario: modify-used-formula}, {capability: formula-system, requirement: traceable-formula-versions, scenario: copy-saved-formula}]
    owning_stage: 2
    status: mapped
    evidence:
      - {state: existing, runner: pytest, kind: integration, path: tests/integration/formula/test_repository.py, selector: "tests/integration/formula/test_repository.py::test_save_creates_new_version_without_mutating_old", assertion: "Saving valid formula source creates an immutable new version without changing the prior revision."}
      - {state: existing, runner: pytest, kind: integration, path: tests/integration/formula/test_repository.py, selector: "tests/integration/formula/test_repository.py::test_copy_creates_independent_formula_identity", assertion: "Copying a saved formula creates an independent formula identity and version history."}
      - {state: planned, runner: pytest, kind: acceptance, path: tests/acceptance/test_formula_to_backtest_journey.py, selector: "tests/acceptance/test_formula_to_backtest_journey.py::test_formula_version_copy_and_historical_run_pinning", assertion: "The planned journey will jointly prove immutable saves, independent copied history, and exact historical-run version pinning."}
  - id: R-005
    category: publication
    kind: publication
    behavior_key: bilingual_readme_baseline
    acceptance: The public project provides reciprocal English and Simplified-Chinese README files that concisely describe verified basic installation and use in both languages.
    source_refs: [{capability: market-data-charting, requirement: bilingual-open-source-readme, scenario: english-to-chinese}, {capability: market-data-charting, requirement: bilingual-open-source-readme, scenario: chinese-to-english}]
    owning_stage: 5
    status: mapped
    evidence:
      - {state: existing, runner: gate, kind: gate, gate_id: bilingual-readme, assertion: "The fixed bilingual README gate verifies reciprocal navigation between both public entry documents."}
      - {state: planned, runner: pytest, kind: integration, path: tests/acceptance/test_release_docs.py, selector: "tests/acceptance/test_release_docs.py::test_bilingual_readme_baseline_contains_verified_installation_and_use", assertion: "The documentation gate will verify that both baseline README documents contain only tested installation and use instructions."}
  - id: R-006
    category: platform
    kind: user_visible
    behavior_key: responsive_navigation_baseline
    acceptance: Narrow layouts automatically collapse navigation to icons with accessible names, manual expansion remains keyboard operable, and supported wide, narrow, and tablet layouts preserve core content without visible overlap.
    source_refs: [{capability: market-data-charting, requirement: responsive-navigation-and-nonoverlap, scenario: narrow-screen-auto-collapse}, {capability: market-data-charting, requirement: responsive-navigation-and-nonoverlap, scenario: manual-navigation-toggle}, {capability: market-data-charting, requirement: responsive-navigation-and-nonoverlap, scenario: preserve-layout-at-supported-ratios}]
    owning_stage: 0
    status: mapped
    evidence:
      - {state: existing, runner: vitest, kind: component, path: web/src/app/App.test.tsx, selector: "collapses and expands the primary navigation without abbreviating link names", assertion: "The shell component collapses to icons and preserves full accessible navigation names and manual control."}
      - {state: existing, runner: playwright, kind: acceptance, path: web/e2e/backtest.spec.ts, selector: "global shell stays operable across desktop, tablet, portrait, and 200% effective viewport", assertion: "Existing browser evidence exercises baseline shell operability across representative viewport shapes."}
  - id: R-007
    category: market
    kind: user_visible
    behavior_key: chart_periods_and_adjustments
    acceptance: Historical daily, weekly, and 60-minute bars plus the latest daily data can be selected, and switching among unadjusted, forward-adjusted, and backward-adjusted modes recalculates the displayed market and indicator values with a visible mode label.
    source_refs: [{capability: market-data-charting, requirement: periods-and-adjustments, scenario: switch-period}, {capability: market-data-charting, requirement: periods-and-adjustments, scenario: switch-adjustment}]
    owning_stage: 1
    status: mapped
    evidence:
      - {state: existing, runner: playwright, kind: acceptance, path: web/e2e/market.spec.ts, selector: "real local market workflow stays cached, traceable, and interactive", assertion: "The browser acceptance flow switches periods and adjustment modes against the cached market route."}
      - {state: planned, runner: pytest, kind: acceptance, path: tests/acceptance/test_market_period_adjustment_contract.py, selector: "tests/acceptance/test_market_period_adjustment_contract.py::test_period_and_adjustment_switches_recalculate_visible_market_and_indicator_values", assertion: "The planned contract will prove every supported period and adjustment visibly recalculates both market and indicator values, including latest daily data."}
  - id: R-008
    category: market
    kind: user_visible
    behavior_key: candlestick_main_and_formula_subchart
    acceptance: Candlesticks remain the default main chart, formula results render in an aligned subchart, and only explicitly declared main-overlay indicators may draw over the price chart.
    source_refs: [{capability: market-data-charting, requirement: candlestick-main-and-formula-subchart, scenario: preview-subchart-formula}]
    owning_stage: 2
    status: mapped
    evidence:
      - {state: existing, runner: vitest, kind: component, path: web/src/features/market/MarketChart.test.tsx, selector: "labels main-chart overlays and subcharts according to formula placement", assertion: "The chart component distinguishes explicit main overlays from aligned formula subcharts."}
  - id: R-009
    category: analysis
    kind: architecture
    behavior_key: constrained_multi_agent_sequence
    acceptance: Each analysis freezes one data snapshot, runs technical and fundamental/news stages in parallel, passes their structured evidence to bull and bear roles, and lets the risk decision role form the final conclusion only from that snapshot and prior outputs.
    source_refs: [{capability: multi-agent-analysis, requirement: compact-research-workflow, scenario: complete-research-workflow}, {capability: multi-agent-analysis, requirement: compact-research-workflow, scenario: inspect-analysis-trace}]
    owning_stage: 4
    status: mapped
    evidence:
      - {state: existing, runner: pytest, kind: acceptance, path: tests/acceptance/test_analysis_flow.py, selector: "tests/acceptance/test_analysis_flow.py::test_full_stubbed_analysis_is_traceable_and_history_is_immutable", assertion: "The stubbed accepted flow proves ordered roles, evidence traceability, and immutable history."}
      - {state: planned, runner: pytest, kind: acceptance, path: tests/acceptance/test_analysis_parallel_workflow.py, selector: "tests/acceptance/test_analysis_parallel_workflow.py::test_snapshot_parallel_roles_and_bull_bear_risk_dependencies_are_exact", assertion: "The planned workflow contract will prove one frozen snapshot, exact technical/fundamental parallelism, structured bull/bear inputs, and risk-only downstream dependencies."}
  - id: R-010
    category: platform
    kind: architecture
    behavior_key: durable_async_task_lifecycle
    acceptance: Long-running updates, pool backtests, and multi-agent analysis execute through durable worker tasks that expose stage, progress, cancellation, errors, logs, and retained partial results without blocking the API or interface.
    source_refs: [{capability: product-design, requirement: durable-async-task-lifecycle, scenario: run-cancel-and-inspect-task}]
    owning_stage: 0
    status: mapped
    evidence:
      - {state: existing, runner: pytest, kind: integration, path: tests/integration/tasks/test_worker_process.py, selector: "tests/integration/tasks/test_worker_process.py::test_worker_process_completes_persisted_demo_task_and_stops_cleanly", assertion: "A separate worker process claims and durably completes the public demo task lifecycle."}
      - {state: existing, runner: pytest, kind: acceptance, path: tests/acceptance/test_market_flow.py, selector: "tests/acceptance/test_market_flow.py::test_settings_route_worker_cache_api_and_schedule_flow_without_network", assertion: "The market acceptance flow proves scheduled data updates cross the Worker boundary with durable status."}
      - {state: existing, runner: playwright, kind: acceptance, path: web/e2e/backtest.spec.ts, selector: "held pool run reaches persisted terminal cancellation through the worker", assertion: "The browser proves a pool backtest exposes progress and durable cancellation through the Worker."}
      - {state: existing, runner: pytest, kind: acceptance, path: tests/acceptance/test_analysis_flow.py, selector: "tests/acceptance/test_analysis_flow.py::test_partial_retry_insufficient_evidence_and_cancel_are_durable", assertion: "Analysis acceptance proves progress, cancellation, errors, partial results, and retry remain durable."}
      - {state: planned, runner: pytest, kind: integration, path: tests/acceptance/test_async_task_lifecycle.py, selector: "tests/acceptance/test_async_task_lifecycle.py::test_updates_backtests_and_analysis_expose_progress_cancellation_errors_logs_and_partial_results_without_blocking", assertion: "The planned cross-domain lifecycle test will jointly verify every task status surface and API/interface nonblocking behavior."}
  - id: R-011
    category: security
    kind: security
    behavior_key: market_provider_secrets_are_protected
    acceptance: Market-data tokens are encrypted at rest, represented to the interface only by masked state, never returned as plaintext, and redacted from source responses, update logs, errors, and diagnostics.
    source_refs: [{capability: market-data-charting, requirement: market-secret-protection, scenario: save-market-token}, {capability: market-data-charting, requirement: market-secret-protection, scenario: market-source-call-fails}]
    owning_stage: 1
    status: mapped
    evidence:
      - {state: existing, runner: pytest, kind: security, path: tests/unit/api/test_source_settings.py, selector: "tests/unit/api/test_source_settings.py::test_tushare_token_is_write_only_masked_and_omission_keeps_ciphertext", assertion: "The Tushare token is write-only, encrypted in storage, and represented publicly only by masked state."}
      - {state: existing, runner: pytest, kind: security, path: tests/unit/api/test_source_settings.py, selector: "tests/unit/api/test_source_settings.py::test_provider_factory_dynamic_nonpropagating_handler_and_close_are_redacted", assertion: "Dynamic provider failures and handler cleanup redact active token values from diagnostic logging."}
      - {state: planned, runner: pytest, kind: security, path: tests/acceptance/test_market_secret_surfaces.py, selector: "tests/acceptance/test_market_secret_surfaces.py::test_market_token_never_leaves_masked_state_across_responses_logs_errors_diagnostics_and_exports", assertion: "The planned surface matrix will prove ciphertext and plaintext tokens never escape through any declared market-data output."}
  - id: R-012
    category: formula
    kind: user_visible
    behavior_key: formula_types_have_typed_outputs
    acceptance: Technical-indicator formulas produce declared main-chart overlays or subchart series, while trading-system formulas produce explicit Boolean BUY and SELL signals suitable for deterministic consumers.
    source_refs: [{capability: formula-system, requirement: formula-types-and-outputs, scenario: evaluate-technical-indicator}, {capability: formula-system, requirement: formula-types-and-outputs, scenario: evaluate-trading-system}]
    owning_stage: 2
    status: mapped
    evidence:
      - {state: existing, runner: pytest, kind: acceptance, path: tests/acceptance/test_formula_consistency.py, selector: "tests/acceptance/test_formula_consistency.py::test_macd_template_has_public_outputs_signals_and_subchart_evaluation", assertion: "The accepted MACD template exposes numeric outputs, Boolean BUY/SELL signals, and subchart placement through one evaluation."}
      - {state: existing, runner: vitest, kind: component, path: web/src/features/market/MarketChart.test.tsx, selector: "labels main-chart overlays and subcharts according to formula placement", assertion: "The chart component renders declared main overlays and subchart outputs according to typed placement."}
  - id: R-013
    category: backtest
    kind: architecture
    behavior_key: backtest_uses_builtin_or_saved_signals
    acceptance: Historical execution consumes BUY and SELL signals from either the built-in MACD strategy or a validated immutable custom trading-formula version without recalculating a different strategy.
    source_refs: [{capability: backtesting-reporting, requirement: builtin-and-custom-signal-backtest, scenario: backtest-builtin-macd}, {capability: backtesting-reporting, requirement: builtin-and-custom-signal-backtest, scenario: backtest-custom-formula}]
