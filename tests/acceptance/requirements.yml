      - {state: planned, runner: pytest, kind: acceptance, path: tests/acceptance/test_backtest_scope_matrix.py, selector: "tests/acceptance/test_backtest_scope_matrix.py::test_all_a_index_industry_custom_failure_and_insufficient_scopes", assertion: "The planned scope matrix will prove all-A, index, industry, and custom pools plus separate failure and insufficient-data outcomes."}
