      - {state: existing, runner: playwright, kind: acceptance, path: web/e2e/backtest.spec.ts, selector: "desktop market prefill runs MACD through report, replay, and export", assertion: "The browser acceptance flow runs the built-in MACD strategy through report, replay, and export."}
  - id: R-014
    category: backtest
    kind: user_visible
    behavior_key: single_and_pool_backtests
    acceptance: Users can run one formula and parameter set for one stock or for a selected all-A, index, industry, or custom pool, and receive separate success, failure, and insufficient-data outcomes.
