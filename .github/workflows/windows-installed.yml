# Real installed-Windows acceptance. GitHub-hosted jobs authenticate to an
# external ephemeral-VM broker with a fixed-audience OIDC token. The broker and
# guest publish raw bytes only; a GitHub-hosted exact-source verifier derives
# the sole acceptance receipt after all 11 first-attempt cases are present.
name: Windows installed VM acceptance

on:
  workflow_call:
    inputs:
      source_sha:
        description: Exact lowercase 40-hex protected-main commit SHA
        required: true
        type: string
      source_tree:
        description: Exact lowercase 40-hex protected-main tree SHA
        required: true
        type: string
      candidate_sha256:
        description: Exact SHA-256 of the Authenticode-signed NSIS candidate
        required: true
        type: string
      candidate_manifest_sha256:
        description: Exact SHA-256 of the main-proved unsigned candidate manifest
        required: true
        type: string
      signed_artifact_name:
        description: Closed SignPath artifact produced in this release run
        required: true
        type: string
      signing_request_id:
        description: Exact non-secret SignPath request identity
        required: true
        type: string
      signpath_run_id:
        description: Optional completed run containing the signed artifact; current run when empty
        required: false
        type: string
        default: ""
    outputs:
      acceptance_artifact_name:
        description: Exact signed-candidate Windows trust evidence artifact
        value: ${{ jobs.attest.outputs.acceptance_artifact_name }}
      acceptance_sha256:
        description: SHA-256 of the closed Windows trust evidence archive manifest
        value: ${{ jobs.attest.outputs.acceptance_sha256 }}
    secrets:
      WINDOWS_INSTALLED_POLICY_TOKEN:
        required: true
      WINDOWS_VM_BROKER_ENDPOINT:
        required: true
      WINDOWS_VM_SNAPSHOT_POLICY_SHA256:
        required: true
      WINDOWS_VM_ADAPTER_SHA256:
        required: true
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact lowercase 40-hex main commit SHA to verify
        required: true
        type: string
      source_tree:
        description: Exact lowercase 40-hex protected-main tree SHA
        required: true
        type: string
      candidate_sha256:
        description: Exact SHA-256 of the Authenticode-signed NSIS candidate
        required: true
        type: string
      candidate_manifest_sha256:
        description: Exact SHA-256 of the main-proved unsigned candidate manifest
        required: true
        type: string
      signed_artifact_name:
        description: windows-signpath-signed-<source_sha> artifact name
        required: true
        type: string
      signing_request_id:
        description: Exact non-secret SignPath request identity
        required: true
        type: string
      signpath_run_id:
        description: Completed main workflow run that produced the signed artifact
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: windows-installed-${{ inputs.source_sha }}
  cancel-in-progress: false

jobs:
  dispatch-guard:
    name: Reject untrusted dispatch identity before protected jobs
    runs-on: ubuntu-24.04
    environment: windows-installed-acceptance
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    env:
      SOURCE_SHA: ${{ inputs.source_sha }}
      SOURCE_TREE: ${{ inputs.source_tree }}
      CANDIDATE_SHA256: ${{ inputs.candidate_sha256 }}
      CANDIDATE_MANIFEST_SHA256: ${{ inputs.candidate_manifest_sha256 }}
      SIGNED_ARTIFACT_NAME: ${{ inputs.signed_artifact_name }}
      SIGNING_REQUEST_ID: ${{ inputs.signing_request_id }}
      SIGNPATH_RUN_ID: ${{ inputs.signpath_run_id }}
    steps:
      - name: Reject every non-main or mutable workflow dispatch
        shell: bash
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$SOURCE_TREE" =~ ^[0-9a-f]{40}$ ]]
          [[ "$CANDIDATE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$CANDIDATE_MANIFEST_SHA256" =~ ^[0-9a-f]{64}$ ]]
          test "$SIGNED_ARTIFACT_NAME" = "windows-signpath-signed-$SOURCE_SHA"
          test -n "$SIGNING_REQUEST_ID"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$GITHUB_REF_TYPE" = "branch"
          test "$GITHUB_REF_NAME" = "main"
          test "$GITHUB_REF_PROTECTED" = "true"
          test "$GITHUB_SHA" = "$SOURCE_SHA"
          test "$GITHUB_WORKFLOW_SHA" = "$SOURCE_SHA"
          test "$GITHUB_RUN_ATTEMPT" = "1"

      - name: Check out the immutable guarded workflow source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.source_sha }}

      - name: Prove exact protected main and environment branch policy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          POLICY_TOKEN: ${{ secrets.WINDOWS_INSTALLED_POLICY_TOKEN }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          test "$(git rev-parse 'HEAD^{tree}')" = "$SOURCE_TREE"
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/protected-main
          test "$(git rev-parse refs/remotes/origin/protected-main)" = "$SOURCE_SHA"
          branch="$RUNNER_TEMP/windows-installed-main-branch.json"
          environment="$RUNNER_TEMP/windows-installed-environment.json"
          branch_policies="$RUNNER_TEMP/windows-installed-environment-branches.json"
          runners="$RUNNER_TEMP/windows-installed-repository-runners.json"
          gh api "repos/$GITHUB_REPOSITORY/branches/main" > "$branch"
          jq -e --arg sha "$SOURCE_SHA" \
            '.name == "main" and .protected == true and .commit.sha == $sha' \
            "$branch" >/dev/null
          GH_TOKEN="$POLICY_TOKEN" gh api \
            "repos/$GITHUB_REPOSITORY/environments/windows-installed-acceptance" \
            > "$environment"
          GH_TOKEN="$POLICY_TOKEN" gh api \
            "repos/$GITHUB_REPOSITORY/environments/windows-installed-acceptance/deployment-branch-policies" \
            > "$branch_policies"
          GH_TOKEN="$POLICY_TOKEN" gh api \
            "repos/$GITHUB_REPOSITORY/actions/runners" > "$runners"
          python scripts/windows_installed_environment_policy.py verify \
            "$environment" --branch-policies "$branch_policies" \
            --runners "$runners" --repository "$GITHUB_REPOSITORY"

  preflight:
    name: Verify exact protected-main Windows candidate
    needs: dispatch-guard
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    env:
      SOURCE_SHA: ${{ inputs.source_sha }}
      SOURCE_TREE: ${{ inputs.source_tree }}
      CANDIDATE_SHA256: ${{ inputs.candidate_sha256 }}
      CANDIDATE_MANIFEST_SHA256: ${{ inputs.candidate_manifest_sha256 }}
      SIGNED_ARTIFACT_NAME: ${{ inputs.signed_artifact_name }}
      SIGNING_REQUEST_ID: ${{ inputs.signing_request_id }}
      SIGNPATH_RUN_ID: ${{ inputs.signpath_run_id }}
    steps:
      - name: Reject non-canonical source identity
        shell: bash
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$SOURCE_TREE" =~ ^[0-9a-f]{40}$ ]]
          [[ "$CANDIDATE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$CANDIDATE_MANIFEST_SHA256" =~ ^[0-9a-f]{64}$ ]]
          test "$SIGNED_ARTIFACT_NAME" = "windows-signpath-signed-$SOURCE_SHA"
          test -n "$SIGNING_REQUEST_ID"
          test "$GITHUB_RUN_ATTEMPT" = "1"
          echo "PROOF_ROOT=$RUNNER_TEMP/windows-installed-preflight/proof" >> "$GITHUB_ENV"
          echo "SIGNED_ROOT=$RUNNER_TEMP/windows-installed-preflight/signed" >> "$GITHUB_ENV"
          echo "CONTROLLER_ROOT=$RUNNER_TEMP/windows-installed-controller" >> "$GITHUB_ENV"
          echo "RECEIPT_ROOT=$RUNNER_TEMP/windows-installed-preflight/receipts" >> "$GITHUB_ENV"

      - name: Check out the exact requested source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.source_sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Prove the commit belongs to protected main
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          test "$(git rev-parse 'HEAD^{tree}')" = "$SOURCE_TREE"
          branch="$(gh api "repos/$GITHUB_REPOSITORY/branches/main")"
          jq -e --arg sha "$SOURCE_SHA" \
            '.name == "main" and .protected == true and .commit.sha == $sha' \
            <<<"$branch" >/dev/null
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/protected-main
          test "$(git rev-parse refs/remotes/origin/protected-main)" = "$SOURCE_SHA"

      - name: Locate successful exact-SHA main validation run
        id: main-run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(gh api --method GET "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" -f branch=main -f event=push -f status=success -f per_page=100)"
          run_id="$(jq -r --arg sha "$SOURCE_SHA" '[.workflow_runs[] | select(.head_sha == $sha and .head_branch == "main" and .event == "push" and .status == "completed" and .conclusion == "success")] | sort_by(.run_attempt, .id) | last | .id // empty' <<<"$payload")"
          test -n "$run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download exact proof and closed SignPath candidate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MAIN_RUN_ID: ${{ steps.main-run.outputs.run_id }}
        run: |
          set -euo pipefail
          mkdir -p "$PROOF_ROOT" "$SIGNED_ROOT"
          gh run download "$MAIN_RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --name "main-validation-proof-$SOURCE_SHA" --dir "$PROOF_ROOT"
          artifact_run_id="${SIGNPATH_RUN_ID:-$GITHUB_RUN_ID}"
          [[ "$artifact_run_id" =~ ^[1-9][0-9]*$ ]]
          gh run download "$artifact_run_id" --repo "$GITHUB_REPOSITORY" \
            --name "$SIGNED_ARTIFACT_NAME" --dir "$SIGNED_ROOT"
          for path in \
            "$PROOF_ROOT/proof.json" \
            "$PROOF_ROOT/post-gh-verify-binding.json" \
            "$PROOF_ROOT/proof-attestation-bundle.jsonl" \
            "$SIGNED_ROOT/stock-desk-signed-nsis.exe" \
            "$SIGNED_ROOT/signpath-receipt.json" \
            "$SIGNED_ROOT/signpath-identity-closure.json" \
            "$SIGNED_ROOT/signpath-attestation-bundle.jsonl" \
            "$SIGNED_ROOT/windows-desktop-bundle.json"
          do
            test -s "$path"
          done

      - name: Verify proof, signed bytes, receipt, and attestations
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tree="$(git rev-parse 'HEAD^{tree}')"
          mkdir -p "$RECEIPT_ROOT"
          gh attestation verify "$PROOF_ROOT/proof.json" \
            --bundle "$PROOF_ROOT/proof-attestation-bundle.jsonl" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/ci.yml" \
            --source-ref refs/heads/main --source-digest "$SOURCE_SHA" \
            --signer-digest "$SOURCE_SHA" --deny-self-hosted-runners \
            --format json > "$RECEIPT_ROOT/main-proof.json"
          jq -e 'length >= 1' "$RECEIPT_ROOT/main-proof.json" >/dev/null
          gh attestation verify \
            "$SIGNED_ROOT/stock-desk-signed-nsis.exe" \
            --bundle "$SIGNED_ROOT/signpath-attestation-bundle.jsonl" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/signpath.yml" \
            --source-ref refs/heads/main --source-digest "$SOURCE_SHA" \
            --signer-digest "$SOURCE_SHA" --deny-self-hosted-runners \
            --format json > "$RECEIPT_ROOT/signed-candidate.json"
          jq -e 'length >= 1' "$RECEIPT_ROOT/signed-candidate.json" >/dev/null
          gh attestation verify "$SIGNED_ROOT/signpath-receipt.json" \
            --bundle "$SIGNED_ROOT/signpath-attestation-bundle.jsonl" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/signpath.yml" \
            --source-ref refs/heads/main --source-digest "$SOURCE_SHA" \
            --signer-digest "$SOURCE_SHA" --deny-self-hosted-runners \
            --format json > "$RECEIPT_ROOT/signpath-receipt.json"
          jq -e 'length >= 1' "$RECEIPT_ROOT/signpath-receipt.json" >/dev/null
          SIGNED_SHA256="$(sha256sum "$SIGNED_ROOT/stock-desk-signed-nsis.exe" | cut -d' ' -f1)"
          test "$SIGNED_SHA256" = "$CANDIDATE_SHA256"
          jq -e --arg sha "$SOURCE_SHA" --arg digest "$CANDIDATE_SHA256" \
            --arg request "$SIGNING_REQUEST_ID" \
            '.schema == "stock-desk-signpath-receipt-v1" and
             .status == "signed" and .source_sha == $sha and
             .payload_sha256 == $digest and .request_id == $request and
             (.signer_subject | type == "string" and length > 0) and
             (.certificate_thumbprint | test("^[0-9A-F]{40,64}$")) and
             (.timestamp_subject | type == "string" and length > 0) and
             (keys | sort) == (["certificate_thumbprint", "payload_sha256", "request_id", "schema", "signer_subject", "source_sha", "status", "timestamp_subject"] | sort)' \
            "$SIGNED_ROOT/signpath-receipt.json" >/dev/null
          proof_sha256="$(sha256sum "$PROOF_ROOT/proof.json" | cut -d' ' -f1)"
          jq -e --arg sha "$SOURCE_SHA" --arg tree "$SOURCE_TREE" \
            --arg proof "$proof_sha256" \
            --arg candidate "$CANDIDATE_MANIFEST_SHA256" \
            --arg signed "$CANDIDATE_SHA256" \
            --arg request "$SIGNING_REQUEST_ID" \
            '.schema == "stock-desk-signpath-identity-closure-v1" and
             .status == "signed" and .request_id == $request and
             (.request_sha256 | test("^[0-9a-f]{64}$")) and
             .source == {ref:"refs/heads/main", sha:$sha, tree:$tree} and
             .proof_sha256 == $proof and .candidate_sha256 == $candidate and
             (.artifacts | keys | sort) == (["desktop-host", "sidecar", "nsis-installer"] | sort) and
             .artifacts["nsis-installer"].signed_path == "stock-desk-signed-nsis.exe" and
             .artifacts["nsis-installer"].signed_sha256 == $signed and
             ([.artifacts[] | keys | sort] | all(. == (["equivalence_algorithm", "equivalent_content_sha256", "signed_path", "signed_sha256", "unsigned_path", "unsigned_sha256"] | sort))) and
             .artifacts["desktop-host"].equivalence_algorithm == "pe-authenticode-normalized-sha256-v1" and
             .artifacts.sidecar.equivalence_algorithm == "pe-authenticode-normalized-sha256-v1" and
             .artifacts["nsis-installer"].equivalence_algorithm == "nsis-pe-stub-and-extracted-payload-sha256-v1" and
             ([.artifacts[] | .unsigned_sha256, .signed_sha256, .equivalent_content_sha256] | all(test("^[0-9a-f]{64}$")))' \
            "$SIGNED_ROOT/signpath-identity-closure.json" >/dev/null
          nested="$RUNNER_TEMP/windows-installed-preflight/nested-signed"
          mkdir -p "$nested"
          7z x -y "-o$nested" "$SIGNED_ROOT/stock-desk-signed-nsis.exe" >/dev/null
          mapfile -d '' hosts < <(find "$nested" -type f -name stock-desk-desktop.exe -print0)
          mapfile -d '' sidecars < <(find "$nested" -type f -name stock-desk-sidecar.exe -print0)
          test "${#hosts[@]}" -eq 1
          test "${#sidecars[@]}" -eq 1
          host_sha256="$(sha256sum "${hosts[0]}" | cut -d' ' -f1)"
          sidecar_sha256="$(sha256sum "${sidecars[0]}" | cut -d' ' -f1)"
          jq -e --arg host "$host_sha256" --arg sidecar "$sidecar_sha256" \
            '.artifacts["desktop-host"].signed_sha256 == $host and
             .artifacts.sidecar.signed_sha256 == $sidecar' \
            "$SIGNED_ROOT/signpath-identity-closure.json" >/dev/null
          python scripts/main_validation_proof.py verify \
            --repo-root . --repository "$GITHUB_REPOSITORY" \
            --ref refs/heads/main --proof "$PROOF_ROOT/proof.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from scripts.main_validation_proof import verify_post_gh_attestation_binding

          proof_path = Path(os.environ["PROOF_ROOT"]) / "proof.json"
          proof_bytes = proof_path.read_bytes()
          proof = json.loads(proof_bytes)
          binding = json.loads(
              (Path(os.environ["PROOF_ROOT"]) / "post-gh-verify-binding.json").read_text()
          )
          verify_post_gh_attestation_binding(
              proof,
              proof_bytes=proof_bytes,
              binding_value=binding,
              expected_repository=os.environ["GITHUB_REPOSITORY"],
          )
          if proof["commit_sha"] != os.environ["SOURCE_SHA"]:
              raise SystemExit("main proof source SHA mismatch")
          if proof["tree_sha"] != os.environ["SOURCE_TREE"]:
              raise SystemExit("main proof source tree mismatch")
          PY

      - name: Create signed-only controller input without VM result claims
        shell: bash
        env:
          MAIN_RUN_ID: ${{ steps.main-run.outputs.run_id }}
        run: |
          set -euo pipefail
          rm -rf "$CONTROLLER_ROOT"
          mkdir -p "$CONTROLLER_ROOT/candidate" "$CONTROLLER_ROOT/trust"
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          import shutil

          source = Path(os.environ["SIGNED_ROOT"])
          target = Path(os.environ["CONTROLLER_ROOT"])
          bundle = json.loads(
              (source / "windows-desktop-bundle.json").read_text(encoding="utf-8")
          )
          closure = json.loads(
              (source / "signpath-identity-closure.json").read_text(encoding="utf-8")
          )
          signing_receipt = json.loads(
              (source / "signpath-receipt.json").read_text(encoding="utf-8")
          )
          signed_components = {
              role: closure["artifacts"][role]["signed_sha256"]
              for role in ("desktop-host", "sidecar", "nsis-installer")
          }
          webview_installers = [
              item
              for item in bundle["files"]
              if item["role"] == "webview2-offline-installer"
          ]
          if len(webview_installers) != 1:
              raise SystemExit(
                  "proved candidate must identify exactly one WebView2 installer"
              )
          webview_installer = webview_installers[0]
          installer_source = source / "stock-desk-signed-nsis.exe"
          installer_target = target / "candidate" / installer_source.name
          shutil.copy2(installer_source, installer_target)
          webview_matches = [
              path
              for path in source.rglob(Path(webview_installer["path"]).name)
              if path.is_file()
              and hashlib.sha256(path.read_bytes()).hexdigest()
              == webview_installer["sha256"]
          ]
          if len(webview_matches) != 1:
              raise SystemExit("signed artifact WebView installer identity mismatch")
          webview_source = webview_matches[0]
          webview_target = target / "candidate" / webview_source.name
          shutil.copy2(webview_source, webview_target)
          for name in ("windows-desktop-bundle.json",):
              shutil.copy2(source / name, target / "candidate" / name)
          proof_root = Path(os.environ["PROOF_ROOT"])
          proof_bytes = (proof_root / "proof.json").read_bytes()
          for name in (
              "proof.json",
              "post-gh-verify-binding.json",
              "proof-attestation-bundle.jsonl",
          ):
              shutil.copy2(proof_root / name, target / "trust" / name)
          receipt_root = Path(os.environ["RECEIPT_ROOT"])
          receipt_target = target / "trust" / "receipts"
          receipt_target.mkdir()
          for name in ("main-proof.json", "signed-candidate.json", "signpath-receipt.json"):
              shutil.copy2(receipt_root / name, receipt_target / name)
          for name in (
              "signpath-receipt.json",
              "signpath-identity-closure.json",
              "signpath-attestation-bundle.jsonl",
          ):
              shutil.copy2(source / name, target / "trust" / name)
          for reviewed in (
              "scripts/windows_installed_guest_harness.ps1",
              "scripts/windows_desktop_uia_driver.ps1",
              "config/windows-vm-broker-public-key.pem",
          ):
              source_path = Path(reviewed)
              reviewed_target = target / "reviewed" / source_path.name
              reviewed_target.parent.mkdir(exist_ok=True)
              shutil.copy2(source_path, reviewed_target)
          request = {
              "schema": "stock-desk-windows-installed-controller-request-v2",
              "source_sha": os.environ["SOURCE_SHA"],
              "tree_sha": os.environ["SOURCE_TREE"],
              "main_run_id": int(os.environ["MAIN_RUN_ID"]),
              "evidence_kind": "observed-windows-vm",
              "status": "authorized",
              "raw_only": True,
              "case_ids": [
                  *[f"win10-22h2-dpi-{dpi}" for dpi in (100, 125, 150, 175, 200)],
                  *[f"win11-dpi-{dpi}" for dpi in (100, 125, 150, 175, 200)],
                  "win10-22h2-dpi-100-webview-offline",
              ],
              "main_proof_sha256": hashlib.sha256(proof_bytes).hexdigest(),
              "candidate_manifest_sha256": os.environ["CANDIDATE_MANIFEST_SHA256"],
              "candidate_sha256": os.environ["CANDIDATE_SHA256"],
              "signpath_request_id": os.environ["SIGNING_REQUEST_ID"],
              "candidate_kind": "signed",
              "webview_installer_sha256": webview_installer["sha256"],
              "smartscreen_evidence": {
                  "schema": "stock-desk-smartscreen-evidence-policy-v1",
                  "required": True,
                  "delivery_method": "https-internet-download",
                  "launch_api": "ShellExecuteExW",
                  "required_disposition": "allowed-no-warning",
              },
              "signed_components": signed_components,
              "authenticode_expectation": {
                  "signer_subject": signing_receipt["signer_subject"],
                  "certificate_thumbprint": signing_receipt["certificate_thumbprint"],
                  "timestamp_subject": signing_receipt["timestamp_subject"],
              },
              "guest_harness_sha256": hashlib.sha256(
                  (target / "reviewed" / "windows_installed_guest_harness.ps1").read_bytes()
              ).hexdigest(),
              "uia_driver_sha256": hashlib.sha256(
                  (target / "reviewed" / "windows_desktop_uia_driver.ps1").read_bytes()
              ).hexdigest(),
              "broker_public_key_sha256": hashlib.sha256(
                  (target / "reviewed" / "windows-vm-broker-public-key.pem").read_bytes()
              ).hexdigest(),
              "installer": {
                  "path": f"candidate/{installer_target.name}",
                  "sha256": os.environ["CANDIDATE_SHA256"],
                  "size": installer_target.stat().st_size,
              },
          }
          (target / "controller-request.json").write_text(
              json.dumps(request, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          if hashlib.sha256(installer_target.read_bytes()).hexdigest() != os.environ["CANDIDATE_SHA256"]:
              raise SystemExit("controller installer digest mismatch")
          if hashlib.sha256(webview_target.read_bytes()).hexdigest() != webview_installer["sha256"]:
              raise SystemExit("controller WebView installer digest mismatch")
          PY
          (
            cd "$CONTROLLER_ROOT"
            find . -type f ! -name controller-digests.sha256 -print0 \
              | sort -z | xargs -0 sha256sum > controller-digests.sha256
          )
          test -s "$CONTROLLER_ROOT/controller-request.json"
          test -s "$CONTROLLER_ROOT/controller-digests.sha256"

      - name: Upload verified controller input
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-installed-controller-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-controller/
          if-no-files-found: error
          retention-days: 7

  windows-installed:
    name: Real VM ${{ matrix.case_id }} first attempt
    needs: preflight
    environment: windows-installed-acceptance
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 11
      matrix:
        include:
          - { case_id: win10-22h2-dpi-100, guest_profile: win10-22h2, scenario: installed-first-use, dpi: 100 }
          - { case_id: win10-22h2-dpi-125, guest_profile: win10-22h2, scenario: installed-first-use, dpi: 125 }
          - { case_id: win10-22h2-dpi-150, guest_profile: win10-22h2, scenario: installed-first-use, dpi: 150 }
          - { case_id: win10-22h2-dpi-175, guest_profile: win10-22h2, scenario: installed-first-use, dpi: 175 }
          - { case_id: win10-22h2-dpi-200, guest_profile: win10-22h2, scenario: installed-first-use, dpi: 200 }
          - { case_id: win11-dpi-100, guest_profile: win11, scenario: installed-first-use, dpi: 100 }
          - { case_id: win11-dpi-125, guest_profile: win11, scenario: installed-first-use, dpi: 125 }
          - { case_id: win11-dpi-150, guest_profile: win11, scenario: installed-first-use, dpi: 150 }
          - { case_id: win11-dpi-175, guest_profile: win11, scenario: installed-first-use, dpi: 175 }
          - { case_id: win11-dpi-200, guest_profile: win11, scenario: installed-first-use, dpi: 200 }
          - { case_id: win10-22h2-dpi-100-webview-offline, guest_profile: win10-22h2, scenario: webview-install-failure, dpi: 100 }
    env:
      SOURCE_SHA: ${{ inputs.source_sha }}
      CASE_ID: ${{ matrix.case_id }}
      WINDOWS_VM_BROKER_ENDPOINT: ${{ secrets.WINDOWS_VM_BROKER_ENDPOINT }}
      APPROVED_SNAPSHOT_POLICY_SHA256: ${{ secrets.WINDOWS_VM_SNAPSHOT_POLICY_SHA256 }}
      APPROVED_ADAPTER_SHA256: ${{ secrets.WINDOWS_VM_ADAPTER_SHA256 }}
    steps:
      - name: Assert protected GitHub-hosted OIDC boundary
        shell: bash
        run: |
          set -euo pipefail
          test "$RUNNER_ENVIRONMENT" = github-hosted
          test "$GITHUB_RUN_ATTEMPT" = 1
          test "$GITHUB_REF" = refs/heads/main
          test "$GITHUB_SHA" = "$SOURCE_SHA"
          test -n "$WINDOWS_VM_BROKER_ENDPOINT"
          [[ "$APPROVED_SNAPSHOT_POLICY_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$APPROVED_ADAPTER_SHA256" =~ ^[0-9a-f]{64}$ ]]

      - name: Check out exact broker client and reviewed harnesses
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ inputs.source_sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Download exact proved controller bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-installed-controller-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-controller

      - name: Validate closed controller bytes and call the OIDC broker
        shell: bash
        run: |
          set -euo pipefail
          controller="$RUNNER_TEMP/windows-installed-controller"
          output="$RUNNER_TEMP/windows-installed-raw-$CASE_ID"
          request="$controller/controller-request.json"
          test -s "$request"
          jq -e --arg sha "$SOURCE_SHA" --arg case "$CASE_ID" \
            '.schema == "stock-desk-windows-installed-controller-request-v2" and .source_sha == $sha and .status == "authorized" and .raw_only == true and (.case_ids | index($case) != null)' \
            "$request" >/dev/null
          (cd "$controller" && sha256sum --check --strict controller-digests.sha256)
          tree="$(git rev-parse 'HEAD^{tree}')"
          workflow_sha256="$(sha256sum .github/workflows/windows-installed.yml | cut -d' ' -f1)"
          guest_sha256="$(sha256sum scripts/windows_installed_guest_harness.ps1 | cut -d' ' -f1)"
          uia_sha256="$(sha256sum scripts/windows_desktop_uia_driver.ps1 | cut -d' ' -f1)"
          python scripts/windows_vm_broker_client.py \
            --endpoint "$WINDOWS_VM_BROKER_ENDPOINT" \
            --controller-root "$controller" --output-root "$output" \
            --case-id "$CASE_ID" --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --snapshot-policy-sha256 "$APPROVED_SNAPSHOT_POLICY_SHA256" \
            --adapter-sha256 "$APPROVED_ADAPTER_SHA256" \
            --guest-harness-sha256 "$guest_sha256" --uia-driver-sha256 "$uia_sha256" \
            --workflow-sha256 "$workflow_sha256" --run-id "$GITHUB_RUN_ID" \
            --job-id "windows-installed-$CASE_ID"
          test -s "$output/raw-manifest.json"
          test -s "$output/controller/lifecycle-receipt.json"
          test -s "$output/controller/lifecycle-receipt.sig"
          test -s "$output/controller/snapshot-policy.json"
          ! grep -R -E '"passed"[[:space:]]*:|"status"[[:space:]]*:[[:space:]]*"(accepted|verified|passed)"' "$output/raw-manifest.json" "$output/raw"

      - name: Upload raw-only external VM package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-installed-raw-${{ matrix.case_id }}-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-raw-${{ matrix.case_id }}/
          if-no-files-found: error
          retention-days: 30

  aggregate:
    name: Derive exact-SHA Windows desktop acceptance
    needs: [preflight, windows-installed]
    if: ${{ needs.preflight.result == 'success' && needs.windows-installed.result == 'success' }}
    environment: windows-installed-acceptance
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    env:
      SOURCE_SHA: ${{ inputs.source_sha }}
      CANDIDATE_SHA256: ${{ inputs.candidate_sha256 }}
      APPROVED_SNAPSHOT_POLICY_SHA256: ${{ secrets.WINDOWS_VM_SNAPSHOT_POLICY_SHA256 }}
      APPROVED_ADAPTER_SHA256: ${{ secrets.WINDOWS_VM_ADAPTER_SHA256 }}
    steps:
      - name: Check out exact verifier source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ inputs.source_sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up locked Python dependency resolver
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - name: Install locked verifier dependencies
        shell: bash
        run: |
          set -euo pipefail
          uv sync --frozen

      - name: Download exact controller identity
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-installed-controller-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-aggregate/controller

      - name: Download all raw first-attempt packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: windows-installed-raw-*-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-aggregate/raw
          merge-multiple: false

      - name: Verify raw bytes, signed broker receipts, and exact 11-case matrix
        shell: bash
        run: |
          set -euo pipefail
          controller="$RUNNER_TEMP/windows-installed-aggregate/controller"
          raw="$RUNNER_TEMP/windows-installed-aggregate/raw"
          output="$RUNNER_TEMP/windows-installed-aggregate/derived"
          request="$controller/controller-request.json"
          tree="$(git rev-parse 'HEAD^{tree}')"
          workflow_sha256="$(sha256sum .github/workflows/windows-installed.yml | cut -d' ' -f1)"
          broker_key_sha256="$(sha256sum config/windows-vm-broker-public-key.pem | cut -d' ' -f1)"
          guest_harness_sha256="$(sha256sum scripts/windows_installed_guest_harness.ps1 | cut -d' ' -f1)"
          uia_driver_sha256="$(sha256sum scripts/windows_desktop_uia_driver.ps1 | cut -d' ' -f1)"
          controller_request_sha256="$(sha256sum "$request" | cut -d' ' -f1)"
          [[ "$APPROVED_SNAPSHOT_POLICY_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$APPROVED_ADAPTER_SHA256" =~ ^[0-9a-f]{64}$ ]]
          mapfile -d '' packages < <(find "$raw" -type f -name raw-manifest.json -printf '%h\0' | sort -zu)
          test "${#packages[@]}" -eq 11
          policy="${packages[0]}/controller/snapshot-policy.json"
          MAIN_PROOF_SHA256="$(jq -er '.main_proof_sha256 | select(test("^[0-9a-f]{64}$"))' "$request")"
          CANDIDATE_SHA256="$(jq -er '.candidate_sha256 | select(test("^[0-9a-f]{64}$"))' "$request")"
          WEBVIEW_INSTALLER_SHA256="$(jq -er '.webview_installer_sha256 | select(test("^[0-9a-f]{64}$"))' "$request")"
          DESKTOP_HOST_SHA256="$(jq -er '.signed_components["desktop-host"] | select(test("^[0-9a-f]{64}$"))' "$request")"
          SIDECAR_SHA256="$(jq -er '.signed_components.sidecar | select(test("^[0-9a-f]{64}$"))' "$request")"
          SIGNER_SUBJECT="$(jq -er '.authenticode_expectation.signer_subject | select(type == "string" and length > 0)' "$request")"
          CERTIFICATE_THUMBPRINT="$(jq -er '.authenticode_expectation.certificate_thumbprint | select(test("^[0-9A-F]{40,64}$"))' "$request")"
          TIMESTAMP_SUBJECT="$(jq -er '.authenticode_expectation.timestamp_subject | select(type == "string" and length > 0)' "$request")"
          test "$(sha256sum "$policy" | cut -d' ' -f1)" = "$APPROVED_SNAPSHOT_POLICY_SHA256"
          uv run --frozen python scripts/verify_windows_desktop_raw_evidence.py \
            --policy "$policy" --output-root "$output" \
            --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --main-proof-sha256 "$MAIN_PROOF_SHA256" \
            --candidate-sha256 "$CANDIDATE_SHA256" \
            --desktop-host-sha256 "$DESKTOP_HOST_SHA256" \
            --sidecar-sha256 "$SIDECAR_SHA256" \
            --signer-subject "$SIGNER_SUBJECT" \
            --certificate-thumbprint "$CERTIFICATE_THUMBPRINT" \
            --timestamp-subject "$TIMESTAMP_SUBJECT" \
            --webview-installer-sha256 "$WEBVIEW_INSTALLER_SHA256" \
            --snapshot-policy-sha256 "$APPROVED_SNAPSHOT_POLICY_SHA256" \
            --adapter-sha256 "$APPROVED_ADAPTER_SHA256" \
            --controller-request-sha256 "$controller_request_sha256" \
            --guest-harness-sha256 "$guest_harness_sha256" \
            --uia-driver-sha256 "$uia_driver_sha256" \
            --broker-public-key config/windows-vm-broker-public-key.pem \
            --broker-public-key-sha256 "$broker_key_sha256" \
            --repository "$GITHUB_REPOSITORY" --workflow "$GITHUB_WORKFLOW" \
            --workflow-ref "$GITHUB_WORKFLOW_REF" --workflow-sha256 "$workflow_sha256" \
            --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT" \
            "${packages[@]}"
          test "$(jq -r .status "$output/acceptance-receipt.json")" = accepted
          test -s "$output/windows-10-trust-receipt.json"
          test -s "$output/windows-11-trust-receipt.json"

      - name: Upload derived evidence and receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-installed-acceptance-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-aggregate/derived/
          if-no-files-found: error
          retention-days: 90

  attest:
    name: Attest verifier-derived Windows desktop acceptance
    needs: aggregate
    if: ${{ needs.aggregate.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    outputs:
      acceptance_artifact_name: ${{ steps.closed.outputs.artifact_name }}
      acceptance_sha256: ${{ steps.closed.outputs.acceptance_sha256 }}
    steps:
      - name: Download verifier-derived exact-SHA acceptance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-installed-acceptance-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-attest

      - name: Recheck the immutable acceptance subject
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          receipt="$RUNNER_TEMP/windows-installed-attest/acceptance-receipt.json"
          test -f "$receipt"
          test "$(jq -er '.status' "$receipt")" = accepted
          test "$(jq -er '.source_sha' "$receipt")" = "$SOURCE_SHA"
          for platform_receipt in \
            windows-10-trust-receipt.json windows-11-trust-receipt.json
          do
            if test "$platform_receipt" = windows-10-trust-receipt.json; then
              expected_platform=windows_10_22h2_x64
              expected_cases=6
            else
              expected_platform=windows_11_x64
              expected_cases=5
            fi
            test -s "$RUNNER_TEMP/windows-installed-attest/$platform_receipt"
            jq -e --arg sha "$SOURCE_SHA" --arg digest "${{ inputs.candidate_sha256 }}" \
              --arg platform "$expected_platform" --argjson cases "$expected_cases" \
              '.schema == "stock-desk-windows-trust-receipt-v1" and
               .source_sha == $sha and .payload_sha256 == $digest and
               .platform == $platform and
               .verifier == "WinVerifyTrust" and
               .authenticode_status == "Valid" and
               .standard_user_install == "passed" and
               .smartscreen_status == "allowed-no-warning" and
               .smartscreen_observer == "external-protected-vm-observer" and
               (.smartscreen_case_receipts | length) == $cases and
               ([.smartscreen_case_receipts[] |
                 (.observation_sha256 | test("^[0-9a-f]{64}$")) and
                 (.motw_sha256 | test("^[0-9a-f]{64}$")) and
                 (.evidence_sha256 | test("^[0-9a-f]{64}$"))] | all)' \
              "$RUNNER_TEMP/windows-installed-attest/$platform_receipt" >/dev/null
          done

      - name: Attest the verifier-derived exact-SHA acceptance receipt
        id: attest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            ${{ runner.temp }}/windows-installed-attest/acceptance-receipt.json
            ${{ runner.temp }}/windows-installed-attest/windows-10-trust-receipt.json
            ${{ runner.temp }}/windows-installed-attest/windows-11-trust-receipt.json

      - name: Close and upload platform trust evidence
        id: closed
        shell: bash
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/windows-installed-attest"
          test -s "$BUNDLE_PATH"
          cp "$BUNDLE_PATH" "$root/windows-trust-attestation.jsonl"
          (
            cd "$root"
            find . -maxdepth 1 -type f ! -name windows-trust-digests.sha256 \
              -printf '%f\0' | sort -z | xargs -0 sha256sum \
              > windows-trust-digests.sha256
          )
          acceptance_sha256="$(sha256sum "$root/windows-trust-digests.sha256" | cut -d' ' -f1)"
          artifact_name="windows-installed-trust-$SOURCE_SHA"
          echo "acceptance_sha256=$acceptance_sha256" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload closed Windows platform trust evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-installed-trust-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-attest/
          if-no-files-found: error
          retention-days: 90
