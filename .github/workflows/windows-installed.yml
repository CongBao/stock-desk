# Real installed-Windows acceptance. GitHub-hosted jobs authenticate to an
# external ephemeral-VM broker with a fixed-audience OIDC token. The broker and
# guest publish raw bytes only; a GitHub-hosted exact-source verifier derives
# the sole acceptance receipt after all 11 first-attempt cases are present.
name: Windows installed VM acceptance

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact lowercase 40-hex main commit SHA to verify
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: windows-installed-${{ inputs.source_sha }}
  cancel-in-progress: false

jobs:
  dispatch-guard:
    name: Reject untrusted dispatch identity before protected jobs
    runs-on: ubuntu-24.04
    environment: windows-installed-acceptance
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    env:
      SOURCE_SHA: ${{ inputs.source_sha }}
      EXPECTED_WORKFLOW_REF: ${{ format('{0}/.github/workflows/windows-installed.yml@refs/heads/main', github.repository) }}
    steps:
      - name: Reject every non-main or mutable workflow dispatch
        shell: bash
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$GITHUB_REF" = "refs/heads/main"
          test "$GITHUB_REF_TYPE" = "branch"
          test "$GITHUB_REF_NAME" = "main"
          test "$GITHUB_REF_PROTECTED" = "true"
          test "$GITHUB_SHA" = "$SOURCE_SHA"
          test "$GITHUB_WORKFLOW_REF" = "$EXPECTED_WORKFLOW_REF"
          test "$GITHUB_WORKFLOW_SHA" = "$SOURCE_SHA"
          test "$GITHUB_RUN_ATTEMPT" = "1"

      - name: Check out the immutable guarded workflow source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.source_sha }}

      - name: Prove exact protected main and environment branch policy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          POLICY_TOKEN: ${{ secrets.WINDOWS_INSTALLED_POLICY_TOKEN }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/protected-main
          test "$(git rev-parse refs/remotes/origin/protected-main)" = "$SOURCE_SHA"
          branch="$RUNNER_TEMP/windows-installed-main-branch.json"
          environment="$RUNNER_TEMP/windows-installed-environment.json"
          branch_policies="$RUNNER_TEMP/windows-installed-environment-branches.json"
          runners="$RUNNER_TEMP/windows-installed-repository-runners.json"
          gh api "repos/$GITHUB_REPOSITORY/branches/main" > "$branch"
          jq -e --arg sha "$SOURCE_SHA" \
            '.name == "main" and .protected == true and .commit.sha == $sha' \
            "$branch" >/dev/null
          GH_TOKEN="$POLICY_TOKEN" gh api \
            "repos/$GITHUB_REPOSITORY/environments/windows-installed-acceptance" \
            > "$environment"
          GH_TOKEN="$POLICY_TOKEN" gh api \
            "repos/$GITHUB_REPOSITORY/environments/windows-installed-acceptance/deployment-branch-policies" \
            > "$branch_policies"
          GH_TOKEN="$POLICY_TOKEN" gh api \
            "repos/$GITHUB_REPOSITORY/actions/runners" > "$runners"
          python scripts/windows_installed_environment_policy.py verify \
            "$environment" --branch-policies "$branch_policies" \
            --runners "$runners" --repository "$GITHUB_REPOSITORY"

  preflight:
    name: Verify exact protected-main Windows candidate
    needs: dispatch-guard
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    env:
      SOURCE_SHA: ${{ inputs.source_sha }}
    steps:
      - name: Reject non-canonical source identity
        shell: bash
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$GITHUB_RUN_ATTEMPT" = "1"
          echo "PROOF_ROOT=$RUNNER_TEMP/windows-installed-preflight/proof" >> "$GITHUB_ENV"
          echo "CANDIDATE_ROOT=$RUNNER_TEMP/windows-installed-preflight/candidate" >> "$GITHUB_ENV"
          echo "CONTROLLER_ROOT=$RUNNER_TEMP/windows-installed-controller" >> "$GITHUB_ENV"
          echo "RECEIPT_ROOT=$RUNNER_TEMP/windows-installed-preflight/receipts" >> "$GITHUB_ENV"

      - name: Check out the exact requested source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.source_sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Prove the commit belongs to protected main
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          branch="$(gh api "repos/$GITHUB_REPOSITORY/branches/main")"
          jq -e --arg sha "$SOURCE_SHA" \
            '.name == "main" and .protected == true and .commit.sha == $sha' \
            <<<"$branch" >/dev/null
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/protected-main
          test "$(git rev-parse refs/remotes/origin/protected-main)" = "$SOURCE_SHA"

      - name: Locate successful exact-SHA main validation run
        id: main-run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(gh api --method GET "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" -f branch=main -f event=push -f status=success -f per_page=100)"
          run_id="$(jq -r --arg sha "$SOURCE_SHA" '[.workflow_runs[] | select(.head_sha == $sha and .head_branch == "main" and .event == "push" and .status == "completed" and .conclusion == "success")] | sort_by(.run_attempt, .id) | last | .id // empty' <<<"$payload")"
          test -n "$run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download exact proof and promoted Windows candidate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MAIN_RUN_ID: ${{ steps.main-run.outputs.run_id }}
        run: |
          set -euo pipefail
          mkdir -p "$PROOF_ROOT" "$CANDIDATE_ROOT"
          gh run download "$MAIN_RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --name "main-validation-proof-$SOURCE_SHA" --dir "$PROOF_ROOT"
          gh run download "$MAIN_RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --name "windows-desktop-alpha-candidate-$SOURCE_SHA" \
            --dir "$CANDIDATE_ROOT"
          for path in \
            "$PROOF_ROOT/proof.json" \
            "$PROOF_ROOT/post-gh-verify-binding.json" \
            "$PROOF_ROOT/proof-attestation-bundle.jsonl" \
            "$PROOF_ROOT/evidence-attestation-bundle.jsonl" \
            "$CANDIDATE_ROOT/windows-desktop-alpha-candidate-manifest.json" \
            "$CANDIDATE_ROOT/manifest-binding.json"
          do
            test -s "$path"
          done

      - name: Verify proof attestations, manifest, payload, and digests
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tree="$(git rev-parse 'HEAD^{tree}')"
          mkdir -p "$RECEIPT_ROOT"
          gh attestation verify "$PROOF_ROOT/proof.json" \
            --bundle "$PROOF_ROOT/proof-attestation-bundle.jsonl" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/ci.yml" \
            --source-ref refs/heads/main --source-digest "$SOURCE_SHA" \
            --signer-digest "$SOURCE_SHA" --deny-self-hosted-runners \
            --format json > "$RECEIPT_ROOT/main-proof.json"
          jq -e 'length >= 1' "$RECEIPT_ROOT/main-proof.json" >/dev/null
          gh attestation verify \
            "$CANDIDATE_ROOT/windows-desktop-alpha-candidate-manifest.json" \
            --bundle "$PROOF_ROOT/evidence-attestation-bundle.jsonl" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/ci.yml" \
            --source-ref refs/heads/main --source-digest "$SOURCE_SHA" \
            --signer-digest "$SOURCE_SHA" --deny-self-hosted-runners \
            --format json > "$RECEIPT_ROOT/windows-candidate.json"
          jq -e 'length >= 1' "$RECEIPT_ROOT/windows-candidate.json" >/dev/null
          python scripts/main_validation_proof.py verify \
            --repo-root . --repository "$GITHUB_REPOSITORY" \
            --ref refs/heads/main --proof "$PROOF_ROOT/proof.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from scripts.main_validation_proof import verify_post_gh_attestation_binding

          proof_path = Path(os.environ["PROOF_ROOT"]) / "proof.json"
          proof_bytes = proof_path.read_bytes()
          proof = json.loads(proof_bytes)
          binding = json.loads(
              (Path(os.environ["PROOF_ROOT"]) / "post-gh-verify-binding.json").read_text()
          )
          candidate = json.loads(
              (
                  Path(os.environ["CANDIDATE_ROOT"])
                  / "windows-desktop-alpha-candidate-manifest.json"
              ).read_text()
          )
          verify_post_gh_attestation_binding(
              proof,
              proof_bytes=proof_bytes,
              binding_value=binding,
              expected_repository=os.environ["GITHUB_REPOSITORY"],
          )
          if proof["commit_sha"] != os.environ["SOURCE_SHA"]:
              raise SystemExit("main proof source SHA mismatch")
          if proof["validation_evidence"]["windows-desktop-alpha-candidate-manifest"] != candidate:
              raise SystemExit("promoted candidate manifest is not the proved manifest")
          PY
          python scripts/artifact_manifest.py verify \
            --manifest "$CANDIDATE_ROOT/windows-desktop-alpha-candidate-manifest.json" \
            --root "$CANDIDATE_ROOT" --source-sha "$SOURCE_SHA" \
            --source-tree "$tree" \
            --attestation "$CANDIDATE_ROOT/manifest-binding.json"

      - name: Create verified controller input without VM result claims
        shell: bash
        env:
          MAIN_RUN_ID: ${{ steps.main-run.outputs.run_id }}
        run: |
          set -euo pipefail
          rm -rf "$CONTROLLER_ROOT"
          mkdir -p "$CONTROLLER_ROOT/candidate" "$CONTROLLER_ROOT/trust"
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          import shutil

          source = Path(os.environ["CANDIDATE_ROOT"])
          target = Path(os.environ["CONTROLLER_ROOT"])
          manifest_path = source / "windows-desktop-alpha-candidate-manifest.json"
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          bundle = json.loads(
              (source / "windows-desktop-bundle.json").read_text(encoding="utf-8")
          )
          installers = [
              item
              for item in manifest["payloads"]
              if item["kind"] == "tauri-unsigned"
              and item["path"].endswith("-unsigned-x64-setup.exe")
          ]
          if len(installers) != 1:
              raise SystemExit("proved candidate must contain exactly one installer")
          webview_installers = [
              item
              for item in bundle["files"]
              if item["role"] == "webview2-offline-installer"
          ]
          if len(webview_installers) != 1:
              raise SystemExit(
                  "proved candidate must identify exactly one WebView2 installer"
              )
          installer = installers[0]
          webview_installer = webview_installers[0]
          installer_source = source / installer["path"]
          installer_target = target / "candidate" / installer_source.name
          shutil.copy2(installer_source, installer_target)
          for name in (
              "windows-desktop-alpha-candidate-manifest.json",
              "manifest-binding.json",
              "windows-desktop-bundle.json",
          ):
              shutil.copy2(source / name, target / "candidate" / name)
          proof_root = Path(os.environ["PROOF_ROOT"])
          proof_bytes = (proof_root / "proof.json").read_bytes()
          for name in (
              "proof.json",
              "post-gh-verify-binding.json",
              "proof-attestation-bundle.jsonl",
              "evidence-attestation-bundle.jsonl",
          ):
              shutil.copy2(proof_root / name, target / "trust" / name)
          receipt_root = Path(os.environ["RECEIPT_ROOT"])
          receipt_target = target / "trust" / "receipts"
          receipt_target.mkdir()
          for name in ("main-proof.json", "windows-candidate.json"):
              shutil.copy2(receipt_root / name, receipt_target / name)
          for reviewed in (
              "scripts/windows_installed_guest_harness.ps1",
              "scripts/windows_desktop_uia_driver.ps1",
              "config/windows-vm-broker-public-key.pem",
          ):
              source_path = Path(reviewed)
              reviewed_target = target / "reviewed" / source_path.name
              reviewed_target.parent.mkdir(exist_ok=True)
              shutil.copy2(source_path, reviewed_target)
          request = {
              "schema": "stock-desk-windows-installed-controller-request-v2",
              "source_sha": os.environ["SOURCE_SHA"],
              "tree_sha": manifest["source_tree"],
              "main_run_id": int(os.environ["MAIN_RUN_ID"]),
              "evidence_kind": "observed-windows-vm",
              "status": "authorized",
              "raw_only": True,
              "case_ids": [
                  *[f"win10-22h2-dpi-{dpi}" for dpi in (100, 125, 150, 175, 200)],
                  *[f"win11-dpi-{dpi}" for dpi in (100, 125, 150, 175, 200)],
                  "win10-22h2-dpi-100-webview-offline",
              ],
              "candidate_manifest_sha256": manifest["manifest_sha256"],
              "main_proof_sha256": hashlib.sha256(proof_bytes).hexdigest(),
              "candidate_sha256": installer["sha256"],
              "webview_installer_sha256": webview_installer["sha256"],
              "guest_harness_sha256": hashlib.sha256(
                  (target / "reviewed" / "windows_installed_guest_harness.ps1").read_bytes()
              ).hexdigest(),
              "uia_driver_sha256": hashlib.sha256(
                  (target / "reviewed" / "windows_desktop_uia_driver.ps1").read_bytes()
              ).hexdigest(),
              "broker_public_key_sha256": hashlib.sha256(
                  (target / "reviewed" / "windows-vm-broker-public-key.pem").read_bytes()
              ).hexdigest(),
              "installer": {
                  "path": f"candidate/{installer_target.name}",
                  "sha256": installer["sha256"],
                  "size": installer["size"],
              },
          }
          (target / "controller-request.json").write_text(
              json.dumps(request, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          if hashlib.sha256(installer_target.read_bytes()).hexdigest() != installer["sha256"]:
              raise SystemExit("controller installer digest mismatch")
          PY
          (
            cd "$CONTROLLER_ROOT"
            find . -type f ! -name controller-digests.sha256 -print0 \
              | sort -z | xargs -0 sha256sum > controller-digests.sha256
          )
          test -s "$CONTROLLER_ROOT/controller-request.json"
          test -s "$CONTROLLER_ROOT/controller-digests.sha256"

      - name: Upload verified controller input
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-installed-controller-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-controller/
          if-no-files-found: error
          retention-days: 7

  windows-installed:
    name: Real VM ${{ matrix.case_id }} first attempt
    needs: preflight
    environment: windows-installed-acceptance
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 11
      matrix:
        include:
          - { case_id: win10-22h2-dpi-100, guest_profile: win10-22h2, scenario: installed-first-use, dpi: 100 }
          - { case_id: win10-22h2-dpi-125, guest_profile: win10-22h2, scenario: installed-first-use, dpi: 125 }
          - { case_id: win10-22h2-dpi-150, guest_profile: win10-22h2, scenario: installed-first-use, dpi: 150 }
          - { case_id: win10-22h2-dpi-175, guest_profile: win10-22h2, scenario: installed-first-use, dpi: 175 }
          - { case_id: win10-22h2-dpi-200, guest_profile: win10-22h2, scenario: installed-first-use, dpi: 200 }
          - { case_id: win11-dpi-100, guest_profile: win11, scenario: installed-first-use, dpi: 100 }
          - { case_id: win11-dpi-125, guest_profile: win11, scenario: installed-first-use, dpi: 125 }
          - { case_id: win11-dpi-150, guest_profile: win11, scenario: installed-first-use, dpi: 150 }
          - { case_id: win11-dpi-175, guest_profile: win11, scenario: installed-first-use, dpi: 175 }
          - { case_id: win11-dpi-200, guest_profile: win11, scenario: installed-first-use, dpi: 200 }
          - { case_id: win10-22h2-dpi-100-webview-offline, guest_profile: win10-22h2, scenario: webview-install-failure, dpi: 100 }
    env:
      SOURCE_SHA: ${{ inputs.source_sha }}
      CASE_ID: ${{ matrix.case_id }}
      WINDOWS_VM_BROKER_ENDPOINT: ${{ secrets.WINDOWS_VM_BROKER_ENDPOINT }}
      APPROVED_SNAPSHOT_POLICY_SHA256: ${{ secrets.WINDOWS_VM_SNAPSHOT_POLICY_SHA256 }}
      APPROVED_ADAPTER_SHA256: ${{ secrets.WINDOWS_VM_ADAPTER_SHA256 }}
    steps:
      - name: Assert protected GitHub-hosted OIDC boundary
        shell: bash
        run: |
          set -euo pipefail
          test "$RUNNER_ENVIRONMENT" = github-hosted
          test "$GITHUB_RUN_ATTEMPT" = 1
          test "$GITHUB_REF" = refs/heads/main
          test "$GITHUB_SHA" = "$SOURCE_SHA"
          test -n "$WINDOWS_VM_BROKER_ENDPOINT"
          [[ "$APPROVED_SNAPSHOT_POLICY_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$APPROVED_ADAPTER_SHA256" =~ ^[0-9a-f]{64}$ ]]

      - name: Check out exact broker client and reviewed harnesses
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ inputs.source_sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Download exact proved controller bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-installed-controller-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-controller

      - name: Validate closed controller bytes and call the OIDC broker
        shell: bash
        run: |
          set -euo pipefail
          controller="$RUNNER_TEMP/windows-installed-controller"
          output="$RUNNER_TEMP/windows-installed-raw-$CASE_ID"
          request="$controller/controller-request.json"
          test -s "$request"
          jq -e --arg sha "$SOURCE_SHA" --arg case "$CASE_ID" \
            '.schema == "stock-desk-windows-installed-controller-request-v2" and .source_sha == $sha and .status == "authorized" and .raw_only == true and (.case_ids | index($case) != null)' \
            "$request" >/dev/null
          (cd "$controller" && sha256sum --check --strict controller-digests.sha256)
          tree="$(git rev-parse 'HEAD^{tree}')"
          workflow_sha256="$(sha256sum .github/workflows/windows-installed.yml | cut -d' ' -f1)"
          guest_sha256="$(sha256sum scripts/windows_installed_guest_harness.ps1 | cut -d' ' -f1)"
          uia_sha256="$(sha256sum scripts/windows_desktop_uia_driver.ps1 | cut -d' ' -f1)"
          python scripts/windows_vm_broker_client.py \
            --endpoint "$WINDOWS_VM_BROKER_ENDPOINT" \
            --controller-root "$controller" --output-root "$output" \
            --case-id "$CASE_ID" --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --snapshot-policy-sha256 "$APPROVED_SNAPSHOT_POLICY_SHA256" \
            --adapter-sha256 "$APPROVED_ADAPTER_SHA256" \
            --guest-harness-sha256 "$guest_sha256" --uia-driver-sha256 "$uia_sha256" \
            --workflow-sha256 "$workflow_sha256" --run-id "$GITHUB_RUN_ID" \
            --job-id "windows-installed-$CASE_ID"
          test -s "$output/raw-manifest.json"
          test -s "$output/controller/lifecycle-receipt.json"
          test -s "$output/controller/lifecycle-receipt.sig"
          test -s "$output/controller/snapshot-policy.json"
          ! grep -R -E '"passed"[[:space:]]*:|"status"[[:space:]]*:[[:space:]]*"(accepted|verified|passed)"' "$output/raw-manifest.json" "$output/raw"

      - name: Upload raw-only external VM package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-installed-raw-${{ matrix.case_id }}-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-raw-${{ matrix.case_id }}/
          if-no-files-found: error
          retention-days: 30

  aggregate:
    name: Derive exact-SHA Windows desktop acceptance
    needs: [preflight, windows-installed]
    if: ${{ needs.preflight.result == 'success' && needs.windows-installed.result == 'success' }}
    environment: windows-installed-acceptance
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    env:
      SOURCE_SHA: ${{ inputs.source_sha }}
      APPROVED_SNAPSHOT_POLICY_SHA256: ${{ secrets.WINDOWS_VM_SNAPSHOT_POLICY_SHA256 }}
      APPROVED_ADAPTER_SHA256: ${{ secrets.WINDOWS_VM_ADAPTER_SHA256 }}
    steps:
      - name: Check out exact verifier source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ inputs.source_sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up locked Python dependency resolver
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - name: Install locked verifier dependencies
        shell: bash
        run: |
          set -euo pipefail
          uv sync --frozen

      - name: Download exact controller identity
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-installed-controller-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-aggregate/controller

      - name: Download all raw first-attempt packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: windows-installed-raw-*-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-aggregate/raw
          merge-multiple: false

      - name: Verify raw bytes, signed broker receipts, and exact 11-case matrix
        shell: bash
        run: |
          set -euo pipefail
          controller="$RUNNER_TEMP/windows-installed-aggregate/controller"
          raw="$RUNNER_TEMP/windows-installed-aggregate/raw"
          output="$RUNNER_TEMP/windows-installed-aggregate/derived"
          request="$controller/controller-request.json"
          tree="$(git rev-parse 'HEAD^{tree}')"
          workflow_sha256="$(sha256sum .github/workflows/windows-installed.yml | cut -d' ' -f1)"
          broker_key_sha256="$(sha256sum config/windows-vm-broker-public-key.pem | cut -d' ' -f1)"
          guest_harness_sha256="$(sha256sum scripts/windows_installed_guest_harness.ps1 | cut -d' ' -f1)"
          uia_driver_sha256="$(sha256sum scripts/windows_desktop_uia_driver.ps1 | cut -d' ' -f1)"
          controller_request_sha256="$(sha256sum "$request" | cut -d' ' -f1)"
          [[ "$APPROVED_SNAPSHOT_POLICY_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$APPROVED_ADAPTER_SHA256" =~ ^[0-9a-f]{64}$ ]]
          mapfile -d '' packages < <(find "$raw" -type f -name raw-manifest.json -printf '%h\0' | sort -zu)
          test "${#packages[@]}" -eq 11
          policy="${packages[0]}/controller/snapshot-policy.json"
          MAIN_PROOF_SHA256="$(jq -er '.main_proof_sha256 | select(test("^[0-9a-f]{64}$"))' "$request")"
          CANDIDATE_SHA256="$(jq -er '.candidate_sha256 | select(test("^[0-9a-f]{64}$"))' "$request")"
          WEBVIEW_INSTALLER_SHA256="$(jq -er '.webview_installer_sha256 | select(test("^[0-9a-f]{64}$"))' "$request")"
          test "$(sha256sum "$policy" | cut -d' ' -f1)" = "$APPROVED_SNAPSHOT_POLICY_SHA256"
          uv run --frozen python scripts/verify_windows_desktop_raw_evidence.py \
            --policy "$policy" --output-root "$output" \
            --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --main-proof-sha256 "$MAIN_PROOF_SHA256" \
            --candidate-sha256 "$CANDIDATE_SHA256" \
            --webview-installer-sha256 "$WEBVIEW_INSTALLER_SHA256" \
            --snapshot-policy-sha256 "$APPROVED_SNAPSHOT_POLICY_SHA256" \
            --adapter-sha256 "$APPROVED_ADAPTER_SHA256" \
            --controller-request-sha256 "$controller_request_sha256" \
            --guest-harness-sha256 "$guest_harness_sha256" \
            --uia-driver-sha256 "$uia_driver_sha256" \
            --broker-public-key config/windows-vm-broker-public-key.pem \
            --broker-public-key-sha256 "$broker_key_sha256" \
            --repository "$GITHUB_REPOSITORY" --workflow "$GITHUB_WORKFLOW" \
            --workflow-ref "$GITHUB_WORKFLOW_REF" --workflow-sha256 "$workflow_sha256" \
            --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT" \
            "${packages[@]}"
          test "$(jq -r .status "$output/acceptance-receipt.json")" = accepted

      - name: Upload derived evidence and receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-installed-acceptance-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-aggregate/derived/
          if-no-files-found: error
          retention-days: 90

  attest:
    name: Attest verifier-derived Windows desktop acceptance
    needs: aggregate
    if: ${{ needs.aggregate.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Download verifier-derived exact-SHA acceptance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-installed-acceptance-${{ inputs.source_sha }}
          path: ${{ runner.temp }}/windows-installed-attest

      - name: Recheck the immutable acceptance subject
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          receipt="$RUNNER_TEMP/windows-installed-attest/acceptance-receipt.json"
          test -f "$receipt"
          test "$(jq -er '.status' "$receipt")" = accepted
          test "$(jq -er '.source_sha' "$receipt")" = "$SOURCE_SHA"

      - name: Attest the verifier-derived exact-SHA acceptance receipt
        id: attest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ runner.temp }}/windows-installed-attest/acceptance-receipt.json
