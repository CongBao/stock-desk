name: Release

on:
  push:
    tags:
      - "v1.1.0"
      - "v1.1.0-*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-policy:
    name: Enforce supported v1.1 prerelease tag policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Reject untrusted stable or candidate tags
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_NAME" =~ ^v1\.1\.0-(alpha|beta)\.[1-9][0-9]*$ ]]

  prerelease-verify:
    name: Verify Windows-only unsigned prerelease from immutable main proof
    if: >-
      ${{ startsWith(github.ref_name, 'v1.1.0-alpha.') ||
          startsWith(github.ref_name, 'v1.1.0-beta.') }}
    needs: tag-policy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      attestations: read
      contents: read
    env:
      STOCK_DESK_SIGNPATH_ENABLED: "false"
    steps:
      - name: Configure isolated release evidence roots
        shell: bash
        run: |
          set -euo pipefail
          echo "EVIDENCE_ROOT=$RUNNER_TEMP/prerelease-evidence" >> "$GITHUB_ENV"
          echo "PROOF_ROOT=$RUNNER_TEMP/prerelease-proof" >> "$GITHUB_ENV"
      - name: Check out exact prerelease source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Verify exact prerelease tag is on main and remains unsigned
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF_TYPE" = tag
          [[ "$GITHUB_REF_NAME" =~ ^v1\.1\.0-(alpha|beta)\.[1-9][0-9]*$ ]]
          test "$STOCK_DESK_SIGNPATH_ENABLED" = false
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
          test "$(git rev-parse --verify "refs/tags/${GITHUB_REF_NAME}^{commit}")" = "$GITHUB_SHA"
          remote_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          direct="$(git ls-remote --refs "$remote_url" "refs/tags/$GITHUB_REF_NAME" | awk 'NR == 1 {print $1}')"
          peeled="$(git ls-remote "$remote_url" "refs/tags/${GITHUB_REF_NAME}^{}" | awk 'NR == 1 {print $1}')"
          remote_target="${peeled:-$direct}"
          test -n "$remote_target"
          test "$remote_target" = "$GITHUB_SHA"
      - name: Locate successful exact-SHA main validation run
        id: proof
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(gh api --method GET "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" -f branch=main -f event=push -f status=success -f per_page=100)"
          run_id="$(jq -r --arg sha "$GITHUB_SHA" '[.workflow_runs[] | select(.head_sha == $sha and .head_branch == "main" and .event == "push" and .status == "completed" and .conclusion == "success")] | sort_by(.run_attempt, .id) | last | .id // empty' <<<"$payload")"
          test -n "$run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
      - name: Download exact proof and all proved artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MAIN_RUN_ID: ${{ steps.proof.outputs.run_id }}
        run: |
          set -euo pipefail
          evidence_names=(
            python-evidence-unit
            python-evidence-integration
            python-evidence-acceptance-performance
            python-evidence-security
            python-evidence-aggregate
            web-build-manifest
            e2e-evidence
            oci-image-manifest
            oci-security-evidence
            windows-payload-comparison-manifest
            windows-browser-observer-evidence
          )
          mkdir -p "$PROOF_ROOT" "$EVIDENCE_ROOT"
          gh run download "$MAIN_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "main-validation-proof-$GITHUB_SHA" \
            --dir "$PROOF_ROOT"
          test -s "$PROOF_ROOT/proof.json"
          test -s "$PROOF_ROOT/post-gh-verify-binding.json"
          test -s "$PROOF_ROOT/evidence-attestation-bundle.jsonl"
          for name in "${evidence_names[@]}"; do
            root="$EVIDENCE_ROOT/$name"
            mkdir -p "$root"
            gh run download "$MAIN_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name "$name" \
              --dir "$root"
            test -s "$root/$name.json"
            test -s "$root/manifest-binding.json"
          done
          candidate_root="$EVIDENCE_ROOT/windows-desktop-alpha-candidate-manifest"
          mkdir -p "$candidate_root"
          gh run download "$MAIN_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "windows-desktop-alpha-candidate-$GITHUB_SHA" \
            --dir "$candidate_root"
          test -s "$candidate_root/windows-desktop-alpha-candidate-manifest.json"
          test -s "$candidate_root/manifest-binding.json"
          test -s "$candidate_root/windows-desktop-bundle.json"
          expected_version="${GITHUB_REF_NAME#v}"
          jq -e --arg version "$expected_version" \
            '.artifact == "windows-desktop-bundle" and .release.version == $version' \
            "$candidate_root/windows-desktop-bundle.json" >/dev/null
          mapfile -t installers < <(find "$candidate_root" -maxdepth 1 -type f -name 'stock-desk-*-unsigned-x64-setup.exe' -printf '%f\n' | sort)
          test "${#installers[@]}" -eq 1
          test "$(find "$candidate_root" -maxdepth 1 -type f -name '*.exe' | wc -l)" -eq 1
          expected_installer="stock-desk-${expected_version}-unsigned-x64-setup.exe"
          test "${installers[0]}" = "$expected_installer"
          test -s "$candidate_root/${installers[0]}"
          echo "INSTALLER_NAME=${installers[0]}" >> "$GITHUB_ENV"
          test "$(find "$EVIDENCE_ROOT" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 12
      - name: Verify GitHub proof attestation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh attestation verify "$PROOF_ROOT/proof.json" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/ci.yml" \
            --source-ref refs/heads/main \
            --source-digest "$GITHUB_SHA" \
            --signer-digest "$GITHUB_SHA" \
            --deny-self-hosted-runners \
            --format json > "$RUNNER_TEMP/proof-attestation-verification.json"
          jq -e 'length >= 1' "$RUNNER_TEMP/proof-attestation-verification.json" >/dev/null
      - name: Verify real GitHub attestations for every proved manifest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          evidence_names=(
            python-evidence-unit
            python-evidence-integration
            python-evidence-acceptance-performance
            python-evidence-security
            python-evidence-aggregate
            web-build-manifest
            e2e-evidence
            oci-image-manifest
            oci-security-evidence
            windows-payload-comparison-manifest
            windows-browser-observer-evidence
            windows-desktop-alpha-candidate-manifest
          )
          receipt_root="$RUNNER_TEMP/evidence-attestation-verification"
          mkdir -p "$receipt_root"
          for name in "${evidence_names[@]}"; do
            gh attestation verify "$EVIDENCE_ROOT/$name/$name.json" \
              --bundle "$PROOF_ROOT/evidence-attestation-bundle.jsonl" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/ci.yml" \
              --source-ref refs/heads/main \
              --source-digest "$GITHUB_SHA" \
              --signer-digest "$GITHUB_SHA" \
              --deny-self-hosted-runners \
              --format json > "$receipt_root/$name.json"
            jq -e 'length >= 1' "$receipt_root/$name.json" >/dev/null
          done
          test "$(find "$receipt_root" -maxdepth 1 -type f -name '*.json' | wc -l)" -eq 12
      - name: Verify proved release inputs without rebuilding or rerunning tests
        shell: bash
        run: |
          set -euo pipefail
          evidence_names=(
            python-evidence-unit
            python-evidence-integration
            python-evidence-acceptance-performance
            python-evidence-security
            python-evidence-aggregate
            web-build-manifest
            e2e-evidence
            oci-image-manifest
            oci-security-evidence
            windows-payload-comparison-manifest
            windows-browser-observer-evidence
            windows-desktop-alpha-candidate-manifest
          )
          arguments=(
            1.1.0
            --tag "$GITHUB_REF_NAME"
            --main-proof "$PROOF_ROOT/proof.json"
            --main-proof-verification-binding "$PROOF_ROOT/post-gh-verify-binding.json"
            --main-proof-gh-verification "$RUNNER_TEMP/proof-attestation-verification.json"
          )
          for name in "${evidence_names[@]}"; do
            root="$EVIDENCE_ROOT/$name"
            arguments+=(--artifact "$name=$root")
            arguments+=(--artifact-attestation "$name=$root/manifest-binding.json")
          done
          git config user.name CongBao
          git config user.email bao_cong@outlook.com
          git remote set-url origin git@github.com:CongBao/stock-desk.git
          git remote set-url --push origin git@github.com:CongBao/stock-desk.git
          uv run --frozen python scripts/verify_release.py "${arguments[@]}"
      - name: Prepare explicitly unsigned Windows evidence assets
        shell: bash
        run: |
          set -euo pipefail
          asset_root="$RUNNER_TEMP/unsigned-prerelease-assets"
          mkdir -p "$asset_root"
          cp "$PROOF_ROOT/proof.json" \
            "$asset_root/UNSIGNED-TEST-ONLY-main-validation-proof-$GITHUB_REF_NAME.json"
          cp "$PROOF_ROOT/post-gh-verify-binding.json" \
            "$asset_root/UNSIGNED-TEST-ONLY-main-proof-post-gh-verify-binding-$GITHUB_REF_NAME.json"
          cp "$PROOF_ROOT/evidence-attestation-bundle.jsonl" \
            "$asset_root/UNSIGNED-TEST-ONLY-evidence-attestation-bundle-$GITHUB_REF_NAME.jsonl"
          candidate_root="$EVIDENCE_ROOT/windows-desktop-alpha-candidate-manifest"
          cp "$candidate_root/$INSTALLER_NAME" "$asset_root/"
          cp "$candidate_root/windows-desktop-alpha-candidate-manifest.json" \
            "$asset_root/UNSIGNED-TEST-ONLY-windows-candidate-manifest-$GITHUB_REF_NAME.json"
          cp "$candidate_root/windows-desktop-bundle.json" \
            "$asset_root/UNSIGNED-TEST-ONLY-windows-bundle-$GITHUB_REF_NAME.json"
          cp "$candidate_root/builder-a-provenance.json" \
            "$asset_root/UNSIGNED-TEST-ONLY-windows-builder-provenance-$GITHUB_REF_NAME.json"
          cp "$candidate_root/windows-payload-comparison.json" \
            "$asset_root/UNSIGNED-TEST-ONLY-windows-payload-comparison-$GITHUB_REF_NAME.json"
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
            -C "$EVIDENCE_ROOT" -cf \
            "$asset_root/UNSIGNED-TEST-ONLY-proved-artifacts-$GITHUB_REF_NAME.tar" \
            python-evidence-unit python-evidence-integration \
            python-evidence-acceptance-performance python-evidence-security \
            python-evidence-aggregate web-build-manifest e2e-evidence \
            oci-image-manifest oci-security-evidence \
            windows-payload-comparison-manifest \
            windows-browser-observer-evidence
          cat > "$asset_root/UNSIGNED-TEST-ONLY-WINDOWS-INSTALLER.txt" <<'MARKER'
          UNSIGNED PRERELEASE / 未签名预发布
          This prerelease contains one Windows x64 installer reused from the exact-SHA main candidate.
          It is not Authenticode signed and is not a stable or latest release. Windows may show an unknown-publisher warning.
          此预发布仅包含从同一 exact-SHA main 候选复用的 Windows x64 安装器；它没有 Authenticode 签名，不是稳定版或最新版，Windows 可能显示未知发布者警告。
          MARKER
          (cd "$asset_root" && sha256sum -- * > UNSIGNED-TEST-ONLY-SHA256SUMS)
          cp "docs/releases/$GITHUB_REF_NAME.md" "$asset_root/release-notes.md"
      - name: Upload verified unsigned prerelease assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-v11-prerelease-assets-${{ github.sha }}
          path: ${{ runner.temp }}/unsigned-prerelease-assets/
          if-no-files-found: error
          retention-days: 7

  prerelease:
    name: Publish explicitly unsigned Windows prerelease
    if: >-
      ${{ startsWith(github.ref_name, 'v1.1.0-alpha.') ||
          startsWith(github.ref_name, 'v1.1.0-beta.') }}
    needs: prerelease-verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download verified unsigned prerelease assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unsigned-v11-prerelease-assets-${{ github.sha }}
          path: unsigned-prerelease-assets
      - name: Recheck exact tag and Windows-only asset checksums
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_NAME" =~ ^v1\.1\.0-(alpha|beta)\.[1-9][0-9]*$ ]]
          test "$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_REF_NAME" --jq .sha)" = "$GITHUB_SHA"
          cd unsigned-prerelease-assets
          sha256sum -c UNSIGNED-TEST-ONLY-SHA256SUMS
          test "$(find . -maxdepth 1 -type f -name 'UNSIGNED-TEST-ONLY-*' | wc -l)" -eq 10
          mapfile -t installers < <(find . -maxdepth 1 -type f -name 'stock-desk-*-unsigned-x64-setup.exe' -printf '%f\n' | sort)
          test "${#installers[@]}" -eq 1
          test "$(find . -maxdepth 1 -type f -name '*.exe' | wc -l)" -eq 1
          expected_version="${GITHUB_REF_NAME#v}"
          expected_installer="stock-desk-${expected_version}-unsigned-x64-setup.exe"
          test "${installers[0]}" = "$expected_installer"
          jq -e --arg version "$expected_version" \
            '.artifact == "windows-desktop-bundle" and .release.version == $version' \
            "UNSIGNED-TEST-ONLY-windows-bundle-$GITHUB_REF_NAME.json" >/dev/null
          test -s "${installers[0]}"
      - name: Create unsigned prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          asset_root=unsigned-prerelease-assets
          mapfile -t installers < <(find "$asset_root" -maxdepth 1 -type f -name 'stock-desk-*-unsigned-x64-setup.exe' | sort)
          test "${#installers[@]}" -eq 1
          gh release create "$GITHUB_REF_NAME" \
            "${installers[0]}" \
            "$asset_root"/UNSIGNED-TEST-ONLY-* \
            --verify-tag \
            --prerelease \
            --latest=false \
            --notes-file "$asset_root/release-notes.md" \
            --title "Stock Desk $GITHUB_REF_NAME — UNSIGNED PRERELEASE / 未签名预发布"
