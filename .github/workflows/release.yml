name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-policy:
    name: Enforce supported release tag policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Reject unsupported prerelease tags explicitly
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_NAME" == v1.1.0-alpha.1 ]]; then
            exit 0
          fi
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]

  verify:
    name: Verify main proof and build release assets
    if: ${{ !contains(github.ref_name, '-alpha.') }}
    needs: tag-policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      attestations: read
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install locked dependencies
        run: |
          uv sync --frozen --all-groups --extra providers
          pnpm install --frozen-lockfile
      - name: Verify tagged commit is on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          release_version="${GITHUB_REF_NAME#v}"
          RELEASE_VERSION="$release_version" uv run --frozen python -c 'import os; from pathlib import Path; from scripts.verify_release import check_changelog, check_versions; version = os.environ["RELEASE_VERSION"]; check_versions(Path.cwd(), version); check_changelog(Path.cwd(), version)'
      - name: Locate exact successful main validation proof
        id: proof
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(gh api --method GET "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" -f branch=main -f event=push -f status=success -f per_page=100)"
          run_id="$(jq -r --arg sha "$GITHUB_SHA" '[.workflow_runs[] | select(.head_sha == $sha and .head_branch == "main" and .event == "push" and .conclusion == "success")] | sort_by(.run_attempt) | last | .id // empty' <<<"$payload")"
          test -n "$run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
      - name: Download exact main validation proof
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: main-validation-proof-${{ github.sha }}
          path: main-validation-proof
          github-token: ${{ github.token }}
          run-id: ${{ steps.proof.outputs.run_id }}
      - name: Verify main validation proof identity and inputs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          proof=main-validation-proof/proof.json
          gh attestation verify "$proof" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/ci.yml" \
            --source-ref refs/heads/main \
            --source-digest "$GITHUB_SHA" \
            --signer-digest "$GITHUB_SHA" \
            --deny-self-hosted-runners
          uv run --frozen python scripts/main_validation_proof.py verify \
            --repo-root . \
            --repository "$GITHUB_REPOSITORY" \
            --ref refs/heads/main \
            --proof "$proof"
      - name: Build final release assets
        run: make build
      - name: Verify built release artifacts
        shell: bash
        run: |
          set -euo pipefail
          release_version="${GITHUB_REF_NAME#v}"
          RELEASE_VERSION="$release_version" uv run --frozen python -c 'import os; from pathlib import Path; from scripts.verify_release import check_build_artifacts; version = os.environ["RELEASE_VERSION"]; check_build_artifacts(Path.cwd(), version)'
      - name: Prepare release archives
        shell: bash
        run: tar -C web/dist -czf "dist/stock-desk-web-${GITHUB_REF_NAME}.tar.gz" .
      - name: Generate release SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: dist
          format: spdx-json
          output-file: dist/stock-desk.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Prepare checksummed assets
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum -- *.whl *.tar.gz *.json > SHA256SUMS
      - name: Upload verified release assets for attestation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-verified
          path: dist/
          if-no-files-found: error
          retention-days: 7

  attest:
    name: Attest verified release assets
    if: ${{ !contains(github.ref_name, '-alpha.') }}
    needs:
      - verify
      - verify-windows-installer
      - verify-macos-installer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets-verified
          path: release-assets
      - name: Download verified native installer assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: native-installer-*
          path: release-assets
          merge-multiple: true
      - name: Verify release asset checksums
        working-directory: release-assets
        run: sha256sum -c SHA256SUMS
      - name: Verify native assets and prepare complete checksums
        working-directory: release-assets
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t installers < <(find . -maxdepth 1 -type f \( -name '*.exe' -o -name '*.dmg' \) -printf '%f\n' | sort)
          mapfile -t sidecars < <(find . -maxdepth 1 -type f \( -name '*.exe.sha256' -o -name '*.dmg.sha256' \) -printf '%f\n' | sort)
          test "${#installers[@]}" -eq 3
          test "${#sidecars[@]}" -eq "${#installers[@]}"
          for artifact in "${installers[@]}"; do
            sidecar="$artifact.sha256"
            test -f "$sidecar"
            test "$(wc -l < "$sidecar")" -eq 1
            read -r digest listed < "$sidecar"
            [[ "$digest" =~ ^[0-9a-f]{64}$ ]]
            test "$listed" = "$artifact"
            sha256sum -c "$sidecar"
          done
          mapfile -t manifests < <(find . -maxdepth 1 -type f -name 'stock-desk-*.json' ! -name '*.sbom.spdx.json' -printf '%f\n' | sort)
          mapfile -t installer_sboms < <(find . -maxdepth 1 -type f -name 'stock-desk-*-*.sbom.spdx.json' -printf '%f\n' | sort)
          test "${#manifests[@]}" -eq 3
          test "${#installer_sboms[@]}" -eq 3
          find . -maxdepth 1 -type f \
            ! -name 'SHA256SUMS.complete' \
            -printf '%f\0' \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS.complete
          test "$(wc -l < SHA256SUMS.complete)" -eq "$(find . -maxdepth 1 -type f ! -name 'SHA256SUMS.complete' | wc -l)"
          sha256sum -c SHA256SUMS.complete
      - name: Attest release provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            release-assets/*.whl
            release-assets/*.tar.gz
            release-assets/*.exe
            release-assets/*.dmg
      - name: Attest release SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            release-assets/*.whl
            release-assets/*.tar.gz
          sbom-path: release-assets/stock-desk.spdx.json
      - name: Attest Windows installer SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: release-assets/*-windows-x86_64.exe
          sbom-path: release-assets/stock-desk-windows-x86_64.sbom.spdx.json
      - name: Attest macOS x86_64 installer SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: release-assets/*-macos-x86_64.dmg
          sbom-path: release-assets/stock-desk-macos-x86_64.sbom.spdx.json
      - name: Attest macOS arm64 installer SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: release-assets/*-macos-arm64.dmg
          sbom-path: release-assets/stock-desk-macos-arm64.sbom.spdx.json
      - name: Upload attested release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-attested
          path: release-assets/
          if-no-files-found: error
          retention-days: 7

  build-installers:
    name: Build ${{ matrix.os_name }} ${{ matrix.architecture }} installer
    if: ${{ !contains(github.ref_name, '-alpha.') }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: windows
            architecture: x86_64
            runner: windows-2025
            native: true
          - os_name: macos
            architecture: x86_64
            runner: macos-26-intel
            native: true
          - os_name: macos
            architecture: arm64
            runner: macos-26
            native: true
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install locked build dependencies
        run: |
          uv sync --frozen --all-groups --extra providers
          pnpm install --frozen-lockfile
      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '6.7.3'
          $expected = '9c73c3bae7ed48d44112a0f48e66742c00090bdb5bef71d9d3c056c66e97b732'
          $installer = Join-Path $env:RUNNER_TEMP "innosetup-$version.exe"
          $installDir = Join-Path $env:RUNNER_TEMP "inno-setup-$version"
          Invoke-WebRequest -Uri 'https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe' -OutFile $installer
          $actual = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "Inno Setup package digest mismatch: $actual" }
          $installProcess = Start-Process -FilePath $installer -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', "/DIR=$installDir" -Wait -PassThru
          if ($installProcess.ExitCode -ne 0) { throw "Inno Setup installation failed: $($installProcess.ExitCode)" }
          $compiler = Join-Path $installDir 'ISCC.exe'
          if (-not (Test-Path -LiteralPath $compiler -PathType Leaf)) { throw 'ISCC.exe is missing' }
          "INNO_SETUP_COMPILER=$compiler" >> $env:GITHUB_ENV
          "STOCK_DESK_INNO_SETUP_PACKAGE_SHA256=$expected" >> $env:GITHUB_ENV
      - name: Configure optional macOS signing and notarization
        if: runner.os == 'macOS'
        shell: bash
        env:
          STOCK_DESK_MACOS_CERTIFICATE_BASE64: ${{ secrets.STOCK_DESK_MACOS_CERTIFICATE_BASE64 }}
          STOCK_DESK_MACOS_CERTIFICATE_PASSWORD: ${{ secrets.STOCK_DESK_MACOS_CERTIFICATE_PASSWORD }}
          STOCK_DESK_MACOS_NOTARY_APPLE_ID: ${{ secrets.STOCK_DESK_MACOS_NOTARY_APPLE_ID }}
          STOCK_DESK_MACOS_NOTARY_PASSWORD: ${{ secrets.STOCK_DESK_MACOS_NOTARY_PASSWORD }}
          STOCK_DESK_MACOS_NOTARY_TEAM_ID: ${{ secrets.STOCK_DESK_MACOS_NOTARY_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -z "$STOCK_DESK_MACOS_CERTIFICATE_BASE64" ]; then
            exit 0
          fi
          keychain="$RUNNER_TEMP/stock-desk-signing.keychain-db"
          certificate="$RUNNER_TEMP/stock-desk-signing.p12"
          printf '%s' "$STOCK_DESK_MACOS_CERTIFICATE_BASE64" | base64 -D > "$certificate"
          security create-keychain -p temporary "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p temporary "$keychain"
          security import "$certificate" -P "$STOCK_DESK_MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security list-keychains -d user -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temporary "$keychain"
          if [ -n "$STOCK_DESK_MACOS_NOTARY_APPLE_ID" ]; then
            xcrun notarytool store-credentials stock-desk-ci \
              --apple-id "$STOCK_DESK_MACOS_NOTARY_APPLE_ID" \
              --password "$STOCK_DESK_MACOS_NOTARY_PASSWORD" \
              --team-id "$STOCK_DESK_MACOS_NOTARY_TEAM_ID"
            echo 'STOCK_DESK_MACOS_NOTARY_PROFILE=stock-desk-ci' >> "$GITHUB_ENV"
          fi
      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          STOCK_DESK_SOURCE_REVISION: ${{ github.sha }}
          STOCK_DESK_WINDOWS_CERTIFICATE_BASE64: ${{ secrets.STOCK_DESK_WINDOWS_CERTIFICATE_BASE64 }}
          STOCK_DESK_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.STOCK_DESK_WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          uv run --frozen python -m scripts.build_installer $version
      - name: Build macOS installer
        if: runner.os == 'macOS'
        shell: bash
        env:
          STOCK_DESK_SOURCE_REVISION: ${{ github.sha }}
          STOCK_DESK_MACOS_SIGNING_IDENTITY: ${{ secrets.STOCK_DESK_MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          uv run --frozen python -m scripts.build_installer "${GITHUB_REF_NAME#v}"
      - name: Generate installer SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: dist/pyinstaller
          format: spdx-json
          output-file: dist/installers/stock-desk-${{ matrix.os_name }}-${{ matrix.architecture }}.sbom.spdx.json
          upload-artifact: false
      - name: Upload native installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-installer-${{ matrix.os_name }}-${{ matrix.architecture }}
          path: dist/installers/
          if-no-files-found: error
          retention-days: 7
      - name: Upload source-free verification harness
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distribution-verifier-${{ matrix.os_name }}-${{ matrix.architecture }}
          path: |
            scripts/verify_installed_app.py
            tests/fixtures/distribution/v0.5.0.sql
          if-no-files-found: error
          retention-days: 7

  verify-windows-installer:
    name: Verify clean Windows installer
    if: ${{ !contains(github.ref_name, '-alpha.') }}
    needs: build-installers
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-installer-windows-x86_64
          path: installer
      - name: Download source-free verifier
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distribution-verifier-windows-x86_64
          path: verifier
      - name: Set up verification Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install and verify without development PATH
        shell: pwsh
        env:
          STOCK_DESK_INSTALL_TEST_PATH: ${{ runner.temp }}\system-path-only
        run: |
          $installer = Get-ChildItem installer\*.exe | Select-Object -First 1
          $evidence = Join-Path $env:GITHUB_WORKSPACE 'installer-evidence\windows'
          New-Item -ItemType Directory -Force -Path $evidence | Out-Null
          $log = Join-Path $evidence 'stock-desk-install.log'
          $installProcess = Start-Process -FilePath $installer.FullName -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', "/LOG=$log" -Wait -PassThru
          if ($installProcess.ExitCode -ne 0) { throw "installer failed with exit code $($installProcess.ExitCode)" }
          $command = Join-Path $env:LOCALAPPDATA 'Programs\Stock Desk\stock-desk.exe'
          $runtime = Join-Path $env:LOCALAPPDATA 'stock-desk\runtime\runtime.json'
          $systemPath = "$env:SystemRoot\System32;$env:SystemRoot"
          $env:STOCK_DESK_INSTALL_TEST_PATH = $systemPath
          python verifier\scripts\verify_installed_app.py --command $command --runtime-record $runtime --sanitized-path $systemPath --fixture-sql verifier\tests\fixtures\distribution\v0.5.0.sql --diagnostic-dir $evidence
      - name: Set up Playwright Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Capture installed browser smoke with Playwright
        shell: pwsh
        env:
          STOCK_DESK_INSTALL_TEST_PATH: ${{ runner.temp }}\system-path-only
        run: |
          $command = Join-Path $env:LOCALAPPDATA 'Programs\Stock Desk\stock-desk.exe'
          $runtime = Join-Path $env:LOCALAPPDATA 'stock-desk\runtime\runtime.json'
          $developerPath = $env:PATH
          $appProcess = $null
          try {
            $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot"
            $appProcess = Start-Process -FilePath $command -ArgumentList '--no-browser' -WorkingDirectory $env:RUNNER_TEMP -PassThru
            $env:PATH = $developerPath
            for ($attempt = 0; $attempt -lt 300 -and -not (Test-Path $runtime); $attempt++) { Start-Sleep -Milliseconds 200 }
            $port = (Get-Content $runtime | ConvertFrom-Json).port
            npx --yes playwright@1.61.1 install chromium
            $screenshot = Join-Path $env:GITHUB_WORKSPACE 'installer-evidence\windows\installed-market.png'
            npx --yes playwright@1.61.1 screenshot "http://127.0.0.1:$port/market" $screenshot
            if ($LASTEXITCODE -ne 0) { throw "Playwright screenshot failed: $LASTEXITCODE" }
          } finally {
            $env:PATH = $developerPath
            $shutdownProcess = Start-Process -FilePath $command -ArgumentList '--shutdown' -WorkingDirectory $env:RUNNER_TEMP -Wait -PassThru
            if ($null -ne $appProcess -and -not $appProcess.HasExited) {
              if (-not $appProcess.WaitForExit(30000)) {
                Stop-Process -Id $appProcess.Id -Force -ErrorAction SilentlyContinue
                throw 'installed application did not exit after browser smoke'
              }
            }
            if ($shutdownProcess.ExitCode -ne 0) { throw "shutdown helper failed with exit code $($shutdownProcess.ExitCode)" }
            if ($null -ne $appProcess -and $appProcess.ExitCode -ne 0) { throw "installed application exited with code $($appProcess.ExitCode)" }
          }
      - name: Uninstall without deleting user data
        shell: pwsh
        run: |
          $applicationDir = Join-Path $env:LOCALAPPDATA 'Programs\Stock Desk'
          $command = Join-Path $applicationDir 'stock-desk.exe'
          $uninstaller = Join-Path $applicationDir 'unins000.exe'
          $persistence = Join-Path $env:LOCALAPPDATA 'stock-desk\installer-persistence.txt'
          $uninstallProcess = Start-Process -FilePath $uninstaller -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART' -Wait -PassThru
          if ($uninstallProcess.ExitCode -ne 0) { throw "uninstaller failed with exit code $($uninstallProcess.ExitCode)" }
          for ($attempt = 0; $attempt -lt 100 -and (Test-Path -LiteralPath $applicationDir); $attempt++) { Start-Sleep -Milliseconds 100 }
          if (Test-Path -LiteralPath $command) { throw 'application executable remains after uninstall' }
          if (Test-Path -LiteralPath $uninstaller) { throw 'uninstaller remains after uninstall' }
          if (Test-Path -LiteralPath $applicationDir) { throw 'application directory remains after uninstall' }
          if (-not (Test-Path -LiteralPath $persistence)) { throw 'user data was deleted' }
      - name: Stage Windows installer evidence
        if: always()
        shell: pwsh
        run: |
          $evidence = Join-Path $env:GITHUB_WORKSPACE 'installer-evidence\windows'
          New-Item -ItemType Directory -Force -Path $evidence | Out-Null
          $appLogs = Join-Path $env:LOCALAPPDATA 'stock-desk\logs'
          if (Test-Path -LiteralPath $appLogs) {
            Copy-Item -LiteralPath $appLogs -Destination (Join-Path $evidence 'app-logs') -Recurse -Force
          }
      - name: Upload Windows installer-logs and screenshot
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-installer-logs
          path: installer-evidence/windows/
          if-no-files-found: error
          retention-days: 7

  verify-macos-installer:
    name: Verify clean macOS ${{ matrix.architecture }} installer
    if: ${{ !contains(github.ref_name, '-alpha.') }}
    needs: build-installers
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64
            runner: macos-26-intel
          - architecture: arm64
            runner: macos-26
    steps:
      - name: Download macOS installer
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-installer-macos-${{ matrix.architecture }}
          path: installer
      - name: Download source-free verifier
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distribution-verifier-macos-${{ matrix.architecture }}
          path: verifier
      - name: Set up verification Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install and verify without development PATH
        shell: bash
        env:
          STOCK_DESK_INSTALL_TEST_PATH: /usr/bin:/bin:/usr/sbin:/sbin
        run: |
          set -euo pipefail
          dmg="$(find installer -name '*.dmg' -print -quit)"
          mount="$RUNNER_TEMP/stock-desk-volume"
          mkdir -p "$mount" "$HOME/Applications"
          hdiutil attach "$dmg" -mountpoint "$mount" -nobrowse
          ditto "$mount/stock-desk.app" "$HOME/Applications/stock-desk.app"
          hdiutil detach "$mount"
          command="$HOME/Applications/stock-desk.app/Contents/MacOS/stock-desk"
          runtime="$HOME/Library/Application Support/stock-desk/runtime/runtime.json"
          python3 verifier/scripts/verify_installed_app.py \
            --command "$command" \
            --runtime-record "$runtime" \
            --sanitized-path "$STOCK_DESK_INSTALL_TEST_PATH" \
            --fixture-sql verifier/tests/fixtures/distribution/v0.5.0.sql
      - name: Set up Playwright Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Capture installed browser smoke with Playwright
        shell: bash
        env:
          STOCK_DESK_INSTALL_TEST_PATH: /usr/bin:/bin:/usr/sbin:/sbin
        run: |
          set -euo pipefail
          command="$HOME/Applications/stock-desk.app/Contents/MacOS/stock-desk"
          runtime="$HOME/Library/Application Support/stock-desk/runtime/runtime.json"
          (cd "$RUNNER_TEMP" && env PATH="$STOCK_DESK_INSTALL_TEST_PATH" "$command" --no-browser) &
          for attempt in $(seq 1 300); do [ -f "$runtime" ] && break; sleep 0.2; done
          port="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["port"])' "$runtime")"
          npx --yes playwright@1.61.1 install chromium
          npx --yes playwright@1.61.1 screenshot "http://127.0.0.1:$port/market" "$RUNNER_TEMP/installed-market.png"
          "$command" --shutdown
      - name: Uninstall application without deleting user data
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$HOME/Applications/stock-desk.app"
          test -f "$HOME/Library/Application Support/stock-desk/installer-persistence.txt"
      - name: Upload macOS installer-logs and screenshot
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-${{ matrix.architecture }}-installer-logs
          path: |
            ${{ runner.temp }}/installed-market.png
            ~/Library/Application Support/stock-desk/logs/
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Create GitHub release
    if: ${{ !contains(github.ref_name, '-alpha.') }}
    needs:
      - verify
      - attest
      - verify-windows-installer
      - verify-macos-installer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download attested release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets-attested
          path: release-assets
      - name: Verify release asset checksums
        working-directory: release-assets
        run: sha256sum -c SHA256SUMS
      - name: Verify complete release asset checksums
        working-directory: release-assets
        shell: bash
        run: |
          set -euo pipefail
          test "$(find . -maxdepth 1 -type f \( -name '*.exe' -o -name '*.dmg' \) | wc -l)" -eq 3
          test -s stock-desk.spdx.json
          mapfile -t installer_sboms < <(find . -maxdepth 1 -type f -name 'stock-desk-*-*.sbom.spdx.json' -printf '%f\n' | sort)
          test "${#installer_sboms[@]}" -eq 3
          test -s SHA256SUMS.complete
          test "$(wc -l < SHA256SUMS.complete)" -eq "$(find . -maxdepth 1 -type f ! -name 'SHA256SUMS.complete' | wc -l)"
          sha256sum -c SHA256SUMS.complete
      - name: Verify remote tag still matches workflow commit
        shell: bash
        run: |
          set -euo pipefail
          remote_tag_target="$(git ls-remote "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git" "refs/tags/${GITHUB_REF_NAME}^{}" | awk 'NR == 1 {print $1}')"
          test -n "$remote_tag_target"
          test "$remote_tag_target" = "$GITHUB_SHA"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*
          --verify-tag --generate-notes --title "Stock Desk $GITHUB_REF_NAME"

  alpha-verify:
    name: Verify unsigned alpha inputs from immutable main proof
    if: github.ref_name == 'v1.1.0-alpha.1'
    needs: tag-policy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      attestations: read
      contents: read
    env:
      EVIDENCE_ROOT: ${{ runner.temp }}/alpha-evidence
      PROOF_ROOT: ${{ runner.temp }}/alpha-proof
      STOCK_DESK_SIGNPATH_ENABLED: "false"
    steps:
      - name: Check out exact alpha source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Verify exact alpha tag is on main and remains unsigned
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF_TYPE" = tag
          test "$GITHUB_REF_NAME" = v1.1.0-alpha.1
          test "$STOCK_DESK_SIGNPATH_ENABLED" = false
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
          test "$(git rev-parse --verify "refs/tags/${GITHUB_REF_NAME}^{commit}")" = "$GITHUB_SHA"
          remote_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          direct="$(git ls-remote --refs "$remote_url" "refs/tags/$GITHUB_REF_NAME" | awk 'NR == 1 {print $1}')"
          peeled="$(git ls-remote "$remote_url" "refs/tags/${GITHUB_REF_NAME}^{}" | awk 'NR == 1 {print $1}')"
          remote_target="${peeled:-$direct}"
          test -n "$remote_target"
          test "$remote_target" = "$GITHUB_SHA"
      - name: Locate successful exact-SHA main validation run
        id: proof
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(gh api --method GET "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" -f branch=main -f event=push -f status=success -f per_page=100)"
          run_id="$(jq -r --arg sha "$GITHUB_SHA" '[.workflow_runs[] | select(.head_sha == $sha and .head_branch == "main" and .event == "push" and .status == "completed" and .conclusion == "success")] | sort_by(.run_attempt, .id) | last | .id // empty' <<<"$payload")"
          test -n "$run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
      - name: Download exact proof and all proved artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MAIN_RUN_ID: ${{ steps.proof.outputs.run_id }}
        run: |
          set -euo pipefail
          evidence_names=(
            python-evidence-unit
            python-evidence-integration
            python-evidence-acceptance-performance
            python-evidence-security
            python-evidence-aggregate
            web-build-manifest
            e2e-evidence
            oci-image-manifest
            oci-security-evidence
          )
          mkdir -p "$PROOF_ROOT" "$EVIDENCE_ROOT"
          gh run download "$MAIN_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "main-validation-proof-$GITHUB_SHA" \
            --dir "$PROOF_ROOT"
          test -s "$PROOF_ROOT/proof.json"
          test -s "$PROOF_ROOT/post-gh-verify-binding.json"
          test -s "$PROOF_ROOT/evidence-attestation-bundle.jsonl"
          for name in "${evidence_names[@]}"; do
            root="$EVIDENCE_ROOT/$name"
            mkdir -p "$root"
            gh run download "$MAIN_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name "$name" \
              --dir "$root"
            test -s "$root/$name.json"
            test -s "$root/manifest-binding.json"
          done
          test "$(find "$EVIDENCE_ROOT" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 9
      - name: Verify GitHub proof attestation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh attestation verify "$PROOF_ROOT/proof.json" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/ci.yml" \
            --source-ref refs/heads/main \
            --source-digest "$GITHUB_SHA" \
            --signer-digest "$GITHUB_SHA" \
            --deny-self-hosted-runners \
            --format json > "$RUNNER_TEMP/proof-attestation-verification.json"
          jq -e 'length >= 1' "$RUNNER_TEMP/proof-attestation-verification.json" >/dev/null
      - name: Verify real GitHub attestations for every proved manifest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          evidence_names=(
            python-evidence-unit
            python-evidence-integration
            python-evidence-acceptance-performance
            python-evidence-security
            python-evidence-aggregate
            web-build-manifest
            e2e-evidence
            oci-image-manifest
            oci-security-evidence
          )
          receipt_root="$RUNNER_TEMP/evidence-attestation-verification"
          mkdir -p "$receipt_root"
          for name in "${evidence_names[@]}"; do
            gh attestation verify "$EVIDENCE_ROOT/$name/$name.json" \
              --bundle "$PROOF_ROOT/evidence-attestation-bundle.jsonl" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/ci.yml" \
              --source-ref refs/heads/main \
              --source-digest "$GITHUB_SHA" \
              --signer-digest "$GITHUB_SHA" \
              --deny-self-hosted-runners \
              --format json > "$receipt_root/$name.json"
            jq -e 'length >= 1' "$receipt_root/$name.json" >/dev/null
          done
          test "$(find "$receipt_root" -maxdepth 1 -type f -name '*.json' | wc -l)" -eq 9
      - name: Verify proved release inputs without rebuilding or rerunning tests
        shell: bash
        run: |
          set -euo pipefail
          evidence_names=(
            python-evidence-unit
            python-evidence-integration
            python-evidence-acceptance-performance
            python-evidence-security
            python-evidence-aggregate
            web-build-manifest
            e2e-evidence
            oci-image-manifest
            oci-security-evidence
          )
          arguments=(
            1.1.0
            --tag "$GITHUB_REF_NAME"
            --main-proof "$PROOF_ROOT/proof.json"
            --main-proof-verification-binding "$PROOF_ROOT/post-gh-verify-binding.json"
            --main-proof-gh-verification "$RUNNER_TEMP/proof-attestation-verification.json"
          )
          for name in "${evidence_names[@]}"; do
            root="$EVIDENCE_ROOT/$name"
            arguments+=(--artifact "$name=$root")
            arguments+=(--artifact-attestation "$name=$root/manifest-binding.json")
          done
          git config user.name CongBao
          git config user.email bao_cong@outlook.com
          git remote set-url origin git@github.com:CongBao/stock-desk.git
          git remote set-url --push origin git@github.com:CongBao/stock-desk.git
          uv run --frozen python scripts/verify_release.py "${arguments[@]}"
      - name: Prepare explicitly unsigned evidence assets
        shell: bash
        run: |
          set -euo pipefail
          asset_root="$RUNNER_TEMP/unsigned-alpha-assets"
          mkdir -p "$asset_root"
          cp "$PROOF_ROOT/proof.json" \
            "$asset_root/UNSIGNED-TEST-ONLY-main-validation-proof-$GITHUB_REF_NAME.json"
          cp "$PROOF_ROOT/post-gh-verify-binding.json" \
            "$asset_root/UNSIGNED-TEST-ONLY-main-proof-post-gh-verify-binding-$GITHUB_REF_NAME.json"
          cp "$PROOF_ROOT/evidence-attestation-bundle.jsonl" \
            "$asset_root/UNSIGNED-TEST-ONLY-evidence-attestation-bundle-$GITHUB_REF_NAME.jsonl"
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
            -C "$EVIDENCE_ROOT" -cf \
            "$asset_root/UNSIGNED-TEST-ONLY-proved-artifacts-$GITHUB_REF_NAME.tar" .
          cat > "$asset_root/UNSIGNED-TEST-ONLY-NO-INSTALLER.txt" <<'MARKER'
          UNSIGNED PRERELEASE / 未签名预发布
          This delivery-foundation alpha contains no Windows or macOS installer.
          It is not Authenticode signed and is not a stable or latest release.
          此交付基础 alpha 不包含 Windows 或 macOS 安装器，不具备 Authenticode 签名，亦非稳定版或最新版。
          MARKER
          (cd "$asset_root" && sha256sum -- * > UNSIGNED-TEST-ONLY-SHA256SUMS)
          cp docs/releases/v1.1.0-alpha.1.md "$asset_root/release-notes.md"
      - name: Upload verified unsigned alpha assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-alpha-release-assets-${{ github.sha }}
          path: ${{ runner.temp }}/unsigned-alpha-assets/
          if-no-files-found: error
          retention-days: 7

  alpha-prerelease:
    name: Publish explicitly unsigned alpha prerelease
    if: github.ref_name == 'v1.1.0-alpha.1'
    needs: alpha-verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download verified unsigned alpha assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unsigned-alpha-release-assets-${{ github.sha }}
          path: unsigned-alpha-assets
      - name: Recheck exact tag and unsigned asset checksums
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$GITHUB_REF_NAME" = v1.1.0-alpha.1
          test "$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_REF_NAME" --jq .sha)" = "$GITHUB_SHA"
          cd unsigned-alpha-assets
          sha256sum -c UNSIGNED-TEST-ONLY-SHA256SUMS
          test "$(find . -maxdepth 1 -type f -name 'UNSIGNED-TEST-ONLY-*' | wc -l)" -eq 6
      - name: Create unsigned alpha prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          asset_root=unsigned-alpha-assets
          gh release create "$GITHUB_REF_NAME" "$asset_root"/UNSIGNED-TEST-ONLY-* \
            --verify-tag \
            --prerelease \
            --latest=false \
            --notes-file "$asset_root/release-notes.md" \
            --title "Stock Desk $GITHUB_REF_NAME — UNSIGNED PRERELEASE / 未签名预发布"
