name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify and build release assets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install locked dependencies
        run: |
          uv sync --frozen --all-groups --extra providers
          pnpm install --frozen-lockfile
      - name: Verify tagged commit is on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          release_version="${GITHUB_REF_NAME#v}"
          RELEASE_VERSION="$release_version" uv run --frozen python -c 'import os; from pathlib import Path; from scripts.verify_release import check_changelog, check_versions; version = os.environ["RELEASE_VERSION"]; check_versions(Path.cwd(), version); check_changelog(Path.cwd(), version)'
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run release gates
        run: |
          make test
          make acceptance
          make acceptance-formula
          make acceptance-backtest
          make acceptance-analysis
          make performance-regressions
          make performance-target
          make lint
          make typecheck
          make public-tree
          make security
          make e2e-foundation
          make e2e-market
          make e2e-formula
          make e2e-backtest
          make e2e-analysis
          make e2e-task-center
      - name: Upload release performance evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-performance-evidence
          path: |
            test-results/performance/
            test-results/playwright/
          if-no-files-found: ignore
          retention-days: 7
      - name: Build final release assets
        run: make build
      - name: Verify built release artifacts
        shell: bash
        run: |
          set -euo pipefail
          release_version="${GITHUB_REF_NAME#v}"
          RELEASE_VERSION="$release_version" uv run --frozen python -c 'import os; from pathlib import Path; from scripts.verify_release import check_build_artifacts; version = os.environ["RELEASE_VERSION"]; check_build_artifacts(Path.cwd(), version)'
      - name: Prepare release archives
        shell: bash
        run: tar -C web/dist -czf "dist/stock-desk-web-${GITHUB_REF_NAME}.tar.gz" .
      - name: Generate release SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: dist
          format: spdx-json
          output-file: dist/stock-desk.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Prepare checksummed assets
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum -- *.whl *.tar.gz *.json > SHA256SUMS
      - name: Upload verified release assets for attestation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-verified
          path: dist/
          if-no-files-found: error
          retention-days: 7

  codeql:
    name: Release CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - javascript-typescript
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml
      - name: Analyze
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: /release/language:${{ matrix.language }}

  container:
    name: Verify release container
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Install smoke-test dependencies
        run: uv sync --frozen --all-groups --extra providers
      - name: Build, start, and smoke-test Compose
        shell: bash
        run: |
          set -Eeuo pipefail
          cleanup() {
            status=$?
            docker compose down --volumes --remove-orphans || true
            exit "$status"
          }
          trap cleanup EXIT
          docker compose down --volumes --remove-orphans
          docker compose build --pull
          docker compose up --wait --no-build
          make smoke
      - name: Scan final release image for high and critical CVEs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: stock-desk-runtime:local
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          exit-code: 1

  attest:
    name: Attest verified release assets
    needs:
      - verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets-verified
          path: release-assets
      - name: Verify release asset checksums
        working-directory: release-assets
        run: sha256sum -c SHA256SUMS
      - name: Attest release provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: "release-assets/*.{whl,tar.gz}"
      - name: Attest release SBOM
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3.0.0
        with:
          subject-path: "release-assets/*.{whl,tar.gz}"
          sbom-path: release-assets/stock-desk.spdx.json
      - name: Upload attested release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-attested
          path: release-assets/
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub release
    needs:
      - verify
      - attest
      - codeql
      - container
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download attested release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets-attested
          path: release-assets
      - name: Verify release asset checksums
        working-directory: release-assets
        run: sha256sum -c SHA256SUMS
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*
          --verify-tag --generate-notes --title "Stock Desk $GITHUB_REF_NAME"
