        (
          needs.impact.outputs.profile != 'web' &&
          needs.python-unit.result == 'success' &&
          needs.python-integration.result == 'success' &&
          needs.python-acceptance-performance.result == 'success' &&
          needs.python-security.result == 'success' &&
          (!contains(fromJSON(needs.impact.outputs.required_jobs), 'web') || needs.web.result == 'success') &&
          (!contains(fromJSON(needs.impact.outputs.required_jobs), 'e2e') || needs.e2e.result == 'success')
        )
