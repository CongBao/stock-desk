  rust-quality:
    name: Rust desktop quality and tests
    needs: impact
    if: contains(fromJSON(needs.impact.outputs.required_jobs), 'rust')
    runs-on: windows-2025
    timeout-minutes: 20
    steps:
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Set up pinned Rust quality toolchain
        shell: pwsh
        run: |
          rustup toolchain install $env:RUST_VERSION --profile minimal --component clippy,rustfmt
          rustup default $env:RUST_VERSION
      - name: Restore exact-lock Cargo downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-quality-${{ runner.os }}-${{ runner.arch }}-${{ env.RUST_VERSION }}-${{ hashFiles('src-tauri/Cargo.lock') }}
      - name: Verify exact source and run Rust gates
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          if ((git rev-parse HEAD) -ne $env:SOURCE_SHA) { throw 'checkout is not SOURCE_SHA' }
          $stub = Join-Path $PWD 'src-tauri\binaries\stock-desk-sidecar-x86_64-pc-windows-msvc.exe'
          New-Item -ItemType Directory -Force (Split-Path $stub -Parent) | Out-Null
          [IO.File]::WriteAllBytes($stub, [byte[]](0x4d, 0x5a))
          try {
            cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
            cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
            cargo test --locked --manifest-path src-tauri/Cargo.toml
          } finally {
            Remove-Item -LiteralPath $stub -Force -ErrorAction SilentlyContinue
          }

  public-tree:
    name: Public tree and repository health
    needs: impact
    if: contains(fromJSON(needs.impact.outputs.required_jobs), 'public-tree')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source and public history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Set up pnpm for main requirement collection
        if: github.event_name == 'push'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js for main requirement collection
        if: github.event_name == 'push'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install locked dependencies
        run: uv sync --frozen --all-groups --extra providers
      - name: Install locked frontend selector dependencies
        if: github.event_name == 'push'
        run: pnpm install --frozen-lockfile
      - name: Audit public tree and repository contracts
        run: |
          make public-tree
          uv run --frozen python -c 'from pathlib import Path; from scripts.verify_release import check_public_history; check_public_history(Path.cwd())'
          uv run --frozen pytest -W error tests/unit/test_repository_health.py tests/unit/test_ci_cache_policy.py
          uv run --frozen python scripts/verify_ci_cache_policy.py workflows .github/workflows/*.yml
      - name: Run main-only pre-publish gates
        if: github.event_name == 'push'
        run: |
          uv run --frozen python scripts/check_requirement_coverage.py --mode pre-publish
          uv run --frozen python scripts/verify_docs.py
          uv run --frozen python -c 'from pathlib import Path; from scripts.verify_release import check_public_history; check_public_history(Path.cwd())'

  dependency-audit:
    name: Locked production dependency audit
    needs: impact
    if: contains(fromJSON(needs.impact.outputs.required_jobs), 'dependency-audit')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Set up pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
      - name: Restore only the pinned RustSec tool and advisory database
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/advisory-db
          key: cargo-audit-${{ runner.os }}-${{ runner.arch }}-${{ env.RUST_VERSION }}-0.22.2-${{ hashFiles('src-tauri/Cargo.lock') }}
      - name: Verify locked production dependency manifests
        run: |
          uv lock --check
          pnpm install --lockfile-only --frozen-lockfile --ignore-scripts
          if ! cargo-audit --version 2>/dev/null | grep -Fx 'cargo-audit 0.22.2'; then
            cargo install cargo-audit --version 0.22.2 --locked --force
          fi
          cargo audit --file src-tauri/Cargo.lock --target-os windows --deny yanked

  python-unit:
    name: Python unit shard
    needs: impact
    if: contains(fromJSON(needs.impact.outputs.required_jobs), 'python-unit')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHON_SHARD: unit
      PYTHON_ROOTS: tests/unit tests/contract tests/property
      EVIDENCE_ARTIFACT: python-evidence-unit
      EVIDENCE_JOB_NAME: Python unit shard
    steps: &python-shard-steps
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Download canonical inventory
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-test-inventory
          path: test-results/python-inventory
      - name: Install locked Python dependencies
        run: uv sync --frozen --all-groups --extra providers
      - name: Set up pnpm for selector-bearing shards
        if: env.PYTHON_SHARD == 'unit' || env.PYTHON_SHARD == 'acceptance-performance'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Set up Node.js for selector-bearing shards
        if: env.PYTHON_SHARD == 'unit' || env.PYTHON_SHARD == 'acceptance-performance'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore exact-lock pnpm downloads for selector-bearing shards
        if: env.PYTHON_SHARD == 'unit' || env.PYTHON_SHARD == 'acceptance-performance'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ runner.arch }}-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Restore exact-lock browser binaries for the performance shard
        if: env.PYTHON_SHARD == 'acceptance-performance'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ env.PLAYWRIGHT_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install locked selector toolchain
        if: env.PYTHON_SHARD == 'unit' || env.PYTHON_SHARD == 'acceptance-performance'
        run: pnpm install --frozen-lockfile
      - name: Install Chromium for the performance shard
        if: env.PYTHON_SHARD == 'acceptance-performance'
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Python quality gates once with the unit shard
        if: env.PYTHON_SHARD == 'unit'
        run: |
          uv run --frozen ruff format --check .
          uv run --frozen ruff check .
          uv run --frozen mypy --strict src scripts
          uv run --frozen bandit -q -ll -r src scripts
      - name: Verify documentation provenance before performance
        if: env.PYTHON_SHARD == 'acceptance-performance'
        shell: bash
        env:
          PROVENANCE_SOURCE_REPOSITORY: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          PROVENANCE_SOURCE_SHA: ${{ env.SOURCE_SHA }}
        run: |
          set -euo pipefail
          audit_repo="$RUNNER_TEMP/documentation-provenance.git"
          rm -rf "$audit_repo"
          git init --bare --quiet "$audit_repo"
          git -C "$audit_repo" fetch --quiet --no-tags --force --no-recurse-submodules \
            "$GITHUB_SERVER_URL/$PROVENANCE_SOURCE_REPOSITORY.git" \
            "+${PROVENANCE_SOURCE_SHA}:refs/heads/exact-source"
          test "$(git -C "$audit_repo" rev-parse refs/heads/exact-source)" = "$PROVENANCE_SOURCE_SHA"
          export STOCK_DESK_DOC_PROVENANCE_GIT_DIR="$audit_repo"
          export STOCK_DESK_DOC_PROVENANCE_TIP=refs/heads/exact-source
          {
            printf 'STOCK_DESK_DOC_PROVENANCE_GIT_DIR=%s\n' "$audit_repo"
            printf 'STOCK_DESK_DOC_PROVENANCE_TIP=%s\n' "$STOCK_DESK_DOC_PROVENANCE_TIP"
          } >> "$GITHUB_ENV"
          printf 'documentation-provenance source=%s sha=%s tip=%s\n' \
            "$PROVENANCE_SOURCE_REPOSITORY" "$PROVENANCE_SOURCE_SHA" \
            "$STOCK_DESK_DOC_PROVENANCE_TIP"
          uv run --frozen python scripts/verify_docs.py --repo-root .
      - name: Prepare deterministic performance evidence once
        if: env.PYTHON_SHARD == 'acceptance-performance'
        run: >-
          uv run --frozen python scripts/run_performance_baseline.py
          --fixture full-a-scope-bounded-ten-year
          --evidence-kind target_baseline
          --output test-results/performance/current.json
          --compare tests/performance/baseline.json
      - name: Preserve first-attempt performance evidence
        if: always() && env.PYTHON_SHARD == 'acceptance-performance'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-first-attempt-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            test-results/performance/current.json
            test-results/performance/browser-raw.json
            test-results/performance/first-attempt-failure.json
          if-no-files-found: error
          retention-days: 7
      - name: Run authoritative shard exactly once
        shell: bash
        run: |
          set -euo pipefail
          out="test-results/$EVIDENCE_ARTIFACT"
          mkdir -p "$out"
          tree=$(git rev-parse HEAD^{tree})
          read -r -a roots <<< "$PYTHON_ROOTS"
          export STOCK_DESK_SOURCE_SHA="$SOURCE_SHA"
          export STOCK_DESK_SOURCE_TREE="$tree"
          export STOCK_DESK_PYTHON_SHARD="$PYTHON_SHARD"
          export COVERAGE_FILE="$out/.coverage"
          uv run --frozen coverage run --branch --parallel-mode \
            --context="stock-desk:$SOURCE_SHA:$tree:$PYTHON_SHARD" \
            -m pytest -W error -p scripts.ci_test_inventory "${roots[@]}" \
            --junitxml="$out/junit.xml"
          mapfile -t coverage_files < <(find "$out" -maxdepth 1 -type f -name '.coverage.*' -print)
          test "${#coverage_files[@]}" -eq 1
          mv "${coverage_files[0]}" "$out/.coverage.$PYTHON_SHARD"
          uv run --frozen python scripts/aggregate_ci_evidence.py shard \
            --inventory test-results/python-inventory/inventory.json \
            --shard "$PYTHON_SHARD" --junit "$out/junit.xml" \
            --coverage-data "$out/.coverage.$PYTHON_SHARD" \
            --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --output "$out/shard-evidence.json"
      - name: Create exact-SHA shard manifest
        shell: bash
        run: |
          set -euo pipefail
          out="test-results/$EVIDENCE_ARTIFACT"
          tree=$(git rev-parse HEAD^{tree})
          uv run --frozen python scripts/artifact_manifest.py create \
            --root "$out" --output "$out/$EVIDENCE_ARTIFACT.json" \
            --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --workflow CI --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --job-id "$GITHUB_JOB" --job-name "$EVIDENCE_JOB_NAME" \
            --payload "shard-evidence.json:provenance" \
            --payload ".coverage.$PYTHON_SHARD:python" --payload "junit.xml:python" \
            --critical-input "aggregate-ci=$(sha256sum scripts/aggregate_ci_evidence.py | cut -d' ' -f1)" \
            --toolchain "python=$(python --version | cut -d' ' -f2)" \
            --lockfile "uv.lock=$(sha256sum uv.lock | cut -d' ' -f1)"
          uv run --frozen python - "$out" "$EVIDENCE_ARTIFACT" <<'PY'
          import json
          import sys
          from pathlib import Path
          from scripts.artifact_manifest import create_attestation_binding, read_manifest
          root = Path(sys.argv[1])
          manifest = read_manifest(root / f"{sys.argv[2]}.json")
          (root / "manifest-binding.json").write_text(
              json.dumps(create_attestation_binding(manifest), sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Upload immutable shard evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.EVIDENCE_ARTIFACT }}
          path: test-results/${{ env.EVIDENCE_ARTIFACT }}/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

  python-integration:
    name: Python integration shard
    needs: impact
    if: contains(fromJSON(needs.impact.outputs.required_jobs), 'python-integration')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHON_SHARD: integration
      PYTHON_ROOTS: tests/integration
      EVIDENCE_ARTIFACT: python-evidence-integration
      EVIDENCE_JOB_NAME: Python integration shard
    steps: *python-shard-steps

  python-acceptance-performance:
    name: Python acceptance and performance shard
    needs: impact
    if: contains(fromJSON(needs.impact.outputs.required_jobs), 'python-acceptance-performance')
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      PYTHON_SHARD: acceptance-performance
      PYTHON_ROOTS: tests/acceptance tests/performance
      EVIDENCE_ARTIFACT: python-evidence-acceptance-performance
      EVIDENCE_JOB_NAME: Python acceptance and performance shard
    steps: *python-shard-steps

  python-security:
    name: Python security shard
    needs: impact
    if: contains(fromJSON(needs.impact.outputs.required_jobs), 'python-security')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      PYTHON_SHARD: security
      PYTHON_ROOTS: tests/security
      EVIDENCE_ARTIFACT: python-evidence-security
