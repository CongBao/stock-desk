name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "24"
  PNPM_VERSION: "11.7.0"
  PLAYWRIGHT_VERSION: "1.61.1"
  RUST_VERSION: "1.88.0"
  SOURCE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  impact:
    name: Select required test scope
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      profile: ${{ steps.scope.outputs.profile }}
      full: ${{ steps.scope.outputs.full }}
      reason: ${{ steps.scope.outputs.reason }}
      domains: ${{ steps.scope.outputs.domains }}
      required_jobs: ${{ steps.scope.outputs.required_jobs }}
      skipped_jobs: ${{ steps.scope.outputs.skipped_jobs }}
    steps:
      - name: Check out exact source and base history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Classify changed paths conservatively
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          EXPECTED_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          FORK_PULL_REQUEST: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          set -euo pipefail
          args=(--event-name "${{ github.event_name }}" --base "$BASE_SHA" --head "$HEAD_SHA" --expected-base "$EXPECTED_BASE_SHA" --github-output "$GITHUB_OUTPUT" --check-inventory)
          [[ "$FORK_PULL_REQUEST" == true ]] && args+=(--fork-pull-request)
          if ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null ||
             ! git merge-base --is-ancestor "$BASE_SHA" "$HEAD_SHA"; then
            args+=(--base-unreachable)
          fi
          python scripts/ci_impact.py "${args[@]}"
      - name: Set up uv for canonical inventory
        if: contains(steps.scope.outputs.required_jobs, 'python-')
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Restore exact-lock uv downloads
        if: contains(steps.scope.outputs.required_jobs, 'python-')
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ runner.arch }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
      - name: Install locked dependencies for inventory
        if: contains(steps.scope.outputs.required_jobs, 'python-')
        run: uv sync --frozen --all-groups --extra providers
      - name: Collect canonical Python inventory exactly once
        if: contains(steps.scope.outputs.required_jobs, 'python-')
        run: |
          mkdir -p test-results/python-inventory
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          uv run --frozen python scripts/ci_test_inventory.py collect --source-sha "$SOURCE_SHA" --source-tree "$(git rev-parse HEAD^{tree})" --output test-results/python-inventory/inventory.json
      - name: Upload canonical Python inventory
        if: contains(steps.scope.outputs.required_jobs, 'python-')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-test-inventory
          path: test-results/python-inventory/inventory.json
          if-no-files-found: error
          retention-days: 7

  windows-browser-observer:
    name: Execute Windows browser and UIA observer integrations
    runs-on: windows-2025
    timeout-minutes: 10
    steps:
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Set up Python for immutable evidence
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Execute production Win32 observer and reviewed UIA runtime fixture
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          if ((git rev-parse HEAD) -cne $env:SOURCE_SHA) { throw 'checkout is not SOURCE_SHA' }
          $out = Join-Path $env:RUNNER_TEMP 'windows-browser-observer-evidence'
          New-Item -ItemType Directory -Force $out | Out-Null
          & tests\windows\windows_browser_observer_integration.ps1 -OutputPath (Join-Path $out 'observer-evidence.json')
          if ($LASTEXITCODE -ne 0) { throw 'production Win32 browser observer integration failed' }
          & tests\windows\windows_desktop_uia_driver_integration.ps1 -OutputPath (Join-Path $out 'uia-driver-evidence.json')
          if ($LASTEXITCODE -ne 0) { throw 'reviewed UIA driver integration failed' }
      - name: Bind observer evidence to exact source and producer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $out = Join-Path $env:RUNNER_TEMP 'windows-browser-observer-evidence'
          $tree = (git rev-parse 'HEAD^{tree}').Trim()
          $guestHash = (Get-FileHash scripts\windows_installed_guest_harness.ps1 -Algorithm SHA256).Hash.ToLowerInvariant()
          $testHash = (Get-FileHash tests\windows\windows_browser_observer_integration.ps1 -Algorithm SHA256).Hash.ToLowerInvariant()
          $uiaHash = (Get-FileHash scripts\windows_desktop_uia_driver.ps1 -Algorithm SHA256).Hash.ToLowerInvariant()
          $uiaTestHash = (Get-FileHash tests\windows\windows_desktop_uia_driver_integration.ps1 -Algorithm SHA256).Hash.ToLowerInvariant()
          $workflowHash = (Get-FileHash .github\workflows\ci.yml -Algorithm SHA256).Hash.ToLowerInvariant()
          $lockHash = (Get-FileHash uv.lock -Algorithm SHA256).Hash.ToLowerInvariant()
          $receipt = Get-Content -LiteralPath (Join-Path $out 'observer-evidence.json') -Raw | ConvertFrom-Json
          if (
            $receipt.schema -ne 'stock-desk-windows-browser-observer-integration-v1' -or
            $receipt.source_sha -cne $env:SOURCE_SHA -or $receipt.source_tree -cne $tree -or
            $receipt.workflow_ref -cne $env:GITHUB_WORKFLOW_REF -or
            $receipt.workflow_sha -cne $env:GITHUB_WORKFLOW_SHA -or
            $receipt.event_name -cne $env:GITHUB_EVENT_NAME -or
            $receipt.run_id -ne [long]$env:GITHUB_RUN_ID -or
            $receipt.run_attempt -ne [int]$env:GITHUB_RUN_ATTEMPT -or
            $receipt.job_id -cne $env:GITHUB_JOB -or
            $receipt.guest_harness_sha256 -cne $guestHash -or
            $receipt.integration_driver_sha256 -cne $testHash -or
            $receipt.enum_windows_same_pid_window_count -ne 2 -or
            $receipt.between_poll_transient_observed -ne $true -or
            $receipt.unhook_failure_failed_closed -ne $true -or
            $null -ne $receipt.unhook_failure_stopped_timestamp
          ) { throw 'observer integration receipt is not exact-SHA fail-closed evidence' }
          $uiaReceipt = Get-Content -LiteralPath (Join-Path $out 'uia-driver-evidence.json') -Raw | ConvertFrom-Json
          $uiaProbeRoot = Join-Path $out 'uia-runtime-probe'
          $runtimeProbeHash = (Get-FileHash -LiteralPath (Join-Path $uiaProbeRoot 'driver-result.json') -Algorithm SHA256).Hash.ToLowerInvariant()
          $runtimeActionsHash = (Get-FileHash -LiteralPath (Join-Path $uiaProbeRoot 'uia-actions.json') -Algorithm SHA256).Hash.ToLowerInvariant()
          $runtimeTreeHash = (Get-FileHash -LiteralPath (Join-Path $uiaProbeRoot 'uia-tree.json') -Algorithm SHA256).Hash.ToLowerInvariant()
          $runtimeCaptureHash = (Get-FileHash -LiteralPath (Join-Path $uiaProbeRoot 'runtime-probe-window.png') -Algorithm SHA256).Hash.ToLowerInvariant()
          $focusContactHash = (Get-FileHash -LiteralPath (Join-Path $uiaProbeRoot 'focus-region-contact-sheet.png') -Algorithm SHA256).Hash.ToLowerInvariant()
          if (
            $uiaReceipt.schema -ne 'stock-desk-windows-uia-driver-integration-v1' -or
            $uiaReceipt.evidence_kind -ne 'github-hosted-contract-not-real-vm' -or
            $uiaReceipt.source_sha -cne $env:SOURCE_SHA -or $uiaReceipt.source_tree -cne $tree -or
            $uiaReceipt.workflow_ref -cne $env:GITHUB_WORKFLOW_REF -or
            $uiaReceipt.workflow_sha -cne $env:GITHUB_WORKFLOW_SHA -or
            $uiaReceipt.run_id -ne [long]$env:GITHUB_RUN_ID -or
            $uiaReceipt.run_attempt -ne [int]$env:GITHUB_RUN_ATTEMPT -or
            $uiaReceipt.job_id -cne $env:GITHUB_JOB -or
            $uiaReceipt.uia_driver_sha256 -cne $uiaHash -or
            $uiaReceipt.parsed_on_windows -ne $true -or
            $uiaReceipt.executed_on_windows -ne $true -or
            $uiaReceipt.controlled_uia_fixture -ne $true -or
            $uiaReceipt.target_hwnd_dpi_contract -ne $true -or
            $uiaReceipt.real_tab_input_contract -ne $true -or
            $uiaReceipt.real_escape_input_contract -ne $true -or
            $uiaReceipt.actual_tab_activation_observed -ne $true -or
            $uiaReceipt.actual_escape_close_observed -ne $true -or
            $uiaReceipt.focus_observation_method -ne 'uia-focused-element-after-real-tab' -or
            $uiaReceipt.focus_region_changed -ne $true -or
            $uiaReceipt.unfocused_region_id -cnotmatch '^focus-region-[0-9]{3}$' -or
            $uiaReceipt.focused_region_id -cnotmatch '^focus-region-[0-9]{3}$' -or
            $uiaReceipt.focused_region_id -ceq $uiaReceipt.unfocused_region_id -or
            $uiaReceipt.focus_region_contact_sheet_sha256 -cne $focusContactHash -or
            $uiaReceipt.runtime_probe_sha256 -cne $runtimeProbeHash -or
            $uiaReceipt.runtime_actions_sha256 -cne $runtimeActionsHash -or
            $uiaReceipt.runtime_tree_sha256 -cne $runtimeTreeHash -or
            $uiaReceipt.target_window_capture_sha256 -cne $runtimeCaptureHash -or
            $uiaReceipt.raw_only -ne $true -or $uiaReceipt.real_vm_acceptance -ne $false
          ) { throw 'UIA driver integration receipt is not exact-SHA non-VM contract evidence' }
          python scripts\artifact_manifest.py create `
            --root $out --output (Join-Path $out 'windows-browser-observer-evidence.json') `
            --source-sha $env:SOURCE_SHA --source-tree $tree `
            --workflow CI --run-id $env:GITHUB_RUN_ID --run-attempt $env:GITHUB_RUN_ATTEMPT `
            --job-id $env:GITHUB_JOB --job-name 'Execute Windows browser and UIA observer integrations' `
            --payload 'observer-evidence.json:provenance' `
            --payload 'uia-driver-evidence.json:provenance' `
            --payload 'uia-runtime-probe/driver-result.json:provenance' `
            --payload 'uia-runtime-probe/uia-actions.json:provenance' `
            --payload 'uia-runtime-probe/uia-tree.json:provenance' `
            --payload 'uia-runtime-probe/runtime-probe-window.png:provenance' `
            --payload 'uia-runtime-probe/focus-region-contact-sheet.png:provenance' `
            --critical-input "scripts/windows_installed_guest_harness.ps1=$guestHash" `
            --critical-input "tests/windows/windows_browser_observer_integration.ps1=$testHash" `
            --critical-input "scripts/windows_desktop_uia_driver.ps1=$uiaHash" `
            --critical-input "tests/windows/windows_desktop_uia_driver_integration.ps1=$uiaTestHash" `
            --critical-input ".github/workflows/ci.yml=$workflowHash" `
            --toolchain "powershell=$($PSVersionTable.PSVersion)" `
            --lockfile "uv.lock=$lockHash"
          if ($LASTEXITCODE -ne 0) { throw 'observer evidence manifest creation failed' }
          @'
          import json
          from pathlib import Path
          from scripts.artifact_manifest import create_attestation_binding, read_manifest

          root = Path(r"__OUT__")
          (root / "manifest-binding.json").write_text(
              json.dumps(
                  create_attestation_binding(
                      read_manifest(root / "windows-browser-observer-evidence.json")
                  ),
                  sort_keys=True,
              )
              + "\n",
              encoding="utf-8",
          )
          '@.Replace('__OUT__', ($out -replace '\\', '/')) | python -
          if ($LASTEXITCODE -ne 0) { throw 'observer evidence binding creation failed' }
      - name: Upload exact-SHA browser observer evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-browser-observer-evidence
          path: ${{ runner.temp }}/windows-browser-observer-evidence/
          if-no-files-found: error
          retention-days: 7
      - name: Clean observer integration state
        if: always()
        shell: pwsh
        run: Remove-Item -Recurse -Force (Join-Path $env:RUNNER_TEMP 'windows-browser-observer-evidence') -ErrorAction SilentlyContinue

  windows-desktop-builder-a:
    name: Build and verify Windows desktop candidate A
    needs: impact
    if: contains(fromJSON(needs.impact.outputs.required_jobs), 'artifact-proof')
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - name: Initialize candidate A diagnostics
        shell: pwsh
        run: |
          $diagnostics = Join-Path $env:RUNNER_TEMP 'windows-desktop-a\diagnostics'
          New-Item -ItemType Directory -Force $diagnostics | Out-Null
          "job=$env:GITHUB_JOB run=$env:GITHUB_RUN_ID attempt=$env:GITHUB_RUN_ATTEMPT" | Set-Content -Encoding utf8NoBOM (Join-Path $diagnostics 'job-started.txt')
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Set up Rust target
        shell: pwsh
        run: |
          rustup toolchain install $env:RUST_VERSION --profile minimal
          rustup default $env:RUST_VERSION
          rustup target add x86_64-pc-windows-msvc --toolchain $env:RUST_VERSION
      - name: Restore exact-lock uv downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/uv
          key: desktop-a-uv-${{ runner.os }}-${{ runner.arch }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
      - name: Restore exact-lock pnpm downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.pnpm-store
          key: desktop-a-pnpm-${{ runner.os }}-${{ runner.arch }}-${{ env.NODE_VERSION }}-pnpm-${{ env.PNPM_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Restore exact-lock Cargo downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: desktop-a-cargo-${{ runner.os }}-${{ runner.arch }}-${{ env.RUST_VERSION }}-${{ hashFiles('src-tauri/Cargo.lock') }}
      - name: Install locked dependencies
        shell: pwsh
        run: |
          uv sync --frozen --all-groups --extra providers
          pnpm config set store-dir "$HOME/.pnpm-store"
          pnpm install --frozen-lockfile
      - name: Verify candidate A desktop privacy boundary
        run: uv run --frozen python scripts/verify_zero_telemetry.py --root .
      - name: Execute Windows standard-user data contracts
        run: |
          uv run --frozen pytest -W error tests/integration/test_windows_runtime_acl.py
          uv run --frozen pytest -W error tests/unit/storage/test_backup.py -k restore_journal
          uv run --frozen pytest -W error tests/unit/test_trusted_updater_release.py -k windows_production
      - name: Build exact-SHA Windows desktop once
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $diagnostics = Join-Path $env:RUNNER_TEMP 'windows-desktop-a\diagnostics'
          New-Item -ItemType Directory -Force $diagnostics | Out-Null
          trap { $_ | Out-String | Set-Content -Encoding utf8NoBOM (Join-Path $diagnostics 'build-failure.txt'); throw $_ }
          @((git rev-parse HEAD), (git rev-parse 'HEAD^{tree}')) | Set-Content -Encoding utf8NoBOM (Join-Path $diagnostics 'source-identity.txt')
          if ((git rev-parse HEAD) -ne $env:SOURCE_SHA) { throw 'checkout is not SOURCE_SHA' }
          uv run --frozen python scripts/build_windows_desktop.py 2>&1 | Tee-Object (Join-Path $diagnostics 'build.log')
          if ($LASTEXITCODE -ne 0) { throw 'Windows desktop build failed' }
      - name: Capture and reproduce fixed NSIS repack kit
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          if ((git rev-parse HEAD) -cne $env:SOURCE_SHA) { throw 'checkout is not SOURCE_SHA' }
          $tauriVersion = (& pnpm exec tauri --version).Trim()
          if ($LASTEXITCODE -ne 0 -or $tauriVersion -cnotmatch '(^|\s)2\.11\.4$') { throw "unexpected Tauri CLI version: $tauriVersion" }
          $release = 'src-tauri\target\x86_64-pc-windows-msvc\release'
          $bundle = Join-Path $release 'bundle\nsis'
          $rendered = Join-Path $release 'nsis\x64'
          foreach ($renderedInput in @('installer.nsi','FileAssociation.nsh','utils.nsh')) {
            if (-not (Test-Path -LiteralPath (Join-Path $rendered $renderedInput) -PathType Leaf)) { throw "Tauri rendered NSIS input is missing: $renderedInput" }
          }
          $installers = @(Get-ChildItem -LiteralPath $bundle -File -Filter '*.exe')
          if ($installers.Count -ne 1) { throw 'expected exactly one original unsigned NSIS candidate' }
          $toolRoots = @(Get-ChildItem -LiteralPath (Join-Path $env:LOCALAPPDATA 'tauri') -Recurse -File -Filter 'makensis.exe' | Where-Object {
            (Test-Path -LiteralPath (Join-Path $_.DirectoryName 'Include') -PathType Container) -and
            (Test-Path -LiteralPath (Join-Path $_.DirectoryName 'Plugins') -PathType Container) -and
            (Test-Path -LiteralPath (Join-Path $_.DirectoryName 'Stubs') -PathType Container) -and
            (Test-Path -LiteralPath (Join-Path $_.DirectoryName 'Bin\makensis.exe') -PathType Leaf)
          } | ForEach-Object DirectoryName | Sort-Object -Unique)
          if ($toolRoots.Count -ne 1) { throw "expected exactly one Tauri NSIS toolset, found $($toolRoots.Count)" }
          $nsisVersion = (& (Join-Path $toolRoots[0] 'makensis.exe') /VERSION).Trim()
          if ($LASTEXITCODE -ne 0 -or $nsisVersion -cne 'v3.11') { throw "unexpected NSIS version: $nsisVersion" }
          $root = Join-Path $env:RUNNER_TEMP 'windows-desktop-a'
          $artifact = Join-Path $root 'artifact'
          New-Item -ItemType Directory -Force $artifact | Out-Null
          & tests\windows\nsis_repack_contract_integration.ps1 `
            -RenderedRoot $rendered -NsisRoot $toolRoots[0] `
            -TauriConfig 'src-tauri\tauri.conf.json' `
            -NsisTemplate 'packaging\nsis\installer.nsi' `
            -ExpectedInstaller $installers[0].FullName `
            -Kit (Join-Path $artifact 'nsis-repack-kit') `
            -EvidenceRoot (Join-Path $artifact 'nsis-repack-verification') `
            -SourceSha $env:SOURCE_SHA -SourceTree (git rev-parse 'HEAD^{tree}') `
            -SourceEpoch ([long](git show -s --format=%ct HEAD))
          if ($LASTEXITCODE -ne 0) { throw 'fixed NSIS repack integration failed' }
      - name: Safely unpack and verify candidate A
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = Join-Path $env:RUNNER_TEMP 'windows-desktop-a'
          $outer = Join-Path $root 'outer'
          $payload = Join-Path $root 'payload'
          $out = Join-Path $root 'artifact'
          New-Item -ItemType Directory -Force $outer, $payload, $out | Out-Null
          $diagnostics = Join-Path $root 'diagnostics'
          New-Item -ItemType Directory -Force $diagnostics | Out-Null
          trap { $_ | Out-String | Set-Content -Encoding utf8NoBOM (Join-Path $diagnostics 'verification-failure.txt'); Get-ChildItem $root -Recurse -Force -ErrorAction SilentlyContinue | Select-Object FullName,Length | Out-File -Encoding utf8 (Join-Path $diagnostics 'artifact-inventory.txt'); throw $_ }
          function Assert-SafeArchive([string]$archive) {
            $listing = @(& 7z l -slt -ba $archive)
            if ($LASTEXITCODE -ne 0) { throw 'archive listing failed' }
            foreach ($line in $listing) {
              if ($line -match '^Path = (.+)$') {
                $entry = $Matches[1]
                if ([IO.Path]::IsPathRooted($entry) -or $entry.Contains(':') -or (($entry -split '[\\/]') -contains '..')) { throw "unsafe archive path: $entry" }
              }
              if ($line -match '^(Symbolic Link|Hard Link|Reparse) = ') { throw 'linked archive entries are forbidden' }
            }
          }
          $installers = @(Get-ChildItem 'src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis\*.exe')
          if ($installers.Count -ne 1) { throw 'expected exactly one NSIS installer' }
          Assert-SafeArchive $installers[0].FullName
          & 7z x $installers[0].FullName "-o$outer" -y | Out-Null
          if ($LASTEXITCODE -ne 0) { throw 'NSIS extraction failed' }
          $desktopHost = @(Get-ChildItem $outer -Recurse -File -Filter 'stock-desk-desktop.exe')
          $installedSidecar = @(Get-ChildItem $outer -Recurse -File -Filter 'stock-desk-sidecar.exe')
          if ($desktopHost.Count -ne 1 -or $installedSidecar.Count -ne 1 -or $desktopHost[0].DirectoryName -ne $installedSidecar[0].DirectoryName) { throw 'direct NSIS application payload identity is invalid' }
          $appRoot = $desktopHost[0].Directory
          foreach ($file in Get-ChildItem $appRoot -Recurse -Force -File) {
            $relative = [IO.Path]::GetRelativePath($appRoot.FullName, $file.FullName)
            $first = ($relative -split '[\\/]')[0]
            $folded = $file.Name.ToLowerInvariant()
            if ($first.StartsWith('$') -or $first.StartsWith('[')) { continue }
            if ($folded -in @('microsoftedgewebview2runtimeinstaller.exe','microsoftedgewebview2runtimeinstallerx64.exe','microsoftedgewebview2setup.exe')) { continue }
            if ($file.Extension.ToLowerInvariant() -in @('.exe','.com','.bat','.cmd','.ps1','.msi','.scr','.cpl') -and $folded -notin @('stock-desk-desktop.exe','stock-desk-sidecar.exe','uninstall.exe')) { throw "unexpected direct NSIS application executable: $relative" }
            $destination = Join-Path $payload $relative
            New-Item -ItemType Directory -Force (Split-Path $destination -Parent) | Out-Null
            Copy-Item $file.FullName $destination
          }
          $webview = @(Get-ChildItem $outer -Recurse -File | Where-Object { $_.Name.ToLowerInvariant() -in @('microsoftedgewebview2runtimeinstaller.exe','microsoftedgewebview2runtimeinstallerx64.exe','microsoftedgewebview2setup.exe') })
          if ($webview.Count -ne 1) { throw 'expected exactly one WebView2 offline installer' }
          Copy-Item $webview[0].FullName (Join-Path $payload $webview[0].Name)
          Copy-Item $installers[0].FullName (Join-Path $payload 'stock-desk-unsigned-nsis.exe')
          $sidecar = @(Get-ChildItem $payload -Recurse -File -Filter 'stock-desk-sidecar.exe')
          if ($sidecar.Count -ne 1) { throw 'expected exactly one packaged sidecar' }
          $uvLock = (Get-FileHash uv.lock -Algorithm SHA256).Hash.ToLowerInvariant()
          $pnpmLock = (Get-FileHash pnpm-lock.yaml -Algorithm SHA256).Hash.ToLowerInvariant()
          $cargoLock = (Get-FileHash src-tauri\Cargo.lock -Algorithm SHA256).Hash.ToLowerInvariant()
          $python = Join-Path $PWD '.venv\Scripts\python.exe'
          $manifestOutput = Join-Path $out 'windows-desktop-bundle.json'
          if (-not (Test-Path -LiteralPath $python -PathType Leaf)) { throw 'locked Python environment is missing' }
          $tauriConfig = Get-Content -LiteralPath 'src-tauri\tauri.conf.json' -Raw | ConvertFrom-Json
          $releaseVersion = $tauriConfig.version
          if ($releaseVersion -match '^1\.1\.0-(alpha|beta)\.[1-9][0-9]*$') { $releaseChannel = 'prerelease' }
          elseif ($releaseVersion -match '^1\.1\.0(-rc\.[1-9][0-9]*)?$') { $releaseChannel = 'formal-candidate' }
          else { throw 'Tauri release version is not an allowed unsigned candidate' }
          & $python scripts/verify_windows_desktop_bundle.py $payload `
            --version $releaseVersion --source-sha $env:SOURCE_SHA `
            --toolchain "python=$env:PYTHON_VERSION" --toolchain "node=$env:NODE_VERSION" `
            --toolchain "pnpm=$env:PNPM_VERSION" --toolchain "rust=$env:RUST_VERSION" `
            --lock "uv.lock=$uvLock" --lock "pnpm-lock.yaml=$pnpmLock" --lock "Cargo.lock=$cargoLock" `
            --installer (Join-Path $payload 'stock-desk-unsigned-nsis.exe') --sidecar $sidecar[0].FullName `
            --output $manifestOutput
          if ($LASTEXITCODE -ne 0) { throw 'Windows bundle verifier failed' }
          if (-not (Test-Path -LiteralPath $manifestOutput -PathType Leaf) -or (Get-Item -LiteralPath $manifestOutput).Length -le 0) { throw 'Windows bundle manifest was not created' }
          $manifest = Get-Content -LiteralPath $manifestOutput -Raw | ConvertFrom-Json
          if ($manifest.artifact -ne 'windows-desktop-bundle' -or $manifest.source_sha -ne $env:SOURCE_SHA -or $manifest.release.version -ne $releaseVersion -or $manifest.release.channel -ne $releaseChannel -or $manifest.release.signature -ne 'unsigned') { throw 'Windows bundle manifest identity is invalid' }
          Copy-Item $installers[0].FullName (Join-Path $out 'stock-desk-unsigned-nsis.exe')
          [ordered]@{schema_version=1;builder='A';source_sha=$env:SOURCE_SHA;source_tree=(git rev-parse 'HEAD^{tree}');runner_os=$env:RUNNER_OS;runner_arch=$env:RUNNER_ARCH;run_id=$env:GITHUB_RUN_ID;run_attempt=$env:GITHUB_RUN_ATTEMPT;job_id=$env:GITHUB_JOB} | ConvertTo-Json -Compress | Set-Content -Encoding utf8NoBOM (Join-Path $out 'provenance.json')
      - name: Generate exact-SHA light and dark icon evidence
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = Join-Path $env:RUNNER_TEMP 'windows-desktop-a'
          $out = Join-Path $root 'artifact\icon-evidence'
          $tree = git rev-parse 'HEAD^{tree}'
          uv run --frozen python scripts/icon_visual_evidence.py --icons src-tauri/icons --output $out --source-sha $env:SOURCE_SHA --source-tree $tree
          if ($LASTEXITCODE -ne 0) { throw 'Windows icon evidence generation failed' }
          $scriptHash = (Get-FileHash scripts\icon_visual_evidence.py -Algorithm SHA256).Hash.ToLowerInvariant()
          $baselineHash = (Get-FileHash tests\fixtures\desktop-icons\pixel-baseline.json -Algorithm SHA256).Hash.ToLowerInvariant()
          uv run --frozen python scripts/artifact_manifest.py create --root $out --output (Join-Path $out 'manifest.json') --source-sha $env:SOURCE_SHA --source-tree $tree --workflow CI --run-id $env:GITHUB_RUN_ID --run-attempt $env:GITHUB_RUN_ATTEMPT --job-id $env:GITHUB_JOB --job-name 'Build and verify Windows desktop candidate A' --payload 'windows-icon-evidence.json:provenance' --payload 'windows-icon-light-dark-contact-sheet.png:provenance' --critical-input "scripts/icon_visual_evidence.py=$scriptHash" --critical-input "tests/fixtures/desktop-icons/pixel-baseline.json=$baselineHash" --toolchain "python=$env:PYTHON_VERSION" --lockfile "uv.lock=$((Get-FileHash uv.lock -Algorithm SHA256).Hash.ToLowerInvariant())"
          if ($LASTEXITCODE -ne 0) { throw 'Windows icon evidence binding failed' }
      - name: Launch packaged Tauri and capture Windows desktop evidence
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = Join-Path $env:RUNNER_TEMP 'windows-desktop-a'
          $artifact = Join-Path $root 'artifact'
          $out = Join-Path $artifact 'desktop-ux-evidence'
          $installer = Join-Path $artifact 'stock-desk-unsigned-nsis.exe'
          $tree = git rev-parse 'HEAD^{tree}'
          & scripts\capture_windows_desktop_evidence.ps1 -Installer $installer -Output $out -SourceSha $env:SOURCE_SHA -SourceTree $tree
          if ($LASTEXITCODE -ne 0) { throw 'packaged Windows desktop evidence failed' }
          $candidateHash = (Get-FileHash $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          uv run --frozen python scripts\verify_packaged_backtest_evidence.py (Join-Path $out 'packaged-backtest-evidence.json') --seed (Join-Path $out 'packaged-backtest-seed.json') --host-observation (Join-Path $out 'packaged-backtest-host-observation.json') --desktop-manifest (Join-Path $out 'windows-desktop-evidence.json') --installer $installer --bundle-manifest (Join-Path $artifact 'windows-desktop-bundle.json') --source-sha $env:SOURCE_SHA --source-tree $tree --candidate-sha256 $candidateHash
          if ($LASTEXITCODE -ne 0) { throw 'packaged backtest evidence verification failed' }
          $captureHash = (Get-FileHash scripts\capture_windows_desktop_evidence.ps1 -Algorithm SHA256).Hash.ToLowerInvariant()
          $webviewHash = (Get-FileHash scripts\windows_desktop_webview_evidence.mjs -Algorithm SHA256).Hash.ToLowerInvariant()
          $backtestWebviewHash = (Get-FileHash scripts\windows_packaged_backtest_evidence.mjs -Algorithm SHA256).Hash.ToLowerInvariant()
          $backtestSeedHash = (Get-FileHash scripts\prepare_windows_packaged_backtest_evidence.py -Algorithm SHA256).Hash.ToLowerInvariant()
          $backtestSemanticsHash = (Get-FileHash scripts\capture_packaged_backtest_semantics.py -Algorithm SHA256).Hash.ToLowerInvariant()
          $backtestVerifierHash = (Get-FileHash scripts\verify_packaged_backtest_evidence.py -Algorithm SHA256).Hash.ToLowerInvariant()
          $backtestSchemaHash = (Get-FileHash schemas\packaged-backtest-evidence-v1.schema.json -Algorithm SHA256).Hash.ToLowerInvariant()
          $backtestHostSchemaHash = (Get-FileHash schemas\packaged-backtest-host-observation-v1.schema.json -Algorithm SHA256).Hash.ToLowerInvariant()
          $payload = @(
            'windows-desktop-evidence.json:provenance',
            'tauri-webview-evidence.json:provenance',
            'packaged-backtest-evidence.json:provenance',
            'packaged-backtest-seed.json:provenance',
            'packaged-backtest-host-observation.json:provenance',
            'tauri-native-window.png:provenance',
            'tauri-webview-light.png:provenance',
            'tauri-webview-dark.png:provenance',
            'tauri-webview-effective-100.png:provenance',
            'tauri-webview-effective-125.png:provenance',
            'tauri-webview-effective-150.png:provenance',
            'tauri-webview-effective-175.png:provenance',
            'tauri-webview-effective-200.png:provenance',
            'packaged-icon-evidence.json:provenance',
            'packaged-host-icon-16.png:provenance',
            'packaged-installer-icon-16.png:provenance',
            'packaged-host-icon.png:provenance',
            'packaged-installer-icon.png:provenance'
          )
          $arguments = @('scripts/artifact_manifest.py','create','--root',$out,'--output',(Join-Path $out 'manifest.json'),'--source-sha',$env:SOURCE_SHA,'--source-tree',$tree,'--workflow','CI','--run-id',$env:GITHUB_RUN_ID,'--run-attempt',$env:GITHUB_RUN_ATTEMPT,'--job-id',$env:GITHUB_JOB,'--job-name','Build and verify Windows desktop candidate A')
          foreach ($item in $payload) { $arguments += @('--payload', $item) }
          $iconVerifierHash = (Get-FileHash scripts\verify_windows_packaged_icons.py -Algorithm SHA256).Hash.ToLowerInvariant()
          $workflowHash = (Get-FileHash .github\workflows\ci.yml -Algorithm SHA256).Hash.ToLowerInvariant()
          $privacyVerifierHash = (Get-FileHash scripts\verify_zero_telemetry.py -Algorithm SHA256).Hash.ToLowerInvariant()
          $privacyPolicyHash = (Get-FileHash config\desktop-network-privacy.json -Algorithm SHA256).Hash.ToLowerInvariant()
          $arguments += @('--critical-input',"scripts/capture_windows_desktop_evidence.ps1=$captureHash",'--critical-input',"scripts/windows_desktop_webview_evidence.mjs=$webviewHash",'--critical-input',"scripts/windows_packaged_backtest_evidence.mjs=$backtestWebviewHash",'--critical-input',"scripts/prepare_windows_packaged_backtest_evidence.py=$backtestSeedHash",'--critical-input',"scripts/capture_packaged_backtest_semantics.py=$backtestSemanticsHash",'--critical-input',"scripts/verify_packaged_backtest_evidence.py=$backtestVerifierHash",'--critical-input',"schemas/packaged-backtest-evidence-v1.schema.json=$backtestSchemaHash",'--critical-input',"schemas/packaged-backtest-host-observation-v1.schema.json=$backtestHostSchemaHash",'--critical-input',"tests/fixtures/backtest/v1_0_oracle.json=$((Get-FileHash tests\fixtures\backtest\v1_0_oracle.json -Algorithm SHA256).Hash.ToLowerInvariant())",'--critical-input',"tests/fixtures/backtest/v1_0_oracle_inputs.json=$((Get-FileHash tests\fixtures\backtest\v1_0_oracle_inputs.json -Algorithm SHA256).Hash.ToLowerInvariant())",'--critical-input',"scripts/v1_backtest_oracle.py=$((Get-FileHash scripts\v1_backtest_oracle.py -Algorithm SHA256).Hash.ToLowerInvariant())",'--critical-input',"scripts/verify_windows_packaged_icons.py=$iconVerifierHash",'--critical-input',".github/workflows/ci.yml=$workflowHash",'--critical-input',"scripts/verify_zero_telemetry.py=$privacyVerifierHash",'--critical-input',"config/desktop-network-privacy.json=$privacyPolicyHash",'--toolchain',"node=$env:NODE_VERSION",'--lockfile',"pnpm-lock.yaml=$((Get-FileHash pnpm-lock.yaml -Algorithm SHA256).Hash.ToLowerInvariant())")
          uv run --frozen python @arguments
          if ($LASTEXITCODE -ne 0) { throw 'packaged Windows desktop evidence binding failed' }
      - name: Upload source-free candidate A
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-desktop-candidate-a-${{ env.SOURCE_SHA }}
          path: ${{ runner.temp }}/windows-desktop-a/artifact/
          if-no-files-found: error
          retention-days: 30
      - name: Upload candidate A diagnostics before cleanup
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-desktop-candidate-a-diagnostics-${{ env.SOURCE_SHA }}
          path: ${{ runner.temp }}/windows-desktop-a/diagnostics/
          if-no-files-found: warn
          retention-days: 7
      - name: Clean candidate A build and test state
        if: always()
        shell: pwsh
        run: |
          try {
            if (Get-Command uv -ErrorAction SilentlyContinue) { uv run --frozen python scripts/clean_build_artifacts.py }
          } finally {
            Remove-Item -Recurse -Force (Join-Path $env:RUNNER_TEMP 'windows-desktop-a') -ErrorAction SilentlyContinue
            Remove-Item -Recurse -Force (Join-Path $env:LOCALAPPDATA 'Stock Desk\v1.1') -ErrorAction SilentlyContinue
          }

  windows-desktop-builder-b:
    name: Build and verify Windows desktop candidate B
    needs: impact
    if: github.event_name == 'push' && contains(fromJSON(needs.impact.outputs.required_jobs), 'artifact-proof')
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - name: Initialize candidate B diagnostics
        shell: pwsh
        run: |
          $diagnostics = Join-Path $env:RUNNER_TEMP 'windows-desktop-b\diagnostics'
          New-Item -ItemType Directory -Force $diagnostics | Out-Null
          "job=$env:GITHUB_JOB run=$env:GITHUB_RUN_ID attempt=$env:GITHUB_RUN_ATTEMPT" | Set-Content -Encoding utf8NoBOM (Join-Path $diagnostics 'job-started.txt')
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Set up Rust target
        shell: pwsh
        run: |
          rustup toolchain install $env:RUST_VERSION --profile minimal
          rustup default $env:RUST_VERSION
          rustup target add x86_64-pc-windows-msvc --toolchain $env:RUST_VERSION
      - name: Restore exact-lock uv downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/uv
          key: desktop-b-uv-${{ runner.os }}-${{ runner.arch }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
      - name: Restore exact-lock pnpm downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.pnpm-store
          key: desktop-b-pnpm-${{ runner.os }}-${{ runner.arch }}-${{ env.NODE_VERSION }}-pnpm-${{ env.PNPM_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Restore exact-lock Cargo downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: desktop-b-cargo-${{ runner.os }}-${{ runner.arch }}-${{ env.RUST_VERSION }}-${{ hashFiles('src-tauri/Cargo.lock') }}
      - name: Install locked dependencies
        shell: pwsh
        run: |
          uv sync --frozen --all-groups --extra providers
          pnpm config set store-dir "$HOME/.pnpm-store"
          pnpm install --frozen-lockfile
      - name: Build exact-SHA Windows desktop once
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $diagnostics = Join-Path $env:RUNNER_TEMP 'windows-desktop-b\diagnostics'
          New-Item -ItemType Directory -Force $diagnostics | Out-Null
          trap { $_ | Out-String | Set-Content -Encoding utf8NoBOM (Join-Path $diagnostics 'build-failure.txt'); throw $_ }
          @((git rev-parse HEAD), (git rev-parse 'HEAD^{tree}')) | Set-Content -Encoding utf8NoBOM (Join-Path $diagnostics 'source-identity.txt')
          if ((git rev-parse HEAD) -ne $env:SOURCE_SHA) { throw 'checkout is not SOURCE_SHA' }
          uv run --frozen python scripts/build_windows_desktop.py 2>&1 | Tee-Object (Join-Path $diagnostics 'build.log')
          if ($LASTEXITCODE -ne 0) { throw 'Windows desktop build failed' }
      - name: Safely unpack and verify candidate B
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = Join-Path $env:RUNNER_TEMP 'windows-desktop-b'; $outer = Join-Path $root 'outer'; $payload = Join-Path $root 'payload'; $out = Join-Path $root 'artifact'
          New-Item -ItemType Directory -Force $outer, $payload, $out | Out-Null
          $diagnostics = Join-Path $root 'diagnostics'; New-Item -ItemType Directory -Force $diagnostics | Out-Null
          trap { $_ | Out-String | Set-Content -Encoding utf8NoBOM (Join-Path $diagnostics 'verification-failure.txt'); Get-ChildItem $root -Recurse -Force -ErrorAction SilentlyContinue | Select-Object FullName,Length | Out-File -Encoding utf8 (Join-Path $diagnostics 'artifact-inventory.txt'); throw $_ }
          function Assert-SafeArchive([string]$archive) {
            $listing = @(& 7z l -slt -ba $archive); if ($LASTEXITCODE -ne 0) { throw 'archive listing failed' }
            foreach ($line in $listing) {
              if ($line -match '^Path = (.+)$') { $entry=$Matches[1]; if ([IO.Path]::IsPathRooted($entry) -or $entry.Contains(':') -or (($entry -split '[\\/]') -contains '..')) { throw "unsafe archive path: $entry" } }
              if ($line -match '^(Symbolic Link|Hard Link|Reparse) = ') { throw 'linked archive entries are forbidden' }
            }
          }
          $installers = @(Get-ChildItem 'src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis\*.exe'); if ($installers.Count -ne 1) { throw 'expected exactly one NSIS installer' }
          Assert-SafeArchive $installers[0].FullName
          & 7z x $installers[0].FullName "-o$outer" -y | Out-Null; if ($LASTEXITCODE -ne 0) { throw 'NSIS extraction failed' }
          $desktopHost = @(Get-ChildItem $outer -Recurse -File -Filter 'stock-desk-desktop.exe'); $installedSidecar = @(Get-ChildItem $outer -Recurse -File -Filter 'stock-desk-sidecar.exe')
          if ($desktopHost.Count -ne 1 -or $installedSidecar.Count -ne 1 -or $desktopHost[0].DirectoryName -ne $installedSidecar[0].DirectoryName) { throw 'direct NSIS application payload identity is invalid' }
          $appRoot = $desktopHost[0].Directory
          foreach ($file in Get-ChildItem $appRoot -Recurse -Force -File) {
            $relative=[IO.Path]::GetRelativePath($appRoot.FullName,$file.FullName); $first=($relative -split '[\\/]')[0]; $folded=$file.Name.ToLowerInvariant()
            if ($first.StartsWith('$') -or $first.StartsWith('[')) { continue }
            if ($folded -in @('microsoftedgewebview2runtimeinstaller.exe','microsoftedgewebview2runtimeinstallerx64.exe','microsoftedgewebview2setup.exe')) { continue }
            if ($file.Extension.ToLowerInvariant() -in @('.exe','.com','.bat','.cmd','.ps1','.msi','.scr','.cpl') -and $folded -notin @('stock-desk-desktop.exe','stock-desk-sidecar.exe','uninstall.exe')) { throw "unexpected direct NSIS application executable: $relative" }
            $destination=Join-Path $payload $relative; New-Item -ItemType Directory -Force (Split-Path $destination -Parent) | Out-Null; Copy-Item $file.FullName $destination
          }
          $webview = @(Get-ChildItem $outer -Recurse -File | Where-Object { $_.Name.ToLowerInvariant() -in @('microsoftedgewebview2runtimeinstaller.exe','microsoftedgewebview2runtimeinstallerx64.exe','microsoftedgewebview2setup.exe') }); if ($webview.Count -ne 1) { throw 'expected exactly one WebView2 offline installer' }
          Copy-Item $webview[0].FullName (Join-Path $payload $webview[0].Name); Copy-Item $installers[0].FullName (Join-Path $payload 'stock-desk-unsigned-nsis.exe')
          $sidecar = @(Get-ChildItem $payload -Recurse -File -Filter 'stock-desk-sidecar.exe'); if ($sidecar.Count -ne 1) { throw 'expected exactly one packaged sidecar' }
          $uvLock=(Get-FileHash uv.lock -Algorithm SHA256).Hash.ToLowerInvariant(); $pnpmLock=(Get-FileHash pnpm-lock.yaml -Algorithm SHA256).Hash.ToLowerInvariant(); $cargoLock=(Get-FileHash src-tauri\Cargo.lock -Algorithm SHA256).Hash.ToLowerInvariant()
          $python=Join-Path $PWD '.venv\Scripts\python.exe'; $manifestOutput=Join-Path $out 'windows-desktop-bundle.json'
          if (-not (Test-Path -LiteralPath $python -PathType Leaf)) { throw 'locked Python environment is missing' }
          $tauriConfig = Get-Content -LiteralPath 'src-tauri\tauri.conf.json' -Raw | ConvertFrom-Json
          $releaseVersion = $tauriConfig.version
          if ($releaseVersion -match '^1\.1\.0-(alpha|beta)\.[1-9][0-9]*$') { $releaseChannel = 'prerelease' }
          elseif ($releaseVersion -match '^1\.1\.0(-rc\.[1-9][0-9]*)?$') { $releaseChannel = 'formal-candidate' }
          else { throw 'Tauri release version is not an allowed unsigned candidate' }
          & $python scripts/verify_windows_desktop_bundle.py $payload --version $releaseVersion --source-sha $env:SOURCE_SHA --toolchain "python=$env:PYTHON_VERSION" --toolchain "node=$env:NODE_VERSION" --toolchain "pnpm=$env:PNPM_VERSION" --toolchain "rust=$env:RUST_VERSION" --lock "uv.lock=$uvLock" --lock "pnpm-lock.yaml=$pnpmLock" --lock "Cargo.lock=$cargoLock" --installer (Join-Path $payload 'stock-desk-unsigned-nsis.exe') --sidecar $sidecar[0].FullName --output $manifestOutput
          if ($LASTEXITCODE -ne 0) { throw 'Windows bundle verifier failed' }
          if (-not (Test-Path -LiteralPath $manifestOutput -PathType Leaf) -or (Get-Item -LiteralPath $manifestOutput).Length -le 0) { throw 'Windows bundle manifest was not created' }
          $manifest=Get-Content -LiteralPath $manifestOutput -Raw | ConvertFrom-Json
          if ($manifest.artifact -ne 'windows-desktop-bundle' -or $manifest.source_sha -ne $env:SOURCE_SHA -or $manifest.release.version -ne $releaseVersion -or $manifest.release.channel -ne $releaseChannel -or $manifest.release.signature -ne 'unsigned') { throw 'Windows bundle manifest identity is invalid' }
          Copy-Item $installers[0].FullName (Join-Path $out 'stock-desk-unsigned-nsis.exe')
          [ordered]@{schema_version=1;builder='B';source_sha=$env:SOURCE_SHA;source_tree=(git rev-parse 'HEAD^{tree}');runner_os=$env:RUNNER_OS;runner_arch=$env:RUNNER_ARCH;run_id=$env:GITHUB_RUN_ID;run_attempt=$env:GITHUB_RUN_ATTEMPT;job_id=$env:GITHUB_JOB} | ConvertTo-Json -Compress | Set-Content -Encoding utf8NoBOM (Join-Path $out 'provenance.json')
      - name: Upload source-free candidate B
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-desktop-candidate-b-${{ env.SOURCE_SHA }}
          path: ${{ runner.temp }}/windows-desktop-b/artifact/
          if-no-files-found: error
          retention-days: 30
      - name: Upload candidate B diagnostics before cleanup
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-desktop-candidate-b-diagnostics-${{ env.SOURCE_SHA }}
          path: ${{ runner.temp }}/windows-desktop-b/diagnostics/
          if-no-files-found: warn
          retention-days: 7
      - name: Clean candidate B build and test state
        if: always()
        shell: pwsh
        run: |
          try {
            if (Get-Command uv -ErrorAction SilentlyContinue) { uv run --frozen python scripts/clean_build_artifacts.py }
          } finally {
            Remove-Item -Recurse -Force (Join-Path $env:RUNNER_TEMP 'windows-desktop-b') -ErrorAction SilentlyContinue
            Remove-Item -Recurse -Force (Join-Path $env:LOCALAPPDATA 'Stock Desk\v1.1') -ErrorAction SilentlyContinue
          }

  windows-desktop-compare:
    name: Compare independent Windows desktop candidates
    needs: [impact, windows-desktop-builder-a, windows-desktop-builder-b]
    if: github.event_name == 'push' && needs.windows-desktop-builder-a.result == 'success' && needs.windows-desktop-builder-b.result == 'success'
    runs-on: windows-2025
    timeout-minutes: 25
    steps:
      - name: Initialize comparison diagnostics
        shell: pwsh
        run: |
          $diagnostics = Join-Path $env:RUNNER_TEMP 'windows-compare\diagnostics'
          New-Item -ItemType Directory -Force $diagnostics | Out-Null
          "job=$env:GITHUB_JOB run=$env:GITHUB_RUN_ID attempt=$env:GITHUB_RUN_ATTEMPT" | Set-Content -Encoding utf8NoBOM (Join-Path $diagnostics 'job-started.txt')
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Download candidate A
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-desktop-candidate-a-${{ env.SOURCE_SHA }}
