name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  impact:
    name: Select required test scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      profile: ${{ steps.scope.outputs.profile }}
      full: ${{ steps.scope.outputs.full }}
    steps:
      - name: Check out source and base history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Classify changed paths conservatively
        id: scope
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: >-
          python scripts/ci_impact.py
          --event-name "${{ github.event_name }}"
          --base "$BASE_SHA"
          --head "$HEAD_SHA"
          --github-output "$GITHUB_OUTPUT"

  windows-runtime-acl:
    name: Windows runtime ACL execution
    needs: impact
    if: needs.impact.outputs.full == 'true' || needs.impact.outputs.profile == 'release-infra-desktop'
    runs-on: windows-2025
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Install locked Python dependencies
        run: uv sync --frozen --all-groups --extra providers
      - name: Execute Windows ACL contract
        run: uv run --frozen pytest -W error tests/integration/test_windows_runtime_acl.py
      - name: Execute Windows first-start journal contract
        run: >-
          uv run --frozen pytest -W error tests/unit/storage/test_backup.py
          -k restore_journal

  public-tree:
    name: Public tree and repository health
    needs: impact
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Screenshot provenance manifests intentionally bind to historical
          # commits; the pre-publish gate must be able to prove reachability.
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Set up pnpm for pre-publish evidence
        if: github.event_name == 'push'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js for pre-publish evidence
        if: github.event_name == 'push'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install locked Python dependencies
        run: uv sync --frozen --all-groups --extra providers
      - name: Install locked web dependencies for pre-publish evidence
        if: github.event_name == 'push'
        run: pnpm install --frozen-lockfile
      - name: Audit public tree
        run: make public-tree
      - name: Verify repository contracts
        run: uv run --frozen pytest -W error tests/unit/test_repository_health.py
      - name: Run main-only pre-publish evidence gates
        if: github.event_name == 'push'
        run: |
          uv run --frozen python scripts/check_requirement_coverage.py --mode pre-publish
          uv run --frozen python scripts/verify_docs.py
          uv run --frozen python -c 'from pathlib import Path; from scripts.verify_release import check_public_history; check_public_history(Path.cwd())'

  dependency-audit:
    name: Locked production dependency audit
    needs: impact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Audit locked production dependencies
        run: make security

  python:
    name: Python quality, tests, and package
    needs: impact
    runs-on: ubuntu-latest
    # The exhaustive coverage run plus staged acceptance and package gates can
    # exceed 45 minutes on a saturated hosted runner while still making steady
    # progress. Keep it bounded, with enough headroom to finish those gates.
    timeout-minutes: 75
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install locked dependencies
        run: uv sync --frozen --all-groups --extra providers
      - name: Check Python formatting
        run: uv run --frozen ruff format --check .
      - name: Lint Python
        run: uv run --frozen ruff check .
      - name: Type-check Python
        run: uv run --frozen mypy --strict src scripts
      - name: Scan Python security rules
        run: uv run --frozen bandit -q -ll -r src scripts
      - name: Test impacted release infrastructure
        if: needs.impact.outputs.profile == 'release-infra-desktop'
        run: >-
          uv run --frozen pytest -W error
          tests/unit/test_ci_impact.py
          tests/unit/test_main_validation_proof.py
          tests/unit/test_desktop_launcher.py
          tests/unit/test_installer_scripts.py
          tests/unit/test_repository_health.py
          tests/unit/test_requirement_coverage.py
          tests/unit/storage/test_backup.py
          tests/integration/storage/test_restore_recovery.py
          tests/acceptance/test_installed_distribution.py
          tests/acceptance/test_release_acceptance_scope.py
          tests/acceptance/test_release_docs.py
          tests/acceptance/test_release_artifacts.py
      - name: Test Python
        if: needs.impact.outputs.full == 'true'
        run: >-
          uv run --frozen pytest -W error --junitxml=python-test-results.xml
          --ignore=tests/acceptance/test_market_flow.py
          --ignore=tests/acceptance/test_formula_consistency.py
          --ignore=tests/acceptance/test_macd_formula_flow.py
          --ignore=tests/acceptance/test_backtest_semantics.py
          --ignore=tests/performance/test_chart_query.py
          --ignore=tests/performance/test_formula_preview.py
          --ignore=tests/performance/test_single_backtest.py
          --ignore=tests/performance/test_v1_budgets.py
          --cov=src/stock_desk --cov=scripts --cov=migrations --cov-branch
          --cov-report=term-missing --cov-report=xml:coverage.xml
          --cov-fail-under=85
      - name: Publish Python test failure notice
        if: failure() && needs.impact.outputs.full == 'true'
        shell: bash
        run: |
          set -euo pipefail
          report=python-test-results.xml
          diagnostic=python-test-failures.json
          [[ -f "$report" ]] || exit 0
          uv run --frozen python - "$report" "$diagnostic" <<'PY'
          import json
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          root = ET.parse(sys.argv[1]).getroot()
          failures = []
          for testcase in root.findall(".//testcase"):
              for kind in ("failure", "error"):
                  node = testcase.find(kind)
                  if node is None:
                      continue
                  text = node.text or ""
                  failures.append(
                      {
                          "class": testcase.get("classname", ""),
                          "name": testcase.get("name", ""),
                          "kind": kind,
                          "message": node.get("message", ""),
                          "trace_tail": text[-12_000:],
                      }
                  )
                  break
          payload = {
              "schema": "stock-desk-junit-failure-summary-v1",
              "reported_failure_count": len(failures),
              "failures": failures[:10],
          }
          Path(sys.argv[2]).write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          digest=$(sha256sum "$diagnostic" | cut -d' ' -f1)
          payload=$(gzip -n -c "$diagnostic" | base64 -w0)
          chunk_size=2800
          part_count=$(((${#payload} + chunk_size - 1) / chunk_size))
          for ((part_index = 0; part_index < part_count; part_index++)); do
            chunk=${payload:part_index*chunk_size:chunk_size}
            part=$((part_index + 1))
            printf '::notice file=%s,title=Python test failure evidence::kind=junit_failure_summary;sha256=%s;part=%s/%s;gzip_base64=%s\n' \
              "$diagnostic" "$digest" "$part" "$part_count" "$chunk"
          done
      - name: Test Stage 1 market acceptance
        if: needs.impact.outputs.full == 'true'
        run: make acceptance
      - name: Verify legacy cached chart correctness
        if: needs.impact.outputs.full == 'true'
        run: make benchmark
      - name: Test Stage 2 formula acceptance
        if: needs.impact.outputs.full == 'true'
        run: make acceptance-formula
      - name: Verify legacy formula preview correctness
        if: needs.impact.outputs.full == 'true'
        run: make benchmark-formula
      - name: Test Stage 3 backtest acceptance
        if: needs.impact.outputs.full == 'true'
        run: make acceptance-backtest
      - name: Test Stage 4 analysis acceptance and security
        if: needs.impact.outputs.full == 'true'
        run: make acceptance-analysis
      - name: Verify legacy single-backtest correctness
        if: needs.impact.outputs.full == 'true'
        run: make benchmark-backtest
      - name: Build Python package
        if: needs.impact.outputs.full == 'true'
        run: uv build --no-build-isolation
      - name: Upload Python results
        if: always() && needs.impact.outputs.full == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-results
          path: |
            python-test-results.xml
            coverage.xml
            dist/
          if-no-files-found: ignore
          retention-days: 7

  web:
    name: Web quality, tests, and build
    needs: impact
    if: needs.impact.outputs.full == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install locked web dependencies
        run: pnpm install --frozen-lockfile
      - name: Check web formatting
        run: pnpm format:check
      - name: Lint web
        run: pnpm lint
      - name: Type-check web
        run: pnpm typecheck
      - name: Test web
        run: pnpm test
      - name: Upload web coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-coverage
          path: web/coverage/lcov.info
          if-no-files-found: error
          retention-days: 7
      - name: Build web
        run: pnpm build
      - name: Upload web build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-dist
          path: web/dist/
          if-no-files-found: error
          retention-days: 7

  e2e:
    name: Chromium E2E and Ubuntu x64 4-core/16GB target evidence
    needs: impact
    if: needs.impact.outputs.full == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install locked dependencies
        run: |
          uv sync --frozen --all-groups --extra providers
          pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Test live foundation slice
        run: make e2e-foundation
      - name: Test live Stage 1 market slice
        run: make e2e-market
      - name: Test live Stage 2 formula slice
        run: make e2e-formula
      - name: Test live Stage 3 backtest slice
        run: make e2e-backtest
      - name: Test live Stage 4 analysis slice
        run: make e2e-analysis
      - name: Test live Stage 5 task center slice
        run: make e2e-task-center
      - name: Test accessible responsive workspaces
        run: make e2e-accessibility
      - name: Measure Ubuntu x64 4-core/16GB target baseline
        shell: bash
        env:
          STOCK_DESK_SOURCE_REVISION: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$STOCK_DESK_SOURCE_REVISION"
          mkdir -p test-results/performance
          make performance-target 2>&1 | tee test-results/performance/target-baseline.log
      - name: Publish target baseline import notice
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          publish_evidence() {
            evidence=$1
            kind=$2
            title=$3
            [[ -f "$evidence" ]] || return 0
            digest=$(sha256sum "$evidence" | cut -d' ' -f1)
            payload=$(gzip -n -c "$evidence" | base64 -w0)
            chunk_size=2800
            part_count=$(((${#payload} + chunk_size - 1) / chunk_size))
            for ((part_index = 0; part_index < part_count; part_index++)); do
              chunk=${payload:part_index*chunk_size:chunk_size}
              part=$((part_index + 1))
              printf '::notice file=%s,title=%s::kind=%s;sha256=%s;part=%s/%s;gzip_base64=%s\n' \
                "$evidence" "$title" "$kind" "$digest" "$part" "$part_count" "$chunk"
            done
          }
          publish_evidence "test-results/performance/target-baseline.json" \
            "target_baseline" "Target performance JSON evidence"
          publish_evidence "test-results/performance/target-baseline.log" \
            "measurement_log" "Target performance measurement log"
      - name: Upload Playwright and performance evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: target-baseline-ubuntu-x64-4c16g
          path: |
            test-results/playwright/
            test-results/performance/
          if-no-files-found: ignore
          retention-days: 7

  container:
    name: Clean Compose build and smoke test
    needs: impact
    if: needs.impact.outputs.full == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Install smoke-test dependencies
        run: uv sync --frozen --all-groups --extra providers
      - name: Build, start, and smoke-test Compose
        shell: bash
        run: |
          set -Eeuo pipefail
          : > compose.log
          cleanup() {
            status=$?
            docker compose logs --no-color > compose.log 2>&1 || true
            docker compose down --volumes --remove-orphans || true
            exit "$status"
          }
          trap cleanup EXIT
          docker compose down --volumes --remove-orphans
          docker compose build --pull
          docker compose up --wait --no-build
          make smoke
      - name: Upload Compose logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compose-logs
          path: compose.log
          if-no-files-found: error
          retention-days: 7

  validation-proof:
    name: Publish immutable main validation proof
    if: github.event_name == 'push'
    needs:
      - windows-runtime-acl
      - public-tree
      - dependency-audit
      - python
      - web
      - e2e
      - container
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Check out exact main source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Locate exact CodeQL and Security runs
        id: runs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          find_run() {
            local workflow=$1
            local payload state run_id status conclusion
            for _ in {1..32}; do
              payload="$(gh api --method GET "repos/$GITHUB_REPOSITORY/actions/workflows/$workflow/runs" -f branch=main -f event=push -f per_page=100)"
              state="$(jq -r --arg sha "$GITHUB_SHA" '[.workflow_runs[] | select(.head_sha == $sha and .head_branch == "main" and .event == "push")] | sort_by(.run_attempt) | last | [.id, .status, (.conclusion // "")] | @tsv' <<<"$payload")"
              if [[ -n "$state" ]]; then
                IFS=$'\t' read -r run_id status conclusion <<<"$state"
                if [[ "$status" == completed ]]; then
                  test "$conclusion" = success
                  printf '%s' "$run_id"
                  return 0
                fi
              fi
              sleep 15
            done
            return 1
          }
          echo "codeql=$(find_run codeql.yml)" >> "$GITHUB_OUTPUT"
          echo "security=$(find_run security.yml)" >> "$GITHUB_OUTPUT"
      - name: Generate exact validation proof
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p test-results/main-validation
          python scripts/main_validation_proof.py generate \
            --repo-root . \
            --repository "$GITHUB_REPOSITORY" \
            --ref refs/heads/main \
            --run "CI=$GITHUB_RUN_ID" \
            --run "CodeQL=${{ steps.runs.outputs.codeql }}" \
            --run "Security=${{ steps.runs.outputs.security }}" \
            --output test-results/main-validation/proof.json
      - name: Attest main validation proof
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: test-results/main-validation/proof.json
      - name: Upload immutable main validation proof
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: main-validation-proof-${{ github.sha }}
          path: test-results/main-validation/proof.json
          if-no-files-found: error
          retention-days: 90
