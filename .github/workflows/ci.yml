name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-tree:
    name: Public tree and repository health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Install locked Python dependencies
        run: uv sync --frozen --all-groups --extra providers
      - name: Audit public tree
        run: make public-tree
      - name: Verify repository contracts
        run: uv run --frozen pytest -W error tests/unit/test_repository_health.py

  dependency-audit:
    name: Locked production dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Audit locked production dependencies
        run: make security

  python:
    name: Python quality, tests, and package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Install locked dependencies
        run: uv sync --frozen --all-groups --extra providers
      - name: Check Python formatting
        run: uv run --frozen ruff format --check .
      - name: Lint Python
        run: uv run --frozen ruff check .
      - name: Type-check Python
        run: uv run --frozen mypy --strict src scripts
      - name: Scan Python security rules
        run: uv run --frozen bandit -q -ll -r src scripts
      - name: Test Python
        run: >-
          uv run --frozen pytest -W error --junitxml=python-test-results.xml
          --ignore=tests/acceptance/test_market_flow.py
          --ignore=tests/acceptance/test_formula_consistency.py
          --ignore=tests/acceptance/test_macd_formula_flow.py
          --ignore=tests/acceptance/test_backtest_semantics.py
          --ignore=tests/performance/test_chart_query.py
          --ignore=tests/performance/test_formula_preview.py
          --ignore=tests/performance/test_single_backtest.py
          --cov=src/stock_desk --cov=scripts --cov=migrations --cov-branch
          --cov-report=term-missing --cov-report=xml:coverage.xml
          --cov-fail-under=85
      - name: Test Stage 1 market acceptance
        run: make acceptance
      - name: Benchmark cached ten-year chart query
        run: make benchmark
      - name: Test Stage 2 formula acceptance
        run: make acceptance-formula
      - name: Benchmark cached ten-year formula preview
        run: make benchmark-formula
      - name: Test Stage 3 backtest acceptance
        run: make acceptance-backtest
      - name: Test Stage 4 analysis acceptance and security
        run: make acceptance-analysis
      - name: Benchmark ten-year single-stock backtest
        run: make benchmark-backtest
      - name: Build Python package
        run: uv build --no-build-isolation
      - name: Upload Python results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-results
          path: |
            python-test-results.xml
            coverage.xml
            dist/
          if-no-files-found: ignore
          retention-days: 7

  web:
    name: Web quality, tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install locked web dependencies
        run: pnpm install --frozen-lockfile
      - name: Check web formatting
        run: pnpm format:check
      - name: Lint web
        run: pnpm lint
      - name: Type-check web
        run: pnpm typecheck
      - name: Test web
        run: pnpm test
      - name: Upload web coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-coverage
          path: web/coverage/lcov.info
          if-no-files-found: error
          retention-days: 7
      - name: Build web
        run: pnpm build
      - name: Upload web build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-dist
          path: web/dist/
          if-no-files-found: error
          retention-days: 7

  e2e:
    name: Chromium Stage 0–4 end-to-end slices
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install locked dependencies
        run: |
          uv sync --frozen --all-groups --extra providers
          pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Test live foundation slice
        run: make e2e-foundation
      - name: Test live Stage 1 market slice
        run: make e2e-market
      - name: Test live Stage 2 formula slice
        run: make e2e-formula
      - name: Test live Stage 3 backtest slice
        run: make e2e-backtest
      - name: Test live Stage 4 analysis slice
        run: make e2e-analysis
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-results
          path: test-results/playwright/
          if-no-files-found: ignore
          retention-days: 7

  container:
    name: Clean Compose build and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Install smoke-test dependencies
        run: uv sync --frozen --all-groups --extra providers
      - name: Build, start, and smoke-test Compose
        shell: bash
        run: |
          set -Eeuo pipefail
          : > compose.log
          cleanup() {
            status=$?
            docker compose logs --no-color > compose.log 2>&1 || true
            docker compose down --volumes --remove-orphans || true
            exit "$status"
          }
          trap cleanup EXIT
          docker compose down --volumes --remove-orphans
          docker compose build --pull
          docker compose up --wait --no-build
          make smoke
      - name: Upload Compose logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compose-logs
          path: compose.log
          if-no-files-found: error
          retention-days: 7
