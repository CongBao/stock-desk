      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Set up pnpm for selector collection
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js for selector collection
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install locked dependencies
        run: |
          uv sync --frozen --all-groups --extra providers
          pnpm install --frozen-lockfile
      - name: Download inventory and exact first-run reports
        if: contains(fromJSON(needs.impact.outputs.required_jobs), 'python-unit')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-*
          path: incoming
      - name: Download immutable web report
        if: contains(fromJSON(needs.impact.outputs.required_jobs), 'web')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-build-manifest
          path: incoming/web-build-manifest
      - name: Download immutable E2E report
        if: contains(fromJSON(needs.impact.outputs.required_jobs), 'e2e')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: e2e-evidence
          path: incoming/e2e-evidence
      - name: Normalize, bind requirements, and enforce 85.00 percent
        shell: bash
        run: |
          set -euo pipefail
          out=test-results/python-evidence
          aggregate="$out/python-evidence/aggregate"
          mkdir -p "$aggregate"
          tree=$(git rev-parse HEAD^{tree})
          inventory=incoming/python-test-inventory/inventory.json
          shard_args=()
          report_args=()
          inventory_args=()
          required_runner_args=()
          if [[ -f "$inventory" ]]; then
            uv run --frozen python scripts/ci_test_inventory.py verify --inventory "$inventory" --source-sha "$SOURCE_SHA" --source-tree "$tree"
            inventory_args=(--inventory "$inventory")
            required_runner_args+=(--required-runner pytest)
            for shard in unit integration acceptance-performance security; do
              source="incoming/python-evidence-$shard"
              shard_args+=(--shard-evidence "$source/shard-evidence.json")
              report_args+=(--report "$source/shard-evidence.json")
            done
          fi
          if [[ -f incoming/web-build-manifest/vitest-junit.xml ]]; then
            uv run --frozen python scripts/aggregate_ci_evidence.py normalize-frontend-junit \
              --runner vitest --junit incoming/web-build-manifest/vitest-junit.xml \
              --repo-root . \
              --source-sha "$SOURCE_SHA" --source-tree "$tree" \
              --output "$aggregate/vitest-report.json"
            report_args+=(--report "$aggregate/vitest-report.json")
            required_runner_args+=(--required-runner vitest)
          fi
          if [[ -f incoming/e2e-evidence/playwright-report.json ]]; then
            cp incoming/e2e-evidence/playwright-report.json "$aggregate/playwright-report.json"
            report_args+=(--report "$aggregate/playwright-report.json")
            required_runner_args+=(--required-runner playwright)
          fi
          uv run --frozen python scripts/aggregate_ci_evidence.py requirements \
            --manifest tests/acceptance/requirements.yml \
            --manifest tests/acceptance/v1_1_requirements.yml \
            "${inventory_args[@]}" \
            --repo-root . "${report_args[@]}" "${required_runner_args[@]}" \
            --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --output "$aggregate/requirement-evidence.json"
          if [[ -f "$inventory" ]]; then
            uv run --frozen python scripts/aggregate_ci_evidence.py aggregate \
              --inventory "$inventory" "${shard_args[@]}" \
              --source-sha "$SOURCE_SHA" --source-tree "$tree" \
              --workdir "$out/coverage" --coverage-precision 2 \
              --coverage-threshold 85.00 \
              --requirement-evidence "$aggregate/requirement-evidence.json" \
              --output "$aggregate/python-evidence.json"
            cp "$out/coverage/coverage.json" "$aggregate/coverage.json"
            uv build --no-build-isolation
            tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf "$aggregate/python-dist.tar.gz" -C dist .
            rm -rf "$out/coverage"
          fi
      - name: Create exact-SHA aggregate manifest
        shell: bash
        run: |
          set -euo pipefail
          out=test-results/python-evidence
          aggregate="$out/python-evidence/aggregate"
          tree=$(git rev-parse HEAD^{tree})
          payloads=(--payload "python-evidence/aggregate/requirement-evidence.json:provenance")
          if [[ -f "$aggregate/python-evidence.json" ]]; then
            payloads+=(--payload "python-evidence/aggregate/python-evidence.json:provenance" --payload "python-evidence/aggregate/coverage.json:python" --payload "python-evidence/aggregate/python-dist.tar.gz:python")
          fi
          [[ ! -f "$aggregate/vitest-report.json" ]] || payloads+=(--payload "python-evidence/aggregate/vitest-report.json:provenance")
          [[ ! -f "$aggregate/playwright-report.json" ]] || payloads+=(--payload "python-evidence/aggregate/playwright-report.json:provenance")
          uv run --frozen python scripts/artifact_manifest.py create \
            --root "$out" --output "$out/python-evidence-aggregate.json" \
            --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --workflow CI --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --job-id "$GITHUB_JOB" --job-name "Aggregate Python evidence and coverage" \
            "${payloads[@]}" \
            --critical-input "requirements=$(sha256sum tests/acceptance/requirements.yml | cut -d' ' -f1)" \
            --critical-input "v1.1-requirements=$(sha256sum tests/acceptance/v1_1_requirements.yml | cut -d' ' -f1)" \
            --critical-input "v1-backtest-oracle=$(sha256sum tests/fixtures/backtest/v1_0_oracle.json | cut -d' ' -f1)" \
            --critical-input "v1-backtest-oracle-inputs=$(sha256sum tests/fixtures/backtest/v1_0_oracle_inputs.json | cut -d' ' -f1)" \
            --critical-input "v1-backtest-oracle-generator=$(sha256sum scripts/v1_backtest_oracle.py | cut -d' ' -f1)" \
            --toolchain "python=$(python --version | cut -d' ' -f2)" \
            --lockfile "uv.lock=$(sha256sum uv.lock | cut -d' ' -f1)"
          uv run --frozen python - <<'PY'
          import json
          from pathlib import Path
          from scripts.artifact_manifest import create_attestation_binding, read_manifest
          root = Path("test-results/python-evidence")
          (root / "manifest-binding.json").write_text(
              json.dumps(create_attestation_binding(read_manifest(root / "python-evidence-aggregate.json")), sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Upload aggregate Python evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-evidence-aggregate
          path: test-results/python-evidence/
          if-no-files-found: error
          retention-days: 7

  container-build:
    name: Build immutable OCI image
    needs: impact
    if: contains(fromJSON(needs.impact.outputs.required_jobs), 'container')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Build the OCI image once
        shell: bash
        run: |
          set -euo pipefail
          out=test-results/oci-image-manifest
          mkdir -p "$out"
          docker build --pull --tag stock-desk:ci .
          docker image save stock-desk:ci -o "$out/stock-desk-image.tar"
          docker image inspect --format '{{.Id}}' stock-desk:ci > "$out/image-digest.txt"
      - name: Create exact-SHA OCI manifest
        shell: bash
        run: |
          set -euo pipefail
          out=test-results/oci-image-manifest
          tree=$(git rev-parse HEAD^{tree})
          digest=$(cat "$out/image-digest.txt")
          python scripts/artifact_manifest.py create \
            --root "$out" --output "$out/oci-image-manifest.json" \
            --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --workflow CI --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --job-id "$GITHUB_JOB" --job-name "Build immutable OCI image" \
            --payload "stock-desk-image.tar:oci" --image-digest "$digest" \
            --critical-input "Dockerfile=$(sha256sum Dockerfile | cut -d' ' -f1)" \
            --toolchain "docker=$(docker version --format '{{.Client.Version}}')" \
            --lockfile "uv.lock=$(sha256sum uv.lock | cut -d' ' -f1)" \
            --lockfile "pnpm-lock.yaml=$(sha256sum pnpm-lock.yaml | cut -d' ' -f1)"
          rm "$out/image-digest.txt"
          python - <<'PY'
          import json
          from pathlib import Path
          from scripts.artifact_manifest import create_attestation_binding, read_manifest
          root = Path("test-results/oci-image-manifest")
          (root / "manifest-binding.json").write_text(
              json.dumps(create_attestation_binding(read_manifest(root / "oci-image-manifest.json")), sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Upload the single immutable OCI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oci-image-manifest
          path: test-results/oci-image-manifest/
          if-no-files-found: error
          retention-days: 7

  container-compose:
    name: Verify OCI Compose smoke
    needs: [impact, container-build]
    if: contains(fromJSON(needs.impact.outputs.required_jobs), 'container')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Install locked smoke dependencies
        run: uv sync --frozen --all-groups --extra providers
      - name: Download the one OCI image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: oci-image-manifest
          path: incoming/oci-image
      - name: Verify, load, and smoke the exact image without rebuilding
        shell: bash
        run: |
          set -Eeuo pipefail
          tree=$(git rev-parse HEAD^{tree})
          python scripts/artifact_manifest.py verify \
            --manifest incoming/oci-image/oci-image-manifest.json \
            --root incoming/oci-image --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --attestation incoming/oci-image/manifest-binding.json
          docker load -i incoming/oci-image/stock-desk-image.tar
          test "$(docker image inspect --format '{{.Id}}' stock-desk:ci)" = "$(jq -r .image_digest incoming/oci-image/oci-image-manifest.json)"
          cleanup() {
            status=$?
            docker compose logs --no-color > compose.log 2>&1 || true
            docker compose down --volumes --remove-orphans || true
            exit "$status"
          }
          trap cleanup EXIT
          STOCK_DESK_IMAGE=stock-desk:ci docker compose up --wait --no-build --pull never
          make smoke
      - name: Upload Compose diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compose-smoke-logs
          path: compose.log
          if-no-files-found: ignore
          retention-days: 7

  container-security:
    name: Verify OCI SBOM and vulnerabilities
    needs: [impact, container-build]
    if: contains(fromJSON(needs.impact.outputs.required_jobs), 'container')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Download the one OCI image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: oci-image-manifest
          path: incoming/oci-image
      - name: Verify and load the exact image
        shell: bash
        run: |
          set -euo pipefail
          tree=$(git rev-parse HEAD^{tree})
          python scripts/artifact_manifest.py verify \
            --manifest incoming/oci-image/oci-image-manifest.json \
            --root incoming/oci-image --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --attestation incoming/oci-image/manifest-binding.json
          docker load -i incoming/oci-image/stock-desk-image.tar
          test "$(docker image inspect --format '{{.Id}}' stock-desk:ci)" = "$(jq -r .image_digest incoming/oci-image/oci-image-manifest.json)"
          mkdir -p test-results/oci-security-evidence
      - name: Generate SPDX image SBOM from the exact image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: stock-desk:ci
          format: spdx-json
          output-file: test-results/oci-security-evidence/stock-desk-image.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Report all high and critical image CVEs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: stock-desk:ci
          format: json
          output: test-results/oci-security-evidence/vulnerabilities.json
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          exit-code: 0
      - name: Reject fixable high and critical image CVEs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: stock-desk:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
      - name: Create exact-SHA OCI security manifest
        shell: bash
        run: |
          set -euo pipefail
          out=test-results/oci-security-evidence
          tree=$(git rev-parse HEAD^{tree})
          python scripts/artifact_manifest.py create \
            --root "$out" --output "$out/oci-security-evidence.json" \
            --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --workflow CI --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --job-id "$GITHUB_JOB" --job-name "Verify OCI SBOM and vulnerabilities" \
            --payload "stock-desk-image.spdx.json:sbom" --payload "vulnerabilities.json:provenance" \
            --critical-input "Dockerfile=$(sha256sum Dockerfile | cut -d' ' -f1)" \
            --toolchain "docker=$(docker version --format '{{.Client.Version}}')" \
            --lockfile "uv.lock=$(sha256sum uv.lock | cut -d' ' -f1)"
          python - <<'PY'
          import json
          from pathlib import Path
          from scripts.artifact_manifest import create_attestation_binding, read_manifest
          root = Path("test-results/oci-security-evidence")
          (root / "manifest-binding.json").write_text(
              json.dumps(create_attestation_binding(read_manifest(root / "oci-security-evidence.json")), sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Upload exact OCI security evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oci-security-evidence
          path: test-results/oci-security-evidence/
          if-no-files-found: error
          retention-days: 30

  validation-proof:
    name: Publish immutable main validation proof
    if: github.event_name == 'push'
    needs:
      - windows-browser-observer
      - windows-desktop-builder-a
      - windows-desktop-builder-b
      - windows-desktop-compare
      - rust-quality
      - public-tree
      - dependency-audit
      - python-unit
      - python-integration
      - python-acceptance-performance
      - python-security
      - python-evidence
      - web
      - e2e
      - container-build
      - container-compose
      - container-security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Check out exact main source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Download Python validation evidence outside the worktree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-evidence-*
          path: ${{ runner.temp }}/validation-evidence
      - name: Download web manifest outside the worktree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-build-manifest
          path: ${{ runner.temp }}/validation-evidence/web-build-manifest
      - name: Download OCI manifest outside the worktree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: oci-image-manifest
          path: ${{ runner.temp }}/validation-evidence/oci-image-manifest
      - name: Download E2E, OCI security, and Windows observer evidence outside the worktree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "*-evidence"
          path: ${{ runner.temp }}/validation-evidence
      - name: Download exact-SHA promoted Windows candidate outside the worktree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-desktop-alpha-candidate-${{ env.SOURCE_SHA }}
          path: ${{ runner.temp }}/validation-evidence/windows-desktop-alpha-candidate-manifest
      - name: Download Windows payload comparison manifest outside the worktree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-payload-comparison-manifest
          path: ${{ runner.temp }}/validation-evidence/windows-payload-comparison-manifest
      - name: Attest all twelve exact-SHA evidence manifests
        id: attest-evidence
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            ${{ runner.temp }}/validation-evidence/python-evidence-unit/python-evidence-unit.json
            ${{ runner.temp }}/validation-evidence/python-evidence-integration/python-evidence-integration.json
            ${{ runner.temp }}/validation-evidence/python-evidence-acceptance-performance/python-evidence-acceptance-performance.json
            ${{ runner.temp }}/validation-evidence/python-evidence-security/python-evidence-security.json
            ${{ runner.temp }}/validation-evidence/python-evidence-aggregate/python-evidence-aggregate.json
            ${{ runner.temp }}/validation-evidence/web-build-manifest/web-build-manifest.json
            ${{ runner.temp }}/validation-evidence/e2e-evidence/e2e-evidence.json
            ${{ runner.temp }}/validation-evidence/oci-image-manifest/oci-image-manifest.json
            ${{ runner.temp }}/validation-evidence/oci-security-evidence/oci-security-evidence.json
            ${{ runner.temp }}/validation-evidence/windows-payload-comparison-manifest/windows-payload-comparison-manifest.json
            ${{ runner.temp }}/validation-evidence/windows-desktop-alpha-candidate-manifest/windows-desktop-alpha-candidate-manifest.json
            ${{ runner.temp }}/validation-evidence/windows-browser-observer-evidence/windows-browser-observer-evidence.json
      - name: Verify and preserve signed evidence attestation bundle
        env:
          BUNDLE_PATH: ${{ steps.attest-evidence.outputs.bundle-path }}
          EVIDENCE_ROOT: ${{ runner.temp }}/validation-evidence
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/main-validation"
          test -s "$BUNDLE_PATH"
          cp "$BUNDLE_PATH" "$RUNNER_TEMP/main-validation/evidence-attestation-bundle.jsonl"
          : > "$RUNNER_TEMP/main-validation/evidence-attestation-verification.log"
          for artifact in \
            python-evidence-unit python-evidence-integration \
            python-evidence-acceptance-performance python-evidence-security \
            python-evidence-aggregate web-build-manifest e2e-evidence \
            oci-image-manifest oci-security-evidence \
            windows-payload-comparison-manifest \
            windows-desktop-alpha-candidate-manifest \
            windows-browser-observer-evidence
          do
            gh attestation verify "$EVIDENCE_ROOT/$artifact/$artifact.json" \
              --bundle "$BUNDLE_PATH" --repo "$GITHUB_REPOSITORY" \
              --source-ref refs/heads/main --source-digest "$SOURCE_SHA" \
              --signer-digest "$SOURCE_SHA" --deny-self-hosted-runners \
              >> "$RUNNER_TEMP/main-validation/evidence-attestation-verification.log"
          done
      - name: Locate exact CodeQL and Security runs
        id: runs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          find_run() {
            local workflow=$1 payload state run_id status conclusion
            for _ in {1..32}; do
              payload="$(gh api --method GET "repos/$GITHUB_REPOSITORY/actions/workflows/$workflow/runs" -f branch=main -f event=push -f per_page=100)"
              state="$(jq -r --arg sha "$SOURCE_SHA" '[.workflow_runs[] | select(.head_sha == $sha and .head_branch == "main" and .event == "push")] | sort_by(.run_attempt) | last | [.id, .status, (.conclusion // "")] | @tsv' <<<"$payload")"
              if [[ -n "$state" ]]; then
                IFS=$'\t' read -r run_id status conclusion <<<"$state"
                if [[ "$status" == completed ]]; then
                  test "$conclusion" = success
                  printf '%s' "$run_id"
                  return 0
                fi
              fi
              sleep 15
            done
            return 1
          }
          echo "codeql=$(find_run codeql.yml)" >> "$GITHUB_OUTPUT"
          echo "security=$(find_run security.yml)" >> "$GITHUB_OUTPUT"
      - name: Generate exact validation proof
        env:
          GITHUB_TOKEN: ${{ github.token }}
          EVIDENCE_ROOT: ${{ runner.temp }}/validation-evidence
        run: |
          mkdir -p "$RUNNER_TEMP/main-validation"
          python scripts/main_validation_proof.py generate \
            --repo-root . --repository "$GITHUB_REPOSITORY" --ref refs/heads/main \
            --run "CI=$GITHUB_RUN_ID" \
            --run "CodeQL=${{ steps.runs.outputs.codeql }}" \
            --run "Security=${{ steps.runs.outputs.security }}" \
            --evidence "python-evidence-unit=$EVIDENCE_ROOT/python-evidence-unit/python-evidence-unit.json" \
            --evidence "python-evidence-integration=$EVIDENCE_ROOT/python-evidence-integration/python-evidence-integration.json" \
            --evidence "python-evidence-acceptance-performance=$EVIDENCE_ROOT/python-evidence-acceptance-performance/python-evidence-acceptance-performance.json" \
            --evidence "python-evidence-security=$EVIDENCE_ROOT/python-evidence-security/python-evidence-security.json" \
            --evidence "python-evidence-aggregate=$EVIDENCE_ROOT/python-evidence-aggregate/python-evidence-aggregate.json" \
            --evidence "web-build-manifest=$EVIDENCE_ROOT/web-build-manifest/web-build-manifest.json" \
            --evidence "e2e-evidence=$EVIDENCE_ROOT/e2e-evidence/e2e-evidence.json" \
            --evidence "oci-image-manifest=$EVIDENCE_ROOT/oci-image-manifest/oci-image-manifest.json" \
            --evidence "oci-security-evidence=$EVIDENCE_ROOT/oci-security-evidence/oci-security-evidence.json" \
            --evidence "windows-payload-comparison-manifest=$EVIDENCE_ROOT/windows-payload-comparison-manifest/windows-payload-comparison-manifest.json" \
            --evidence "windows-desktop-alpha-candidate-manifest=$EVIDENCE_ROOT/windows-desktop-alpha-candidate-manifest/windows-desktop-alpha-candidate-manifest.json" \
            --evidence "windows-browser-observer-evidence=$EVIDENCE_ROOT/windows-browser-observer-evidence/windows-browser-observer-evidence.json" \
            --output "$RUNNER_TEMP/main-validation/proof.json"
      - name: Attest main validation proof
        id: attest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ runner.temp }}/main-validation/proof.json
      - name: Verify and preserve signed proof attestation bundle
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          set -euo pipefail
          test -s "$BUNDLE_PATH"
          cp "$BUNDLE_PATH" "$RUNNER_TEMP/main-validation/proof-attestation-bundle.jsonl"
          gh attestation verify "$RUNNER_TEMP/main-validation/proof.json" \
            --bundle "$BUNDLE_PATH" --repo "$GITHUB_REPOSITORY" \
            --source-ref refs/heads/main --source-digest "$SOURCE_SHA" \
            --signer-digest "$SOURCE_SHA" --deny-self-hosted-runners \
            > "$RUNNER_TEMP/main-validation/proof-attestation-verification.log"
      - name: Record post-gh-verify proof binding
        env:
          ATTESTATION_ID: ${{ steps.attest.outputs.attestation-id }}
        run: |
          python - "$RUNNER_TEMP/main-validation/proof.json" "$RUNNER_TEMP/main-validation/post-gh-verify-binding.json" <<'PY'
          import hashlib
          import json
          import os
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          proof_path = Path(sys.argv[1])
          output = Path(sys.argv[2])
          proof_bytes = proof_path.read_bytes()
          proof = json.loads(proof_bytes)
          ci = proof["workflows"]["CI"]
          generation = ci["generation_job"]
          binding = {
              "schema": "stock-desk-main-proof-post-gh-verify-binding-v1",
              "repository": proof["repository"],
              "commit_sha": proof["commit_sha"],
              "tree_sha": proof["tree_sha"],
              "proof_file_sha256": hashlib.sha256(proof_bytes).hexdigest(),
              "attestation_id": os.environ["ATTESTATION_ID"],
              "verified_at": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "verification_gate": "gh-attestation-verify",
              "producer": {
                  "workflow": "CI",
                  "run_id": ci["run_id"],
                  "run_attempt": ci["run_attempt"],
                  "job_id": str(generation["id"]),
                  "job_name": generation["name"],
              },
          }
          output.write_text(
              json.dumps(binding, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Upload immutable main validation proof
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: main-validation-proof-${{ github.sha }}
          path: ${{ runner.temp }}/main-validation/
          if-no-files-found: error
          retention-days: 90
