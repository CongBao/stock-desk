  web:
    name: Web quality tests and immutable build
    needs: impact
    if: contains(fromJSON(needs.impact.outputs.required_jobs), 'web')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore exact-lock pnpm downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ runner.arch }}-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install and validate locked web source
        run: |
          pnpm install --frozen-lockfile
          pnpm format:check
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build
      - name: Create exact-SHA web artifact
        shell: bash
        run: |
          set -euo pipefail
          out=test-results/web-build-manifest
          mkdir -p "$out"
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf "$out/web-dist.tar.gz" -C web/dist .
          cp test-results/vitest/junit.xml "$out/vitest-junit.xml"
          tree=$(git rev-parse HEAD^{tree})
          python scripts/artifact_manifest.py create \
            --root "$out" --output "$out/web-build-manifest.json" \
            --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --workflow CI --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --job-id "$GITHUB_JOB" --job-name "Web quality tests and immutable build" \
            --payload "web-dist.tar.gz:web" --payload "vitest-junit.xml:provenance" \
            --critical-input "vite-config=$(sha256sum web/vite.config.ts | cut -d' ' -f1)" \
            --toolchain "node=$(node --version)" \
            --lockfile "pnpm-lock.yaml=$(sha256sum pnpm-lock.yaml | cut -d' ' -f1)"
          python - <<'PY'
          import json
          from pathlib import Path
          from scripts.artifact_manifest import create_attestation_binding, read_manifest
          root = Path("test-results/web-build-manifest")
          (root / "manifest-binding.json").write_text(
              json.dumps(create_attestation_binding(read_manifest(root / "web-build-manifest.json")), sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Upload immutable web build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-build-manifest
          path: test-results/web-build-manifest/
          if-no-files-found: error
          retention-days: 7

  e2e:
    name: Chromium E2E immutable snapshot
    needs: impact
    if: contains(fromJSON(needs.impact.outputs.required_jobs), 'e2e')
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    permissions:
      contents: read
    steps:
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.SOURCE_SHA }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore exact-lock pnpm downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ runner.arch }}-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Restore exact-lock Playwright browser binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ env.PLAYWRIGHT_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install locked dependencies and Chromium
        run: |
          uv sync --frozen --all-groups --extra providers
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
      - name: Run every browser specification once against one snapshot
        env:
          STOCK_DESK_SOURCE_REVISION: ${{ env.SOURCE_SHA }}
          STOCK_DESK_E2E_MANIFEST_OUT: test-results/playwright/snapshot-manifest.json
        run: |
          test "$(git rev-parse HEAD)" = "$STOCK_DESK_SOURCE_REVISION"
          make e2e
      - name: Normalize Playwright JUnit and create exact-SHA manifest
        shell: bash
        run: |
          set -euo pipefail
          out=test-results/e2e-evidence
          mkdir -p "$out"
          tree=$(git rev-parse HEAD^{tree})
          cp test-results/playwright/snapshot-manifest.json "$out/snapshot-manifest.json"
          cp test-results/playwright/junit.xml "$out/playwright-junit.xml"
          uv run --frozen python scripts/aggregate_ci_evidence.py normalize-frontend-junit \
            --runner playwright --junit "$out/playwright-junit.xml" \
            --repo-root . \
            --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --output "$out/playwright-report.json"
          uv run --frozen python scripts/artifact_manifest.py create \
            --root "$out" --output "$out/e2e-evidence.json" \
            --source-sha "$SOURCE_SHA" --source-tree "$tree" \
            --workflow CI --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --job-id "$GITHUB_JOB" --job-name "Chromium E2E immutable snapshot" \
            --payload "snapshot-manifest.json:provenance" \
            --payload "playwright-report.json:provenance" \
            --payload "playwright-junit.xml:provenance" \
            --critical-input "playwright-config=$(sha256sum playwright.config.ts | cut -d' ' -f1)" \
            --toolchain "node=$(node --version)" \
            --lockfile "pnpm-lock.yaml=$(sha256sum pnpm-lock.yaml | cut -d' ' -f1)"
          uv run --frozen python - <<'PY'
          import json
          from pathlib import Path
          from scripts.artifact_manifest import create_attestation_binding, read_manifest
          root = Path("test-results/e2e-evidence")
          (root / "manifest-binding.json").write_text(
              json.dumps(create_attestation_binding(read_manifest(root / "e2e-evidence.json")), sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Upload immutable E2E evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-evidence
          path: test-results/e2e-evidence/
          if-no-files-found: error
          retention-days: 7

  python-evidence:
    name: Aggregate Python evidence and coverage
    needs:
      - impact
      - python-unit
      - python-integration
      - python-acceptance-performance
      - python-security
      - web
      - e2e
    if: >-
      always() && !cancelled() &&
      contains(fromJSON(needs.impact.outputs.required_jobs), 'requirement-evidence') &&
      (
        (
          needs.impact.outputs.profile == 'web' &&
          needs.web.result == 'success' && needs.e2e.result == 'success'
