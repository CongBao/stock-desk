          trap { $_ | Out-String | Set-Content -Encoding utf8NoBOM (Join-Path $diagnostics 'comparison-failure.txt'); Get-ChildItem $root -Recurse -Force -ErrorAction SilentlyContinue | Select-Object FullName,Length | Out-File -Encoding utf8 (Join-Path $diagnostics 'artifact-inventory.txt'); throw $_ }
          function Get-CompleteCandidate([string]$downloadRoot, [string]$label) {
            $manifests = @(Get-ChildItem $downloadRoot -Recurse -File -Filter 'windows-desktop-bundle.json')
            $complete = @()
            foreach ($manifest in $manifests) {
              $installer = Join-Path $manifest.DirectoryName 'stock-desk-unsigned-nsis.exe'
              $provenance = Join-Path $manifest.DirectoryName 'provenance.json'
              if ((Test-Path -LiteralPath $installer -PathType Leaf) -and (Test-Path -LiteralPath $provenance -PathType Leaf)) {
                $complete += [PSCustomObject]@{ Manifest=$manifest.FullName; Installer=$installer; Provenance=$provenance }
