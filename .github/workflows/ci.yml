          $requiredBacktestEvidence = @(
            'windows-desktop-evidence.json',
            'tauri-webview-evidence.json',
            'packaged-backtest-evidence.json',
            'packaged-backtest-seed.json',
            'packaged-backtest-host-observation.json'
